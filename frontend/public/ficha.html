// Traços raciais que concedem perícias extras (usados em herança Híbrido/Maculado)
const TRAIT_EXTRA_PERICIAS = {
  'Mestre em Perícia':  2,
  'Identidade Forjada': 1,
};

function getExtraPerSources(){
  const r = getRaceData();
  const sources = [];

  // 0. Bônus universal de criação — toda personagem ganha 2 perícias extras em Básico
  sources.push({label:'Criação de Personagem', desc:'Toda personagem ganha 2 perícias adicionais em nível Básico', val:2, tipo:'base'});

  // 1. Bônus base da raça
  if(r && r.extraPer > 0){
    const traitName = char.raca==='Híbrido' ? 'Identidade Forjada' :
                      char.raca==='Humano'  ? 'Mestre em Perícia'  : char.raca;
    sources.push({label: char.raca, desc: traitName, val: r.extraPer, tipo:'raca'});
  }

  // 2. Traços herdados pelo Híbrido
  if(char.raca==='Híbrido'){
    for(const {raceName,traitIdx} of char.hibridoTraits){
      const r2=RACES[raceName];
      if(!r2||!r2.traits[traitIdx]) continue;
      const t=r2.traits[traitIdx];
      const bonus=TRAIT_EXTRA_PERICIAS[t.n]||0;
      if(bonus>0) sources.push({label:`Herança ${raceName}`, desc:t.n, val:bonus, tipo:'heranca'});
    }
  }

  // 3. Traço herdado pelo Maculado
  if(char.raca==='Maculado' && char.maculadoTrait){
    const {raceName,traitIdx}=char.maculadoTrait;
    const r2=RACES[raceName];
    if(r2&&r2.traits[traitIdx]){
      const t=r2.traits[traitIdx];
      const bonus=TRAIT_EXTRA_PERICIAS[t.n]||0;
      if(bonus>0) sources.push({label:`Herança ${raceName}`, desc:t.n, val:bonus, tipo:'heranca'});
    }
  }

  // 4. Aprimoramentos (Personagem Avançado)
  const aprN=(char.aprimoramentos&&char.aprimoramentos.novasPericias)||0;
  if(aprN>0) sources.push({label:'Aprimoramento', desc:'Nova Perícia Básica', val:aprN, tipo:'apr'});

  return sources;
}

function renderPericiasAvancadas(){
  const apr = char.aprimoramentos;
  const intSkills = apr.periciaIntSkills || [];
  const avçSkills = apr.periciaAvancadoSkills || [];
  const hasAvç = apr.periciaAvancado >= 1;
  const prof = getPROF();

  let html=`<h2>◈ Perícias Avançadas</h2>
  <div class="info-box">
    Aqui você escolhe quais perícias Básicas deseja evoluir com os upgrades adquiridos nos Aprimoramentos.
    Somente perícias já selecionadas na aba <b>Perícias</b> aparecem aqui.
  </div>`;

  // ── Seção Intermediário ──────────────────────────────────────
  html+=`<h3 style="margin:20px 0 8px;color:var(--gold)">Básico → Intermediário (+5)
    <span style="font-size:.65em;font-weight:normal;color:var(--text-dim)">${intSkills.length}/4 selecionadas</span>
  </h3>`;

  const skillsBasico = SKILLS.filter(sk=>(char.pericias[sk.n]||0)>=2);
  if(skillsBasico.length===0){
    html+=`<div style="color:var(--text-dim);font-size:.85em;padding:10px 0;font-style:italic">
      Nenhuma perícia Básica selecionada. Volte à aba <b>Perícias</b> e escolha suas perícias primeiro.
    </div>`;
  } else {
    html+=`<div class="skills-grid">`;
    for(const sk of skillsBasico){
      const isAvçUp = avçSkills.includes(sk.n);
      const isIntUp = intSkills.includes(sk.n);
      const effectiveLv = isAvçUp ? 10 : isIntUp ? 5 : 2;
      const podeAdd = isIntUp || intSkills.length < 4;
      html+=`<div class="skill-row" style="${isIntUp||isAvçUp?'border-color:var(--gold)':''}">
        <span class="skill-name">${sk.n}
          <span style="color:var(--text-dim);font-size:.8em">(${sk.a})</span>
          ${isAvçUp?`<span style="font-size:.63em;padding:1px 5px;border:1px solid #e08820;color:#e08820;border-radius:4px;margin-left:4px">Avç</span>`:''}
        </span>
        <div class="skill-lv">
          <span class="lbtn on" style="cursor:default">Bás</span>
          <button class="lbtn${isIntUp||isAvçUp?' on':''}"
            style="${isIntUp||isAvçUp?'border-color:var(--gold);color:var(--gold)':''}${!podeAdd?'opacity:.4;cursor:not-allowed':''}"
            ${isAvçUp?'disabled title="Já evoluída para Avançado"':`onclick="togglePericiaInt('${sk.n.replace(/'/g,"\\'")}');render()"`}>
            Int${isIntUp||isAvçUp?' ✓':''}
          </button>
        </div>
        <span class="skill-sv">${prof+effectiveLv}</span>
      </div>`;
    }
    html+=`</div>`;
  }

  // ── Seção Avançado (só aparece se comprou Perito Avançado) ────
  if(hasAvç){
    html+=`<h3 style="margin:28px 0 8px;color:#e08820">Intermediário → Avançado (+10)
      <span style="font-size:.65em;font-weight:normal;color:var(--text-dim)">${avçSkills.length}/4 selecionadas</span>
    </h3>`;

    if(intSkills.length===0){
      html+=`<div style="color:var(--text-dim);font-size:.85em;padding:10px 0;font-style:italic">
        Selecione primeiro as perícias Intermediárias acima.
      </div>`;
    } else {
      html+=`<div class="skills-grid">`;
      for(const skName of intSkills){
        const sk = SKILLS.find(s=>s.n===skName);
        if(!sk) continue;
        const isAvçUp = avçSkills.includes(skName);
        const podeAdd = isAvçUp || avçSkills.length < 4;
        html+=`<div class="skill-row" style="${isAvçUp?'border-color:#e08820':''}">
          <span class="skill-name">${skName}
            <span style="color:var(--text-dim);font-size:.8em">(${sk.a})</span>
          </span>
          <div class="skill-lv">
            <span class="lbtn on" style="cursor:default;border-color:var(--gold);color:var(--gold)">Int</span>
            <button class="lbtn${isAvçUp?' on':''}"
              style="${isAvçUp?'border-color:#e08820;color:#e08820':''}${!podeAdd?'opacity:.4;cursor:not-allowed':''}"
              onclick="togglePericiaAvancado('${skName.replace(/'/g,"\\'")}');render()">
              Avç${isAvçUp?' ✓':''}
            </button>
          </div>
          <span class="skill-sv">${prof+(isAvçUp?10:5)}</span>
        </div>`;
      }
      html+=`</div>`;
    }
  }

  set(html);
}

function renderPericias(){
  const cl=getClassData();
  const r=getRaceData();
  const classPer=cl?cl.pericias:[];
  const isInicial=!char.tipo||char.tipo==='inicial';

  // Auto-set class skills to Básico (antes de renderizar)
  for(const p of classPer){if(!(char.pericias[p]>=2))char.pericias[p]=2;}
  // No Inicial, trava tudo em no máximo Básico
  if(isInicial){
    for(const k of Object.keys(char.pericias)){if(char.pericias[k]>2)char.pericias[k]=2;}
  }

  const perSources = getExtraPerSources();
  const manualMax  = perSources.reduce((s,x)=>s+x.val, 0);
  const manualUsed = Object.entries(char.pericias).filter(([k,v])=>v>0&&!classPer.includes(k)).length;
  const prof=getPROF();

  // ── Info box ─────────────────────────────────────────────────────────
  let html=`<h2>◈ Perícias</h2>
  <div class="info-box">
    <b>Perícias de Classe</b> (automáticas em Básico): ${classPer.join(', ')}<br>`;

  if(manualMax>0){
    const corTotal = manualUsed>=manualMax ? 'var(--gold)' : 'var(--green)';
    html+=`<div style="margin-top:8px;margin-bottom:4px;font-size:.82em;color:var(--text-dim)">
      Perícias extras — <b style="color:${corTotal}">${manualUsed}/${manualMax}</b> selecionadas
    </div>`;

    if(perSources.length>1){
      // Mostra cards de origem apenas quando há múltiplas fontes
      html+=`<div style="display:flex;flex-wrap:wrap;gap:6px;margin:6px 0">`;
      perSources.forEach(s=>{
        const cor = s.tipo==='raca'?'var(--gold-dim)': s.tipo==='heranca'?'#7ab54a':'var(--blue)';
        html+=`<div style="background:var(--bg3);border:1px solid ${cor};border-radius:6px;padding:5px 10px;font-size:.75em;">
          <div style="color:${cor};font-weight:bold">${s.label}</div>
          <div style="color:var(--text-dim)">${s.desc}</div>
          <div style="color:var(--gold);font-weight:bold">+${s.val} perícia${s.val>1?'s':''}</div>
        </div>`;
      });
      html+=`</div>`;
    }
  }

  html+=isInicial
    ?`<span style="color:var(--text-dim);font-size:.85em">Nível disponível: <b>Básico +2</b> — Intermediário e Avançado desbloqueados no Personagem Avançado</span>`
    :`<b>Níveis:</b> Básico +2 | Intermediário +5 | Avançado +10 | Salvaguarda = Prof(${prof}) + Nível`;
  html+=`</div><div class="skills-grid">`;

  // ── Linhas de perícia ─────────────────────────────────────────────────
  const vantagens=getSkillVantagens();
  const eqBonuses=getEquipBonuses().skills;
  for(const sk of SKILLS){
    const isClass=classPer.includes(sk.n);
    const lv=char.pericias[sk.n]||0;
    const eqB=eqBonuses[sk.n]||0;
    const sv=prof+(lv||0)+eqB;
    const hasVant=vantagens.has(sk.n);
    html+=`<div class="skill-row" style="${hasVant?'border-color:var(--green);':''}">
      <span class="skill-name">${sk.n} <span style="color:var(--text-dim);font-size:.8em">(${sk.a})</span>${hasVant?` <span style="font-size:.65em;padding:1px 4px;border:1px solid var(--green);color:var(--green);border-radius:4px">Vant.</span>`:''}${eqB>0?` <span style="font-size:.65em;padding:1px 4px;border:1px solid var(--gold);color:var(--gold);border-radius:4px">+${eqB} equip</span>`:''}</span>`;

    const aprInt=(char.aprimoramentos&&char.aprimoramentos.periciaIntSkills)||[];
    const aprAvç=(char.aprimoramentos&&char.aprimoramentos.periciaAvancadoSkills)||[];
    const isIntUpg=aprInt.includes(sk.n);
    const isAvçUpg=aprAvç.includes(sk.n);
    if(isInicial){
      if(isClass){
        html+=`<div class="skill-lv">
          <span class="lbtn cls" title="Perícia de Classe">Cls</span>
          <span class="lbtn on" style="cursor:default" title="Básico fixo no Personagem Inicial">Bás</span>
        </div>`;
      } else {
        html+=`<div class="skill-lv">
          <button class="lbtn${lv===2?' on':''}" onclick="setPer('${sk.n}',${lv===2?0:2},'extra',${manualMax},${manualUsed})">Bás</button>
        </div>`;
      }
    } else {
      html+=`<div class="skill-lv">
        ${isClass?`<span class="lbtn cls" title="Perícia de Classe">Cls</span>`:''}
        <button class="lbtn${lv>=2?' on':''}" ${isIntUpg||isAvçUpg?'disabled title="Upado via Aprimoramento"':`onclick="setPer('${sk.n}',${lv>=2?0:2},'${isClass?'class':'extra'}',${manualMax},${manualUsed})"`}>Bás</button>
        ${isIntUpg&&!isAvçUpg?`<span class="lbtn on" style="cursor:default;border-color:var(--gold);color:var(--gold)" title="Intermediário via Aprimoramento">Int★</span>`:''}
        ${isAvçUpg?`<span class="lbtn on" style="cursor:default;border-color:#e08820;color:#e08820" title="Avançado via Aprimoramento">Avç★</span>`:''}
      </div>`;
    }

    html+=`<span class="skill-sv">${sv}</span>
    </div>`;
  }
  html+=`</div>`;
  set(html);
}

function setPer(skill,lv,type,maxManual,usedManual){
  const isInicial=!char.tipo||char.tipo==='inicial';
  if(isInicial&&lv>2){showErr('Intermediário e Avançado disponíveis apenas no Personagem Avançado.');return;}
  // Impede remover perícia que foi aprimorada
  if(lv===0){
    const apr=char.aprimoramentos;
    if((apr.periciaIntSkills||[]).includes(skill)){
      showErr('Esta perícia foi promovida via Aprimoramento. Remova o upgrade na aba Aprimoramentos.');return;
    }
  }
  if(type==='extra'){
    const isAlreadyTrained=char.pericias[skill]>0;
    if(lv>0&&!isAlreadyTrained&&usedManual>=maxManual){showErr(`Limite de ${maxManual} perícias extras atingido.`);return;}
  }
  char.pericias[skill]=lv;
  renderPericias();
}


// ═══════════════════════════════════════════════════════
//  STEP 6: IDIOMAS
// ═══════════════════════════════════════════════════════
function getKnownLangs(){
  const r=getRaceData();
  const rl=char.raca?RACE_LANGS[char.raca]:null;
  const fixos=rl?rl.fixos:[];
  return ['Comum',...fixos,...char.idiomas.filter(l=>!fixos.includes(l)&&l!=='Comum')];
}

// Idiomas extras concedidos pelo talento Poliglota ("um novo idioma à sua escolha")
function getTalentLangExtras(){
  return char.talentos.includes('Poliglota') ? 1 : 0;
}

function renderIdiomas(){
  const cl=getClassData();
  const r=getRaceData();
  const rl=char.raca?RACE_LANGS[char.raca]:{fixos:[],extras:0};
  const fixos=['Comum',...rl.fixos];
  const racialExtras=rl.extras||0;
  const talExtras=getTalentLangExtras();
  const maxExtras=racialExtras+talExtras;
  const chosen=char.idiomas.filter(l=>!fixos.includes(l));
  const remaining=maxExtras-chosen.length;

  let html=`<h2>◈ Idiomas</h2>
  <div class="info-box">
    <b>Idiomas Base:</b> ${fixos.map(l=>`<span class="spell-pill">${l}</span>`).join(' ')}<br>
    <b>Extras disponíveis:</b> ${maxExtras}${racialExtras>0&&talExtras>0?` (${racialExtras} racial + ${talExtras} Poliglota)`:''} — <b>${remaining}</b> restante${remaining!==1?'s':''}<br>
    ${talExtras>0?`<span style="color:var(--gold)">⭐ <b>Poliglota:</b> +${talExtras} idiomas adicionais desbloqueados.</span><br>`:''}
    ${cl&&cl.classe==='Mago'||char.classe==='Mago'?'<span style="color:var(--gold)">⚠ <b>Mago:</b> Para usar magias do Grimório é necessário saber <b>Arcano</b>. Elfos já conhecem Arcano automaticamente.</span>':''}
    ${char.classe==='Mago'&&!fixos.includes('Arcano')&&!chosen.includes('Arcano')?'<br><span style="color:var(--red)">⚠ Recomendado: escolha <b>Arcano</b> para acessar seu Grimório.</span>':''}
  </div>`;

  // Já conhecidos (fixos)
  html+=`<div class="sh-sec"><div class="sh-stitle">Idiomas Conhecidos</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:6px;padding:10px">`;
  fixos.forEach(l=>{
    html+=`<div style="padding:6px 12px;background:var(--bg3);border:1px solid var(--green);border-radius:20px;font-size:.85em;color:var(--green)">${l} <span style="font-size:.75em;opacity:.7">(base)</span></div>`;
  });
  chosen.forEach(l=>{
    html+=`<div style="padding:6px 12px;background:var(--sel);border:1px solid var(--gold);border-radius:20px;font-size:.85em;color:var(--gold);cursor:pointer" onclick="toggleLang('${l}')">${l} ✕</div>`;
  });
  html+=`</div></div>`;

  if(maxExtras>0){
    html+=`<h3 style="margin-top:12px;margin-bottom:8px">Escolha ${maxExtras} idioma${maxExtras>1?'s':''} adicional${maxExtras>1?'is':''}</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px">`;
    ALL_LANGS.forEach(lang=>{
      const isFixed=fixos.includes(lang);
      const isSel=chosen.includes(lang);
      const isDisabled=!isSel&&remaining<=0;
      html+=`<div class="trait-opt${isSel?' selected':''} ${isFixed?'disabled':''} ${isDisabled&&!isSel?'disabled':''}"
        onclick="${isFixed?'':isDisabled&&!isSel?`showErr('Limite de ${maxExtras} idiomas extras atingido.')`:`toggleLang('${lang}')`}"
        style="${isFixed?'opacity:.4;cursor:default;':''}"
      >
        <div>
          <div class="trait-opt-name">${lang}${isFixed?' <span style="font-size:.7em;color:var(--green)">(racial)</span>':''}</div>
          <div class="trait-opt-desc" style="font-size:.72em">${getLangDesc(lang)}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  set(html);
}

function toggleLang(lang){
  const rl=char.raca?RACE_LANGS[char.raca]:{fixos:[],extras:0};
  const fixos=['Comum',...rl.fixos];
  if(fixos.includes(lang))return;
  const idx=char.idiomas.indexOf(lang);
  if(idx>=0){char.idiomas.splice(idx,1);}
  else{
    const chosen=char.idiomas.filter(l=>!fixos.includes(l));
    const maxL=(rl.extras||0)+getTalentLangExtras();
    if(chosen.length>=maxL){showErr(`Limite de ${maxL} idiomas extras atingido.`);return;}
    char.idiomas.push(lang);
  }
  renderIdiomas();
}

function getLangDesc(lang){
  const descs={
    'Élfico':'Língua refinada da magia e natureza, usada em textos arcânicos.',
    'Anão':'Idioma robusto e percussivo dos subterrâneos e forjadores.',
    'Dracônico':'Língua dos dragões e da magia primordial. Base de muitas fórmulas.',
    'Infernal':'Linguagem de demônios e pactos. Cada palavra carrega peso contratual.',
    'Celestial':'Idioma sagrado de anjos e ordens divinas.',
    'Selvagem':'Língua tribal direta de povos bestiais e nômades.',
    'Silvestre':'Linguagem espiritual ligada às criaturas da floresta e ao povo Fauno.',
    'Abissal':'Idioma caótico associado ao vazio e à corrupção.',
    'Gigante':'Língua antiga de gigantes e titãs. Raramente sussurrada.',
    'Orc':'Linguagem agressiva de tribos guerreiras. Funcional e direta.',
    'Feérico':'Idioma místico do Reino das Fadas, sotaque único.',
    'Arcano':'Usado em grimórios, runas e fórmulas mágicas. Invocado, não falado.',
    'Naga':'Língua serpentina de criaturas reptilianas e povos aquáticos.',
    'Primordial':'Idioma ancestral dos elementais e forças da natureza.',
  };
  return descs[lang]||'';
}

//  STEP 7: MAGIAS
// ═══════════════════════════════════════════════════════
let spellFilters={tipo:'',natureza:'',categoria:'',search:'',nivel_magia:''};

function renderMagias(){
  const access=getSpellAccess();
  const slots=getSpellSlots();
  const r=getRaceData();

  const selTruque=char.magias.filter(m=>SPELLS.find(s=>s.nome===m&&s.tipo==='Truque'));
  const selBase=char.magias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo!=='Truque';});
  const selExtra=char.magiasExtra;

  // Racial extra spell type count
  const racialCount=slots.racialExtra?char.magiasExtra.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo===slots.racialExtra.type;}).length:0;
  const extraGrimCount=char.magiasExtra.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo===slots.extraType;}).length;

  let html=`<h2>◈ Magias & Truques</h2>`;

  // Slot info
  html+=`<div class="info-box" style="font-size:.8em">
    <b>Magias base:</b> 2 + Intelecto (${getAttr('INT')}) = <b>${slots.base}</b> magias conhecidas (escolha do pool acessível)<br>
    <b>Truques:</b> <b>2</b> truques (0 PM, à vontade)<br>
    ${slots.extra>0?`<b>${slots.extraType} (adicional):</b> <b>${slots.extra}</b> magias extras (não contam no limite base)<br>`:''}
    ${slots.extraSpells>0?`<b>Magias Adicionais (talento):</b> +${slots.extraSpells}<br>`:''}
    ${slots.racialExtra?`<b>Magia Racial (${slots.racialExtra.type}):</b> +${slots.racialExtra.count} (adicional)<br>`:''}
    ${r&&r.extraSpell?`<b>Magia Racial Fixa:</b> ${r.extraSpell} (adicionada automaticamente)`:''}
  </div>`;

  // Counters
  html+=`<div class="counter">
    <span class="cnt-badge${selTruque.length>=slots.truques?' full':''}">Truques: ${selTruque.length}/${slots.truques}</span>
    <span class="cnt-badge${selBase.length>=slots.base?' full':''}">Magias: ${selBase.length}/${slots.base}</span>
    ${slots.extra>0?`<span class="cnt-badge extra${extraGrimCount>=slots.extra?' full':''}">${slots.extraType?.replace('Magias ','')}: ${extraGrimCount}/${slots.extra} (adicional)</span>`:''}
    ${slots.racialExtra?`<span class="cnt-badge extra${racialCount>=slots.racialExtra.count?' full':''}">${slots.racialExtra.type?.replace('Magias ','')}: ${racialCount}/${slots.racialExtra.count} (racial)</span>`:''}
    ${slots.extraSpells>0?`<span class="cnt-badge extra">Lista Expandida: +${slots.extraSpells} slots</span>`:''}
  </div>`;

  // Filters
  const tipos=access;
  const naturezas=[...new Set(SPELLS.filter(s=>access.includes(s.tipo)).map(s=>s.natureza).filter(Boolean))].sort();
  const cats=[...new Set(SPELLS.filter(s=>access.includes(s.tipo)&&s.categoria).map(s=>s.categoria))].sort();

    // Botões de filtro por nível
  const maxMLfilt=getMaxMagicLevel();
  const levelsVisiveis=MAGIC_LEVELS.filter(ml=>ml.nivel<=maxMLfilt);
  if (levelsVisiveis.length) {
    html += `<div class="filters">
      <span class="fl">Nível máximo:</span>
      <button class="fbtn${!spellFilters.nivel_magia?' on':''}" onclick="setSF('nivel_magia','')">Todos</button>
      ${levelsVisiveis.map(ml=>`<button class="fbtn${spellFilters.nivel_magia==ml.nivel?' on':''}"
        style="border-color:${spellFilters.nivel_magia==ml.nivel?ml.cor:'var(--border)'};color:${spellFilters.nivel_magia==ml.nivel?ml.cor:'var(--text-dim)'}"
        onclick="setSF('nivel_magia',${ml.nivel})">${ml.nome}</button>`).join('')}
    </div>`;
  }

  html+=`<div class="filters">
    <span class="fl">Tipo:</span>
    <button class="fbtn${!spellFilters.tipo?' on':''}" onclick="setSF('tipo','')">Todos</button>
    ${tipos.map(t=>`<button class="fbtn${spellFilters.tipo===t?' on':''}" onclick="setSF('tipo','${t}')">${t.replace('Magias ','')}</button>`).join('')}
    <span class="fl" style="margin-left:6px">Elem:</span>
    <button class="fbtn${!spellFilters.natureza?' on':''}" onclick="setSF('natureza','')">Todos</button>
    ${naturezas.map(n=>`<button class="fbtn${spellFilters.natureza===n?' on':''}" style="border-color:${spellFilters.natureza===n?ELEM_COLORS[n]||'var(--gold)':'var(--border)'};color:${spellFilters.natureza===n?ELEM_COLORS[n]||'var(--gold)':'var(--text-dim)'}" onclick="setSF('natureza','${n}')">${n}</button>`).join('')}
  </div>
  <div class="filters">
    <span class="fl">Categ:</span>
    <button class="fbtn${!spellFilters.categoria?' on':''}" onclick="setSF('categoria','')">Todos</button>
    ${cats.map(cat=>`<button class="fbtn${spellFilters.categoria===cat?' on':''}" onclick="setSF('categoria','${cat}')">${cat}</button>`).join('')}
    <span class="fl" style="margin-left:6px">Busca:</span>
    <input class="search" value="${esc(spellFilters.search)}" placeholder="Buscar magia... (Enter para buscar)"
      oninput="spellFilters.search=this.value" onkeydown="if(event.key==='Enter')renderMagias()">
  </div>`;

  // Filtered spells
  const maxML=getMaxMagicLevel();
  let filtered=SPELLS.filter(s=>access.includes(s.tipo)&&s.nivel_magia<=maxML);
  // Filtro por nível de magia
  if (spellFilters.nivel_magia) {
    filtered = filtered.filter(s => s.nivel_magia <= parseInt(spellFilters.nivel_magia));
  }
  if(spellFilters.tipo) filtered=filtered.filter(s=>s.tipo===spellFilters.tipo);
  if(spellFilters.natureza) filtered=filtered.filter(s=>s.natureza===spellFilters.natureza);
  if(spellFilters.categoria) filtered=filtered.filter(s=>s.categoria===spellFilters.categoria);
  if(spellFilters.search){const q=spellFilters.search.toLowerCase();filtered=filtered.filter(s=>s.nome.toLowerCase().includes(q)||s.descricao.toLowerCase().includes(q));}

  html+=`<div class="spells-grid">`;
  for(const s of filtered){
    const inBase=char.magias.includes(s.nome);
    const inExtra=char.magiasExtra.includes(s.nome);
    const sel=inBase||inExtra;
    const isExtra=s.tipo===slots.extraType||(slots.racialExtra&&s.tipo===slots.racialExtra.type);
    const nc=ELEM_COLORS[s.natureza]||'var(--border)';
    const cc=CAT_COLORS[s.categoria]||'var(--border)';
    const langChk=canLearnSpell(s);
    const locked=!langChk.ok&&!sel;
    const entidade=s.tipo==='Magias Sagradas'?getSpellEntity(s.nome):null;
    html+=`<div class="sc${inBase?' selected':inExtra?' extra-selected':''}${locked?' disabled':''}"
      style="${locked?'opacity:.45;cursor:not-allowed;border-color:var(--red)!important;':''}"
      onclick="toggleSpell('${s.nome.replace(/'/g,"\\'")}')">
      <div class="sc-name">${s.nome}${inBase?' ✓':inExtra?' ⭐':locked?' 🔒':''}</div>
      <div class="sc-meta">
        <span class="tag" style="border-color:${nc};color:${sel?nc:'var(--text-dim)'}">${s.natureza||'—'}</span>
        ${s.categoria?`<span class="tag" style="border-color:${cc};color:${sel?cc:'var(--text-dim)'}">${s.categoria}</span>`:''}
        <span class="tag">${s.tipo.replace('Magias de ','').replace('Magias ','')}</span>
        <span class="tag">${s.custo} PM</span>${MAGIC_LEVELS.length?`<span class="tag" style="border-color:${getMagicLevelColor(s.nivel_magia)};color:${getMagicLevelColor(s.nivel_magia)}">${getMagicLevelName(s.nivel_magia)}</span>`:""}
        ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
        ${s.duracao?`<span class="tag">${s.duracao}</span>`:''}
        ${isExtra?`<span class="tag" style="border-color:var(--purple);color:var(--purple)">adicional</span>`:''}
      </div>
      ${entidade?`<div style="font-size:.7em;color:var(--gold);margin-bottom:3px">Entidade: ${entidade}</div>`:''}
      ${locked?`<div style="font-size:.7em;color:var(--red);margin-bottom:3px">🔒 Requer Idioma: ${langChk.missing.join(', ')}</div>`
              :s.prereq?`<div style="font-size:.7em;color:var(--gold);margin-bottom:3px">Pré-req: ${s.prereq}</div>`:''}
      <div class="sc-desc">${s.descricao}</div>
    </div>`;
  }
  if(!filtered.length) html+=`<div style="color:var(--text-dim);padding:20px;grid-column:1/-1">Nenhuma magia encontrada.</div>`;
  html+=`</div>`;
  set(html);
}

function setSF(k,v){spellFilters[k]=v;renderMagias();}

function toggleSpell(name){
  const s=SPELLS.find(x=>x.nome===name); if(!s)return;
  const slots=getSpellSlots();
  const inBase=char.magias.includes(name);
  const inExtra=char.magiasExtra.includes(name);

  if(inBase){char.magias=char.magias.filter(m=>m!==name);renderMagias();return;}
  if(inExtra){char.magiasExtra=char.magiasExtra.filter(m=>m!==name);renderMagias();return;}

  // Verificar pré-requisito de idioma
  const langCheck=canLearnSpell(s);
  if(!langCheck.ok){showErr(`Pré-requisito não atendido: necessita Idioma ${langCheck.missing.join(' e ')}.`);return;}

  // Determine where this spell goes
  if(s.tipo==='Truque'){
    const cnt=char.magias.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo==='Truque';}).length;
    if(cnt>=slots.truques){showErr(`Limite de ${slots.truques} truques atingido.`);return;}
    char.magias.push(name); renderMagias(); return;
  }

  // Extra slots (Grimório, Racial)
  if(slots.extraType&&s.tipo===slots.extraType){
    const cnt=char.magiasExtra.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo===slots.extraType;}).length;
    if(cnt>=slots.extra){showErr(`Limite de ${slots.extra} ${slots.extraType} atingido.`);return;}
    char.magiasExtra.push(name); renderMagias(); return;
  }
  if(slots.racialExtra&&s.tipo===slots.racialExtra.type){
    const cnt=char.magiasExtra.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo===slots.racialExtra.type;}).length;
    if(cnt>=slots.racialExtra.count){showErr(`Limite de ${slots.racialExtra.count} magia(s) racial atingido.`);return;}
    char.magiasExtra.push(name); renderMagias(); return;
  }

  // Base slots
  const cntBase=char.magias.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo!=='Truque';}).length;
  const totalBase=slots.base+slots.extraSpells;
  if(cntBase>=totalBase){showErr(`Limite de ${totalBase} magias atingido.`);return;}
  char.magias.push(name); renderMagias();
}

// ═══════════════════════════════════════════════════════
//  TRILHA B — MAGIAS ADICIONAIS (escolher magias das compras feitas em Aprimoramentos)
//  Aba condicional: aparece quando char.aprimoramentos.novasMagias >= 1
//  A compra em si (gasto de XP) acontece em Aprimoramentos; aqui só se escolhe
//  o tipo, nível e as 2 magias de cada compra pendente, dentre os tipos/níveis
//  liberados por getMagiasAdicionaisOpcoes() (acesso-base + gating de proficiência).
// ═══════════════════════════════════════════════════════
function renderMagiasAdicionais(){
  const apr = char.aprimoramentos;
  if(!apr.magiasAdicionaisEscolhidas) apr.magiasAdicionaisEscolhidas=[];
  const compras = apr.magiasAdicionaisEscolhidas;
  const pendingIdx = compras.findIndex(c=>!c.nomes||!c.nomes.length);

  let html=`<h2>◈ Magias Adicionais</h2>
  <div class="info-box">
    Cada compra de <b>"Magias Adicionais"</b> (feita na aba Aprimoramentos) concede 2 magias novas,
    escolhidas dentre os tipos e níveis aos quais você tem <b>direito de acesso</b>
    — a Progressão Mágica (proficiência) habilita esse direito; é aqui que você escolhe as magias de fato.
  </div>
  <div class="counter"><span class="cnt-badge${!compras.length?' full':''}">Compras: ${compras.length}/3</span></div>`;

  if(!compras.length){
    html+=`<div class="info-box" style="border-color:var(--red);font-size:.85em">
      Nenhuma compra de "Magias Adicionais" realizada ainda. Volte à aba <b>Aprimoramentos</b> e adquira o aprimoramento.
    </div>`;
    set(html);
    return;
  }

  // Compras já com magias escolhidas
  compras.forEach((c,i)=>{
    if(!c.nomes||!c.nomes.length) return;
    html+=`<div class="apr-item comprado" style="margin-bottom:10px">
      <div class="apr-nome">${i+1}ª compra — ${c.tipo.replace('Magias ','')} (nível ${getMagicLevelName(c.nivel)})</div>
      <div style="font-size:.8em;margin-top:4px"><b>${c.nomes.join(', ')}</b></div>
    </div>`;
  });

  if(pendingIdx<0){
    html+=`<div class="info-box" style="font-size:.8em">✓ Todas as compras de "Magias Adicionais" já têm magias escolhidas.</div>`;
    set(html);
    return;
  }

  const opcoes = getMagiasAdicionaisOpcoes();
  html+=`<div class="apr-item" style="margin-bottom:14px">
    <div class="apr-nome">${pendingIdx+1}ª compra — escolha pendente</div>`;

  if(!opcoes.length){
    html+=`<div style="font-size:.8em;color:var(--red);margin-top:6px">Nenhum tipo/nível disponível no momento — verifique acesso a tipos de magia e proficiência mágica.</div>`;
  } else {
    html+=`<div style="margin-top:10px">
      <div style="font-size:.78em;color:var(--text-dim);margin-bottom:4px">1. Escolha o tipo de magia:</div>
      <div class="filters">
        ${opcoes.map(o=>`<button class="fbtn${maPicker.tipo===o.tipo?' on':''}" onclick="setMAPTipo('${o.tipo}')">${o.tipo.replace('Magias ','')}</button>`).join('')}
      </div>
    </div>`;

    const opSel = opcoes.find(o=>o.tipo===maPicker.tipo);
    if(opSel){
      html+=`<div style="margin-top:8px">
        <div style="font-size:.78em;color:var(--text-dim);margin-bottom:4px">2. Escolha o nível:</div>
        <div class="filters">
          ${opSel.niveis.map(n=>{
            const ml=MAGIC_LEVELS.find(m=>m.nivel===n);
            const on=maPicker.nivel===n;
            return `<button class="fbtn${on?' on':''}" style="border-color:${on?(ml?ml.cor:'var(--gold)'):'var(--border)'};color:${on?(ml?ml.cor:'var(--gold)'):'var(--text-dim)'}" onclick="setMAPNivel(${n})">${ml?ml.nome:'Nível '+n}</button>`;
          }).join('')}
        </div>
      </div>`;

      if(maPicker.nivel!=null){
        const candidatos = SPELLS.filter(s=>s.tipo===maPicker.tipo && s.nivel_magia===maPicker.nivel
          && !char.magias.includes(s.nome) && !char.magiasExtra.includes(s.nome));
        html+=`<div style="margin-top:8px">
          <div style="font-size:.78em;color:var(--text-dim);margin-bottom:4px">
            3. Escolha 2 magias <span class="cnt-badge${maPicker.escolhidas.length>=2?' full':''}">${maPicker.escolhidas.length}/2</span>:
          </div>`;
        if(!candidatos.length){
          html+=`<div style="font-size:.76em;color:var(--red)">Nenhuma magia disponível neste tipo/nível (todas já conhecidas).</div>`;
        } else {
          html+=`<div class="spells-grid" style="max-height:260px;overflow:auto">`;
          candidatos.forEach(s=>{
            const isSel=maPicker.escolhidas.includes(s.nome);
            const limitReached=!isSel && maPicker.escolhidas.length>=2;
            const entidade=s.tipo==='Magias Sagradas'?getSpellEntity(s.nome):null;
            html+=`<div class="sc${isSel?' selected':''}${limitReached?' disabled':''}"
              style="${limitReached?'opacity:.45;cursor:not-allowed;':'cursor:pointer;'}"
              onclick="${limitReached?'':`toggleMAPSpell('${s.nome.replace(/'/g,"\\'")}')`}">
              <div class="sc-name">${s.nome}${isSel?' ✓':''}</div>
              <div class="sc-meta">
                <span class="tag">${s.natureza||'—'}</span>
                ${s.categoria?`<span class="tag">${s.categoria}</span>`:''}
                <span class="tag">${s.custo} PM</span>
                ${s.duracao?`<span class="tag">${s.duracao}</span>`:''}
              </div>
              ${entidade?`<div style="font-size:.7em;color:var(--gold);margin-bottom:3px">Entidade: ${entidade}</div>`:''}
              <div class="sc-desc">${s.descricao}</div>
            </div>`;
          });
          html+=`</div>`;
        }
        html+=`</div>`;
      }

      const podeConfirmar = maPicker.tipo && maPicker.nivel!=null && maPicker.escolhidas.length===2;
      html+=`<div style="margin-top:10px;display:flex;gap:8px">
        <button class="btn${podeConfirmar?' primary':''}" style="font-size:.78em;padding:6px 14px" ${!podeConfirmar?'disabled':''} onclick="confirmarMagiaAdicional()">Confirmar escolha</button>
        <button class="btn" style="font-size:.78em;padding:6px 14px" onclick="resetMAPicker();renderMagiasAdicionais()">Limpar seleção</button>
      </div>`;
    }
  }

  html+=`</div>`;
  set(html);
}

// ═══════════════════════════════════════════════════════
//  TRILHA A — MAGIAS APRIMORADAS (evoluir magia já conhecida)
//  Aba condicional: aparece quando char.aprimoramentos.magicLevel >= 1
// ═══════════════════════════════════════════════════════
function renderMagiasAprimoradas(){
  const apr = char.aprimoramentos;
  if(!apr.magiasAprimoradas) apr.magiasAprimoradas=[];
  const escolhidas = apr.magiasAprimoradas;
  const profLvl = getMagicProficiencyLevel();
  const profNome = getMagicLevelName(profLvl);
  const profCor = getMagicLevelColor(profLvl);

  // Mapa evoluída → registro, para reconhecer magias já trocadas na lista do personagem
  const evoMap = {};
  escolhidas.forEach(m=>{ evoMap[m.evoluida]=m; });

  // Magias elegíveis: Iniciais/Sagradas que o personagem já conhece (mostrando o nome original)
  const vistos = new Set();
  const elegiveis = [];
  for(const nome of [...char.magias, ...char.magiasExtra]){
    const reg = evoMap[nome];
    const original = reg ? reg.original : nome;
    if(vistos.has(original)) continue;
    const s = SPELLS.find(x=>x.nome===original);
    if(!s || !['Magias Iniciais','Magias Sagradas'].includes(s.tipo)) continue;
    vistos.add(original);
    elegiveis.push({original, s, reg});
  }

  let html=`<h2>◈ Magias Aprimoradas</h2>
  <div class="info-box">
    Sua Progressão Mágica atual habilita o tier <b style="color:${profCor}">${profNome}</b>.
    Escolha até <b>3</b> magias que você já conhece — de <b>Magias Iniciais</b> ou <b>Magias Sagradas</b> —
    para evoluí-las à versão desse tier (vínculo por nome-base, ex.: "Acelerar" → "Acelerar ${profNome}").
    "Até 3" é teto, não garantia: se você conhece menos magias elegíveis, só pode evoluir essas.<br>
    <span style="color:var(--gold-dim);font-size:.85em">ℹ Se comprar uma Progressão Mágica maior depois, reverta e evolua novamente para alcançar o novo tier.</span>
  </div>
  <div class="info-box" style="font-size:.78em;border-color:var(--gold-dim)">
    <b>📌 Observação — Limite PM por Turno:</b> possuir magias de nível Avançado (ou superior) não garante
    que você poderá conjurá-las a qualquer momento. Se o custo em PM da magia ultrapassar seu
    <b>Limite PM por Turno</b> (Foco/Proficiência + 2, por padrão), ela não pode ser lançada naquele turno —
    mesmo com mana suficiente na reserva. Isto não é uma restrição fixa: <b>armas, equipamentos e itens
    especiais</b> da campanha, além do aprimoramento de <b>Proficiência</b>, podem elevar esse limite.
  </div>
  <div class="counter"><span class="cnt-badge${escolhidas.length>=3?' full':''}">Evoluídas: ${escolhidas.length}/3</span></div>`;

  if(!elegiveis.length){
    html+=`<div class="info-box" style="border-color:var(--red);font-size:.85em">
      Nenhuma magia elegível encontrada. Volte à aba <b>Magias</b> e escolha ao menos uma magia
      do tipo <b>Magias Iniciais</b> ou <b>Magias Sagradas</b>.
    </div>`;
  } else {
    html+=`<div class="spells-grid">`;
    for(const {original, s, reg} of elegiveis){
      const isEvo = !!reg;
      const fam = getSpellFamily(original, s.tipo, s.natureza, profLvl);
      const jaConhece = fam && (char.magias.includes(fam.nome)||char.magiasExtra.includes(fam.nome)) && !isEvo;
      const atMax = !isEvo && escolhidas.length>=3;
      const podeEvoluir = !isEvo && fam && !jaConhece && !atMax;
      const entidade=s.tipo==='Magias Sagradas'?getSpellEntity(original):null;

      html+=`<div class="sc${isEvo?' selected':''}">
        <div class="sc-name">${original}${isEvo?` <span style="color:${profCor}">→ ${reg.evoluida}</span>`:''}</div>
        <div class="sc-meta">
          <span class="tag">${s.natureza||'—'}</span>
          <span class="tag">${s.tipo.replace('Magias ','')}</span>
          ${MAGIC_LEVELS.length?`<span class="tag" style="border-color:${getMagicLevelColor(s.nivel_magia)};color:${getMagicLevelColor(s.nivel_magia)}">${getMagicLevelName(s.nivel_magia)}</span>`:''}
          ${s.duracao?`<span class="tag">${s.duracao}</span>`:''}
        </div>
        ${entidade?`<div style="font-size:.7em;color:var(--gold);margin-bottom:3px">Entidade: ${entidade}</div>`:''}
        <div class="sc-desc">${isEvo?fam.descricao:s.descricao}</div>
        ${isEvo
          ? `<button class="btn" style="font-size:.75em;margin-top:6px" onclick="toggleMagiaAprimorada('${original.replace(/'/g,"\\'")}')">↩ Reverter para "${original}"</button>`
          : fam
            ? `<button class="btn${podeEvoluir?' primary':''}" style="font-size:.75em;margin-top:6px" ${!podeEvoluir?'disabled':''} onclick="toggleMagiaAprimorada('${original.replace(/'/g,"\\'")}')">
                 ${atMax?'Limite de 3 atingido':jaConhece?`Já conhece "${fam.nome}"`:`✦ Evoluir para "${fam.nome}"`}
               </button>`
            : `<div style="font-size:.72em;color:var(--text-dim);margin-top:6px">Sem versão ${profNome} para esta magia (família incompleta no banco)</div>`
        }
      </div>`;
    }
    html+=`</div>`;
  }
  set(html);
}

function toggleMagiaAprimorada(nomeOriginal){
  const apr = char.aprimoramentos;
  if(!apr.magiasAprimoradas) apr.magiasAprimoradas=[];
  const idx = apr.magiasAprimoradas.findIndex(m=>m.original===nomeOriginal);

  if(idx>=0){
    // Reverter: troca a versão evoluída de volta pelo nome original na lista do personagem
    const {original, evoluida} = apr.magiasAprimoradas[idx];
    if(char.magias.includes(evoluida)) char.magias = char.magias.map(m=>m===evoluida?original:m);
    else if(char.magiasExtra.includes(evoluida)) char.magiasExtra = char.magiasExtra.map(m=>m===evoluida?original:m);
    apr.magiasAprimoradas.splice(idx,1);
  } else {
    if(apr.magiasAprimoradas.length>=3){showErr('Limite de 3 magias aprimoradas atingido.');return;}
    const s = SPELLS.find(x=>x.nome===nomeOriginal);
    if(!s){showErr('Magia não encontrada.');return;}
    const alvo = getMagicProficiencyLevel();
    const fam = getSpellFamily(nomeOriginal, s.tipo, s.natureza, alvo);
    if(!fam){showErr(`"${nomeOriginal}" não possui versão de tier ${getMagicLevelName(alvo)}.`);return;}
    if(char.magias.includes(fam.nome)||char.magiasExtra.includes(fam.nome)){showErr(`Você já conhece "${fam.nome}".`);return;}
    if(char.magias.includes(nomeOriginal)) char.magias = char.magias.map(m=>m===nomeOriginal?fam.nome:m);
    else if(char.magiasExtra.includes(nomeOriginal)) char.magiasExtra = char.magiasExtra.map(m=>m===nomeOriginal?fam.nome:m);
    else { showErr('Esta magia não está mais na sua lista de magias conhecidas.'); return; }
    apr.magiasAprimoradas.push({original: nomeOriginal, evoluida: fam.nome, nivel: alvo});
  }
  renderMagiasAprimoradas();
}

// ═══════════════════════════════════════════════════════
//  STEP 7: TALENTOS
// ═══════════════════════════════════════════════════════
let talentFilter='';

function renderTalentos(){
  const r=getRaceData();
  const aprTal=(char.aprimoramentos&&char.aprimoramentos.talento)||0;
  const faunoTal=getActiveFaunoAspecto()==='Macaco'?1:0;
  const prof=getPROF();
  const maxTal=prof+(r&&r.extraTal?r.extraTal:0)+aprTal+faunoTal; // Proficiência + bônus racial + aprimoramento + Aspecto Macaco
  const inherited=getInheritedTraits();

  let html=`<h2>◈ Talentos</h2>
  <div class="info-box">
    <b>Talentos = Proficiência (${prof})${r&&r.extraTal?` + ${r.extraTal} bônus racial`:''}${aprTal>0?` + ${aprTal} aprimoramento`:''}${faunoTal>0?` + ${faunoTal} Aspecto Macaco`:''} = ${maxTal} talentos</b><br>
    Talentos com <span style="color:var(--green)">bônus de estatísticas</span> têm seus efeitos calculados automaticamente na ficha.
    ${inherited.length>0?`<br><b>Traços herdados:</b> ${inherited.map(t=>t.n).join(', ')}`:''}
  </div>
  <div class="counter">
    <span class="cnt-badge${char.talentos.length>=maxTal?' full':''}">Talentos: ${char.talentos.length}/${maxTal}</span>
  </div>
  <div class="filters">
    <span class="fl">Busca:</span>
    <input class="search" value="${esc(talentFilter)}" placeholder="Buscar talento... (Enter para buscar)"
      oninput="talentFilter=this.value" onkeydown="if(event.key==='Enter')renderTalentos()">
  </div>
  <div class="tgrid">`;

  let filtered=TALENTS;
  if(talentFilter){const q=talentFilter.toLowerCase();filtered=filtered.filter(t=>t.nome.toLowerCase().includes(q)||t.descricao.toLowerCase().includes(q));}

  for(const t of filtered){
    const sel=char.talentos.includes(t.nome);
    const bns=TALENT_STAT_BONUSES[t.nome];
    const prereqErr=checkTalentPrereq(t.nome);
    const locked=!sel&&prereqErr!==null;
    html+=`<div class="tc${sel?' selected':''}${locked?' disabled':''}"
      style="${locked?'opacity:.5;cursor:not-allowed;border-color:var(--red)!important;':''}"
      onclick="toggleTalent('${t.nome.replace(/'/g,"\\'")}',${maxTal})">
      <div class="tc-name">${t.nome}${sel?' ✓':locked?' 🔒':''}</div>
      ${bns?`<div class="tc-bonus">📊 Bônus: ${bns.label}</div>`:''}
      ${locked?`<div style="font-size:.7em;color:var(--red);margin-bottom:3px">🔒 ${prereqErr}</div>`:''}
      ${!locked&&TALENT_PREREQS[t.nome]?`<div style="font-size:.7em;color:var(--green);margin-bottom:3px">✓ Pré-req: ${TALENT_PREREQS[t.nome].label} — atendido</div>`:''}
      <div class="tc-desc">${t.descricao}</div>
    </div>`;
  }
  html+=`</div>`;
  set(html);
}

function toggleTalent(name,max){
  if(char.talentos.includes(name)){char.talentos=char.talentos.filter(t=>t!==name);}
  else{
    const prereqErr=checkTalentPrereq(name);
    if(prereqErr){showErr(`Pré-requisito não atendido: ${prereqErr}.`);return;}
    if(char.talentos.length>=max){showErr(`Limite de ${max} talento(s) atingido.`);return;}
    char.talentos.push(name);
  }
  renderTalentos();
}

// ═══════════════════════════════════════════════════════
//  MERCADO — compra de equipamentos (Personagem Avançado)
// ═══════════════════════════════════════════════════════
const CURRENCY_RATES = { MB:1, MP:100, MO:10000, ML:10000000, MG:10000000000 };
let mercadoFilters = { categoria:'', tier:'', search:'' };

// Converte uma string de preço ("15 MB", "60 MP"...) para o equivalente em Moedas de Bronze (MB)
function precoEmMB(preco){
  if(!preco) return 0;
  const m=String(preco).trim().match(/([\d.,]+)\s*([A-Za-z]+)/);
  if(!m) return 0;
  const valor=parseFloat(m[1].replace(/\./g,'').replace(',','.'))||0;
  const taxa=CURRENCY_RATES[m[2].toUpperCase()]||1;
  return valor*taxa;
}

function setMF(k,v){ mercadoFilters[k]=v; renderMercado(); }

function setMercadoMoedas(v){
  const n=parseInt(v,10);
  char.mercado.moedas=isNaN(n)||n<0?0:n;
  renderMercado();
}

function comprarEquipamento(nome){
  const item=EQUIPAMENTOS.find(e=>e.nome===nome && e.tier!=='lendario');
  if(!item) return;
  const custo=precoEmMB(item.preco);
  if(char.mercado.moedas<custo){ showErr('Moedas insuficientes para comprar este item.'); return; }
  char.mercado.moedas-=custo;
  char.mercado.itens.push({ nome:item.nome, preco:item.preco, categoria:item.categoria });
  renderMercado();
}

function removerEquipamento(idx){
  const it=char.mercado.itens[idx];
  if(!it) return;
  char.mercado.moedas+=precoEmMB(it.preco);
  char.mercado.itens.splice(idx,1);
  renderMercado();
}

function renderMercado(){
  const m=char.mercado;
  const catalogo=EQUIPAMENTOS.filter(e=>e.tier!=='lendario');
  const categorias=[...new Set(catalogo.map(e=>e.categoria).filter(Boolean))].sort();

  let html=`<h2>◈ Mercado</h2>
  <div class="info-box" style="font-size:.8em">
    Informe quantas <b>Moedas de Bronze (MB)</b> seu personagem possui — a moeda usada para o cálculo
    de compras aqui — e adquira equipamentos para completar sua ficha. Itens de nível
    <b style="color:var(--red)">Lendário</b> não estão disponíveis neste mercado: são obtidos apenas
    durante a campanha, através de feitos extraordinários.
    <span style="color:var(--text-dim)">(Conversão: 100 MB = 1 MP)</span>
  </div>

  <div class="filters" style="align-items:center">
    <span class="fl">Moedas disponíveis:</span>
    <input type="number" min="0" step="1" class="search" style="max-width:140px"
      value="${m.moedas}" placeholder="0 (Enter para confirmar)"
      onkeydown="if(event.key==='Enter')setMercadoMoedas(this.value)"
      onblur="setMercadoMoedas(this.value)"> <span class="fl">MB</span>
    <span class="fl" style="margin-left:8px;color:var(--gold-dim)">≈ ${(m.moedas/100).toFixed(2)} MP</span>
  </div>`;

  if(m.itens.length){
    const gasto=m.itens.reduce((acc,it)=>acc+precoEmMB(it.preco),0);
    html+=`<div class="info-box" style="font-size:.78em">
      <b>Itens adquiridos (${m.itens.length}):</b> total gasto ≈ ${gasto} MB<br>
      <div style="margin-top:6px">${m.itens.map((it,i)=>
        `<span class="spell-pill">${it.nome} <span style="color:var(--text-dim)">(${it.preco})</span>
          <a href="javascript:void(0)" onclick="removerEquipamento(${i})" title="Remover e estornar moedas" style="color:var(--red);margin-left:4px;text-decoration:none">✕</a>
        </span>`).join('')}</div>
    </div>`;
  }

  html+=`<div class="filters">
    <span class="fl">Categoria:</span>
    <button class="fbtn${!mercadoFilters.categoria?' on':''}" onclick="setMF('categoria','')">Todas</button>
    ${categorias.map(c=>`<button class="fbtn${mercadoFilters.categoria===c?' on':''}" onclick="setMF('categoria','${c.replace(/'/g,"\\'")}')">${c}</button>`).join('')}
  </div>
  <div class="filters">
    <span class="fl">Tier:</span>
    <button class="fbtn${!mercadoFilters.tier?' on':''}" onclick="setMF('tier','')">Todos</button>
    <button class="fbtn${mercadoFilters.tier==='basico'?' on':''}" onclick="setMF('tier','basico')">Básico</button>
    <button class="fbtn${mercadoFilters.tier==='intermediario'?' on':''}" onclick="setMF('tier','intermediario')">Intermediário</button>
    <span class="fl" style="margin-left:6px">Busca:</span>
    <input class="search" value="${esc(mercadoFilters.search)}" placeholder="Buscar item... (Enter para buscar)"
      oninput="mercadoFilters.search=this.value" onkeydown="if(event.key==='Enter')renderMercado()">
  </div>`;

  let filtrados=catalogo;
  if(mercadoFilters.categoria) filtrados=filtrados.filter(e=>e.categoria===mercadoFilters.categoria);
  if(mercadoFilters.tier)      filtrados=filtrados.filter(e=>e.tier===mercadoFilters.tier);
  if(mercadoFilters.search){
    const q=mercadoFilters.search.toLowerCase();
    filtrados=filtrados.filter(e=>e.nome.toLowerCase().includes(q));
  }

  html+=`<div class="apr-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">`;
  for(const e of filtrados){
    const custo=precoEmMB(e.preco);
    const podeComprar=custo<=m.moedas;
    const tierLabel=e.tier==='intermediario'?'Intermediário':'Básico';
    const tierColor=e.tier==='intermediario'?'var(--gold)':'var(--text-dim)';
    html+=`<div class="apr-item">
      <div class="apr-nome">${e.nome}</div>
      <div style="display:flex;gap:4px;flex-wrap:wrap">
        <span class="tag" style="border-color:${tierColor};color:${tierColor}">${tierLabel}</span>
        ${e.categoria?`<span class="tag">${e.categoria}${e.subcategoria?` — ${e.subcategoria}`:''}</span>`:''}
        ${e.dano?`<span class="tag">${e.dano}${e.tipo_dano?` ${e.tipo_dano}`:''}</span>`:''}
        ${e.bonus?`<span class="tag">${e.bonus}</span>`:''}
        ${e.bonus_db?`<span class="tag">${e.bonus_db}</span>`:''}
      </div>
      ${e.propriedades?`<div class="apr-desc">${e.propriedades}</div>`:''}
      ${e.descricao?`<div class="apr-desc">${e.descricao}</div>`:''}
      ${e.requisito?`<div style="font-size:.7em;color:var(--gold-dim)">Requisito: ${e.requisito}</div>`:''}
      <div class="apr-custo">${e.preco||'—'}</div>
      <button class="btn${podeComprar?' primary':''}" style="font-size:.78em;padding:6px 12px;align-self:flex-start"
        ${podeComprar?'':'disabled'} onclick="comprarEquipamento('${e.nome.replace(/'/g,"\\'")}')">
        ${podeComprar?'Comprar':'Moedas insuficientes'}
      </button>
    </div>`;
  }
  if(!filtrados.length) html+=`<div style="color:var(--text-dim);padding:20px;grid-column:1/-1">Nenhum item encontrado.</div>`;
  html+=`</div>`;
  set(html);
}

// ═══════════════════════════════════════════════════════
//  STEP 8: FICHA FINAL
// ═══════════════════════════════════════════════════════
function renderFicha(){
  const cl=getClassData();
  const r=getRaceData();
  const kit=char.kit?KITS[char.kit]:null;
  const rb=getRacialBonuses();
  const tb=getTalentBonuses();
  const slots=getSpellSlots();
  const inherited=getInheritedTraits();

  function bonusStr(rb,tb){
    const parts=[];
    if(rb>0) parts.push(`+${rb} racial`);
    if(tb>0) parts.push(`+${tb} talento`);
    return parts.length?` <span class="sh-bonus">(${parts.join(', ')})</span>`:'';
  }

  let html=`<div class="sheet">
    <div class="sheet-head">
      <div class="sh-name">${char.name||'Sem Nome'}</div>
      <div class="sh-sub">${char.classe||'—'} • ${char.raca||'—'} • Kit ${char.kit||'—'}${char.sexo?` • ${char.sexo}`:''}</div>
    </div>
    <div class="sh-cols">
      <div>`;

  // ATRIBUTOS
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ ATRIBUTOS</div><div class="sh-sbody">`;
  for(const [a,n] of Object.entries(ATTR_NAMES)){
    const v=char.attrs[a]||0;
    const extra=a==='PRE'?r&&r.bAttrExtra?0:0:0; // só Humano tem extra mas já está nos pontos
    html+=`<div class="sh-row"><span class="sh-lbl">${n} (${a})</span><span class="sh-val">${v}</span></div>`;
  }
  html+=`</div></div>`;

  const eq=getEquipBonuses();
  const charProfs=getCharProficiencies();
  const profList=getProficienciesDisplay();

  function bonusStrEq(rVal,tVal,eVal){
    const parts=[];
    if(rVal>0) parts.push(`+${rVal} racial`);
    if(tVal>0) parts.push(`+${tVal} talento`);
    if(eVal>0) parts.push(`+${eVal} equip`);
    return parts.length?` <span class="sh-bonus">(${parts.join(', ')})</span>`:'';
  }

  // ESTATÍSTICAS
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ ESTATÍSTICAS</div><div class="sh-sbody">
    <div class="sh-row"><span class="sh-lbl">Vida</span><span class="sh-val">${calcVida()}${bonusStr(rb.vida,tb.vida)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Mana (PM)</span><span class="sh-val">${calcMana()}${bonusStr(rb.mana+(r?r.bMana:0),tb.mana)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Defesa Base (DB)</span><span class="sh-val">${calcDB()}${bonusStrEq(rb.db,tb.db,eq.db)}</span></div>
    <div class="sh-row"><span class="sh-lbl">CD Conjuração</span><span class="sh-val">${calcCD()}${bonusStr(rb.cd,tb.cd)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Lim. Mana/Turno</span><span class="sh-val">${calcLMT()}${bonusStr(rb.lmt,tb.lmt)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Proficiência</span><span class="sh-val">${getPROF()}</span></div>
    <div class="sh-row"><span class="sh-lbl">Movimento</span><span class="sh-val">${r?r.move:9} m</span></div>
    <div class="sh-row"><span class="sh-lbl">Magias Conhecidas</span><span class="sh-val">2+${getAttr('INT')}=${slots.base} base + 2 truques</span></div>
    ${slots.extra>0?`<div class="sh-row"><span class="sh-lbl">${slots.extraType} (adicional)</span><span class="sh-val">${slots.extra}</span></div>`:''}
    ${slots.extraSpells>0?`<div class="sh-row"><span class="sh-lbl">Magias (Lista Expandida)</span><span class="sh-val">+${slots.extraSpells}</span></div>`:''}
    ${slots.racialExtra?`<div class="sh-row"><span class="sh-lbl">${slots.racialExtra.type} (racial)</span><span class="sh-val">+${slots.racialExtra.count}</span></div>`:''}
  </div></div>`;

  // PERÍCIAS
  const vants=getSkillVantagens();
  const eqSkills=eq.skills;
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ PERÍCIAS</div><div class="sh-sbody">`;
  for(const sk of SKILLS){
    const lv=char.pericias[sk.n]||0;
    const eqB=eqSkills[sk.n]||0;
    const sv=getPROF()+lv+eqB;
    const lvName=lv===10?'Avançado':lv===5?'Intermediário':lv===2?'Básico':'—';
    const hasV=vants.has(sk.n);
    const rowBg=hasV?'background:rgba(74,154,90,.08);border-radius:3px':'';
    html+=`<div class="sh-row" style="${rowBg}">
      <span class="sh-lbl">${sk.n} (${sk.a})${hasV?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--green);color:var(--green);border-radius:4px">Vantagem</span>`:''}${eqB>0?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--gold);color:var(--gold);border-radius:4px">+${eqB} equip</span>`:''}</span>
      <span class="sh-val" style="font-size:.82em;font-weight:normal">${lvName} | <b>SV ${sv}</b>${eqB>0?`<span class="sh-bonus">(+${eqB} equip)</span>`:''}</span>
    </div>`;
  }
  html+=`</div></div>`;

  // TALENTOS — coluna esquerda
  if(char.talentos.length>0){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ TALENTOS</div><div class="sh-sbody">`;
    char.talentos.forEach(tn=>{
      const t=TALENTS.find(x=>x.nome===tn);
      const bns=TALENT_STAT_BONUSES[tn];
      if(t) html+=`<div class="ab"><div class="ab-name">${t.nome}${bns?` <span class="bonus-tag">${bns.label}</span>`:''}</div><div class="ab-desc">${t.descricao}</div></div>`;
    });
    html+=`</div></div>`;
  }


  html+=`</div><div>`;

  // HABILIDADES DE CLASSE
  if(cl){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ CLASSE — ${char.classe}</div><div class="sh-sbody">
      <div class="ab"><div class="ab-name">${cl.hab1}</div><div class="ab-desc">${cl.h1}</div></div>
      <div class="ab"><div class="ab-name">${cl.hab2}</div><div class="ab-desc">${cl.h2}</div></div>
      ${cl.armas!=='Nenhuma'?`<div style="font-size:.78em;color:var(--text-dim);margin-top:4px">Proficiências: ${cl.armas}</div>`:''}
    </div></div>`;
  }

  // ENTIDADE ALIADA
  if(char.entidade){
    const ent=ENTITIES.find(e=>e.nome===char.entidade);
    if(ent){
      const elemC=ELEM_COLORS[ent.elemento]||'var(--gold)';
      const icon=ENTITY_ICONS[ent.tipo]||'◈';
      html+=`<div class="sh-sec" style="border-color:${elemC}66">
        <div class="sh-stitle" style="color:${elemC}">◈ ENTIDADE ALIADA — ${icon} ${ent.nome}</div>
        <div class="sh-sbody">
          <div style="font-size:.78em;color:var(--text-dim);font-style:italic;margin-bottom:6px">${ent.titulo} • ${ent.elemento}</div>
          <div style="font-size:.82em;color:var(--text);margin-bottom:8px">${ent.descricao}</div>
          <div class="ab" style="border-left:2px solid ${elemC};padding-left:8px">
            <div class="ab-name" style="color:${elemC}">⚡ ${ent.efeito_nome}</div>
            <div class="ab-desc">${ent.efeito}</div>
          </div>
        </div>
      </div>`;
    }
  }

  // HABILIDADES RACIAIS
  if(r){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ RAÇA — ${char.raca}</div><div class="sh-sbody">`;
    if(RACIAL_DATA[char.raca]){
      const rd=RACIAL_DATA[char.raca];
      html+=`<div class="sh-row"><span class="sh-lbl">Altura</span><span class="sh-val">${rd.altura}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Deslocamento</span><span class="sh-val">${rd.movimento}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Expectativa de Vida</span><span class="sh-val">${rd.expectativa_vida}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Idiomas Nativos</span><span class="sh-val" style="font-size:.78em">${rd.idiomas_nativos}</span></div>`;
      html+='<div style="border-top:1px solid var(--bg3);margin:6px 0"></div>';
    }
    r.traits.forEach(t=>{
      html+=`<div class="ab"><div class="ab-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</div><div class="ab-desc">${t.d}</div></div>`;
    });
    if(inherited.length>0){
      html+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px"><div class="ab-name" style="font-size:.78em;color:var(--text-dim)">TRAÇOS HERDADOS</div>`;
      inherited.forEach(t=>{
        html+=`<div class="ab"><div class="ab-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</div><div class="ab-desc">${t.d}</div></div>`;
      });
      html+=`</div>`;
    }
    // Fauno — aspecto bestial com bônus completo
    if(char.raca==='Fauno'&&char.faunoAspecto){
      const asp=FAUNO_ASPECTOS[char.faunoAspecto];
      if(asp) html+=`<div class="ab" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <div class="ab-name">Traços Bestiais — Aspecto ${asp.label} <span class="bonus-tag">Ativo</span></div>
        <div class="ab-desc">${asp.desc}<br><b>Bônus quando ativado:</b> ${asp.ativo}</div>
      </div>`;
    }
    if(char.draconatoElem) html+=`<div style="font-size:.78em;color:var(--text-dim);margin-top:4px">Elemento da Linhagem: <b>${char.draconatoElem}</b></div>`;
    html+=`</div></div>`;
    // Idiomas
    const allKnown=getKnownLangs();
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ IDIOMAS</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:5px">`;
    allKnown.forEach(l=>{
      const rl=char.raca?RACE_LANGS[char.raca]:null;
      const isFixed=['Comum',...(rl?rl.fixos:[])].includes(l);
      html+=`<span class="spell-pill" style="border-color:${isFixed?'var(--green)':'var(--gold)'};color:${isFixed?'var(--green)':'var(--gold)'}">${l}</span>`;
    });
    html+=`</div></div>`;
  }

  // DESCRIÇÃO
  if(char.backstory||char.aparencia){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ DESCRIÇÃO</div><div class="sh-sbody">`;
    if(char.aparencia) html+=`<div class="ab"><div class="ab-name">Aparência</div><div class="ab-desc">${esc(char.aparencia)}</div></div>`;
    if(char.backstory) html+=`<div class="ab"><div class="ab-name">História</div><div class="ab-desc">${esc(char.backstory)}</div></div>`;
    html+=`</div></div>`;
  }

  html+=`</div></div></div>`;

  // ── Segunda folha: Equipamentos, Proficiências e Anotações/Inventário (page-break-before:always em @media print) ──
  {
    html+=`<div class="print-page-break">`;

    // EQUIPAMENTOS
    if(kit){
      const kitEB=KIT_EQUIP_BONUSES[char.kit];
      html+=`<div class="sh-sec"><div class="sh-stitle">◈ EQUIPAMENTOS — Kit ${char.kit}</div><div class="sh-sbody">`;
      kit.items.forEach(i=>{
        const ebItem=kitEB?kitEB.items.find(x=>x.n===i.n):null;
        const needProf=ebItem&&ebItem.prof&&!charProfs.has(ebItem.prof);
        html+=`<div class="sh-row" style="${needProf?'background:rgba(204,68,68,.07);':''}"}>
          <span class="sh-lbl">${i.n}${needProf?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--red);color:var(--red);border-radius:4px">Sem Prof.</span>`:''}</span>
          <span style="font-size:.78em;color:var(--text-dim)">${i.d}${ebItem&&ebItem.prof&&charProfs.has(ebItem.prof)?` <span style="color:var(--green);font-size:.9em">✓</span>`:''}</span>
        </div>`;
      });
      html+=`<div style="margin-top:8px">${kit.extras.map(e=>`<span class="spell-pill">${e}</span>`).join('')}</div>`;
      html+=`</div></div>`;
    }

    // ITENS DO MERCADO — equipamentos comprados pelo personagem (Personagem Avançado)
    if(char.tipo==='avancado' && char.mercado && char.mercado.itens.length){
      html+=`<div class="sh-sec"><div class="sh-stitle">◈ EQUIPAMENTOS — Adquiridos no Mercado</div><div class="sh-sbody">`;
      char.mercado.itens.forEach(it=>{
        html+=`<div class="sh-row">
          <span class="sh-lbl">${it.nome}${it.categoria?` <span style="font-size:.7em;color:var(--text-dim)">(${it.categoria})</span>`:''}</span>
          <span style="font-size:.78em;color:var(--gold-dim)">${it.preco||'—'}</span>
        </div>`;
      });
      html+=`<div style="font-size:.75em;color:var(--text-dim);margin-top:6px">Moedas restantes: <b style="color:var(--gold)">${char.mercado.moedas} MB</b></div>`;
      html+=`</div></div>`;
    }

    // PROFICIÊNCIAS
    if(profList.length>0){
      html+=`<div class="sh-sec"><div class="sh-stitle">◈ PROFICIÊNCIAS</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:5px;padding:6px 0">`;
      profList.forEach(p=>{
        const isUni=p.origem==='universal';
        html+=`<span class="spell-pill" style="border-color:${isUni?'var(--border)':'var(--gold)'};color:${isUni?'var(--text-dim)':'var(--gold)'}" title="${p.origem}">${p.label}</span>`;
      });
      html+=`</div></div>`;
    }

    // ANOTAÇÕES E INVENTÁRIO — preenche o espaço restante da folha com linhas para escrever à mão
    html+=`<div class="sh-sec notes-sec"><div class="sh-stitle">◈ ANOTAÇÕES E INVENTÁRIO</div><div class="sh-sbody notes-lines">`;
    for(let i=0;i<18;i++) html+=`<div class="notes-line"></div>`;
    html+=`</div></div>`;

    html+=`</div>`;
  }

  // ── Terceira folha: Magias & Truques (page-break-before:always em @media print) ──
  {
    const todasMagias=[...char.magias,...char.magiasExtra];
    if(todasMagias.length>0){
      const truquesFicha=todasMagias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo==='Truque';});
      const outrasFicha=todasMagias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return !s||s.tipo!=='Truque';});
      html+=`<div class="print-page-break"><div class="sh-sec spells-sec">
        <div class="sh-stitle">◈ MAGIAS & TRUQUES — ${esc(char.name)||'Personagem'} • ${char.classe||'—'}</div>
        <div class="sh-sbody">`;
      if(truquesFicha.length>0){
        html+=`<div style="margin-bottom:8px"><b style="color:var(--text-dim);font-size:.78em;letter-spacing:1px">TRUQUES (0 PM — À VONTADE)</b></div>`;
        for(const mn of truquesFicha){
          const s=SPELLS.find(x=>x.nome===mn); if(!s) continue;
          const nc=ELEM_COLORS[s.natureza]||'var(--border)';
          html+=`<div class="ab">
            <div class="ab-name" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${s.nome}
              <span class="tag" style="border-color:${nc};color:${nc}">${s.natureza||'—'}</span>
              <span class="tag" style="border-color:var(--green);color:var(--green)">0 PM</span>
              ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
              ${s.alcance?`<span class="tag">${s.alcance}</span>`:''}
              ${s.duracao?`<span class="tag">${s.duracao}</span>`:''}
            </div>
            <div class="ab-desc">${s.descricao}</div>
          </div>`;
        }
      }
      if(outrasFicha.length>0){
        html+=`<div style="margin-bottom:6px;margin-top:${truquesFicha.length?'12px':'0'}"><b style="color:var(--text-dim);font-size:.78em;letter-spacing:1px">MAGIAS</b></div>`;
        for(const mn of outrasFicha){
          const s=SPELLS.find(x=>x.nome===mn); if(!s) continue;
          const nc=ELEM_COLORS[s.natureza]||'var(--border)';
          const isAdditional=char.magiasExtra.includes(mn);
          const entidade=s.tipo==='Magias Sagradas'?getSpellEntity(s.nome):null;
          html+=`<div class="ab">
            <div class="ab-name" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${s.nome}
              <span class="tag" style="border-color:${nc};color:${nc}">${s.natureza||'—'}</span>
              <span class="tag">${s.custo} PM</span>
              ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
              ${s.alcance?`<span class="tag">${s.alcance}</span>`:''}
              ${s.duracao?`<span class="tag">${s.duracao}</span>`:''}
              ${isAdditional?`<span class="tag" style="border-color:var(--purple);color:var(--purple)">adicional</span>`:''}
            </div>
            ${entidade?`<div style="font-size:.7em;color:var(--gold);margin-bottom:2px">Entidade: ${entidade}</div>`:''}
            <div class="ab-desc">${s.descricao}</div>
          </div>`;
        }
      }
      html+=`</div></div></div>`;
    }
  }
  set(html);
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function set(html){document.getElementById('content').innerHTML=html;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

(async () => {
  const ok = await loadFromDB();
  if (ok) render();
})();
</script>
</body>
</html>

  const TIPO_LABEL={Elemental:'Entidades Elementais',Caótica:'Divindades Caóticas',Sagrada:'Entidades Sagradas (Os Pilares)'};
  const TIPO_DESC={
    Elemental:'Espíritos primordiais dos elementos que habitam o mundo desde os primórdios.',
    Caótica:'Primordiais da Corrupção, nascidos da colisão entre o Tudo e o Nada.',
    Sagrada:'Os Cinco Pilares — fragmentos do Tudo que governam os grandes domínios da existência.',
  };

  let html=`<h2>◈ Entidade Aliada</h2>${contextoHtml}`;

  for(const [tipo,lista] of Object.entries(grupos)){
    const icon=ENTITY_ICONS[tipo]||'◈';
    const elemColor=ELEM_COLORS[tipo]||'var(--gold)';
    html+=`<div style="margin:18px 0 8px">
      <div style="font-size:1em;font-weight:bold;color:${elemColor};letter-spacing:1px;border-bottom:1px solid ${elemColor}33;padding-bottom:6px;margin-bottom:12px">
        ${icon} ${TIPO_LABEL[tipo]||tipo}
        <span style="font-size:.8em;font-weight:normal;color:var(--text-dim);margin-left:10px">${TIPO_DESC[tipo]||''}</span>
      </div>
      <div class="tgrid" style="grid-template-columns:repeat(auto-fill,minmax(290px,1fr))">`;
    for(const ent of lista){
      const sel=char.entidade===ent.nome;
      const elemC=ELEM_COLORS[ent.elemento]||'var(--gold)';
      html+=`<div class="tc${sel?' selected':''}"
        style="cursor:pointer;border-color:${sel?elemC:'var(--border)'};${sel?`box-shadow:0 0 12px ${elemC}55`:''}"
        onclick="char.entidade=${sel?'null':`'${ent.nome.replace(/'/g,"\\'")}' `};renderEntidade()">
        <div class="tc-name" style="color:${elemC}">${ent.nome}${sel?' ✓':''}</div>
        <div style="font-size:.75em;color:var(--text-dim);margin-bottom:4px;font-style:italic">${ent.titulo}</div>
        <div style="font-size:.7em;margin-bottom:6px;padding:3px 8px;border-radius:10px;display:inline-block;background:${elemC}22;color:${elemC};border:1px solid ${elemC}44">${ent.elemento}</div>
        <div class="tc-desc" style="margin-bottom:8px">${ent.descricao}</div>

}

function renderFicha(){
  const cl=getClassData();
  const r=getRaceData();
  const kit=char.kit?KITS[char.kit]:null;
  const rb=getRacialBonuses();
  const tb=getTalentBonuses();
  const slots=getSpellSlots();
  const inherited=getInheritedTraits();

  function bonusStr(rb,tb){
    const parts=[];
    if(rb>0) parts.push(`+${rb} racial`);
    if(tb>0) parts.push(`+${tb} talento`);
    return parts.length?` <span class="sh-bonus">(${parts.join(', ')})</span>`:'';
  }

  let html=`<div class="sheet">
    <div class="sheet-head">
      <div class="sh-name">${char.name||'Sem Nome'}</div>
      <div class="sh-sub">${char.classe||'—'} • ${char.raca||'—'} • Kit ${char.kit||'—'}${char.sexo?` • ${char.sexo}`:''}</div>
    </div>
    <div class="sh-cols">
      <div>`;

  // ATRIBUTOS
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ ATRIBUTOS</div><div class="sh-sbody">`;
  for(const [a,n] of Object.entries(ATTR_NAMES)){
    const v=char.attrs[a]||0;
    const extra=a==='PRE'?r&&r.bAttrExtra?0:0:0; // só Humano tem extra mas já está nos pontos
    html+=`<div class="sh-row"><span class="sh-lbl">${n} (${a})</span><span class="sh-val">${v}</span></div>`;
  }
  html+=`</div></div>`;

  const eq=getEquipBonuses();
  const charProfs=getCharProficiencies();

  function bonusStrEq(rVal,tVal,eVal){
    const parts=[];
    if(rVal>0) parts.push(`+${rVal} racial`);
    if(tVal>0) parts.push(`+${tVal} talento`);
    if(eVal>0) parts.push(`+${eVal} equip`);
    return parts.length?` <span class="sh-bonus">(${parts.join(', ')})</span>`:'';
  }

  // ESTATÍSTICAS
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ ESTATÍSTICAS</div><div class="sh-sbody">
    <div class="sh-row"><span class="sh-lbl">Vida</span><span class="sh-val">${calcVida()}${bonusStr(rb.vida,tb.vida)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Mana (PM)</span><span class="sh-val">${calcMana()}${bonusStr(rb.mana+(r?r.bMana:0),tb.mana)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Defesa Base (DB)</span><span class="sh-val">${calcDB()}${bonusStrEq(rb.db,tb.db,eq.db)}</span></div>
    <div class="sh-row"><span class="sh-lbl">CD Conjuração</span><span class="sh-val">${calcCD()}${bonusStr(rb.cd,tb.cd)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Lim. Mana/Turno</span><span class="sh-val">${calcLMT()}${bonusStr(rb.lmt,tb.lmt)}</span></div>
    <div class="sh-row"><span class="sh-lbl">Proficiência</span><span class="sh-val">${PROF}</span></div>
    <div class="sh-row"><span class="sh-lbl">Movimento</span><span class="sh-val">${r?r.move:9} m</span></div>
    <div class="sh-row"><span class="sh-lbl">Magias Conhecidas</span><span class="sh-val">2+${getAttr('INT')}=${slots.base} base + 2 truques</span></div>
    ${slots.extra>0?`<div class="sh-row"><span class="sh-lbl">${slots.extraType} (adicional)</span><span class="sh-val">${slots.extra}</span></div>`:''}
    ${slots.extraSpells>0?`<div class="sh-row"><span class="sh-lbl">Magias (Lista Expandida)</span><span class="sh-val">+${slots.extraSpells}</span></div>`:''}
    ${slots.racialExtra?`<div class="sh-row"><span class="sh-lbl">${slots.racialExtra.type} (racial)</span><span class="sh-val">+${slots.racialExtra.count}</span></div>`:''}
  </div></div>`;

  // PERÍCIAS
  const vants=getSkillVantagens();
  const eqSkills=eq.skills;
  html+=`<div class="sh-sec"><div class="sh-stitle">◈ PERÍCIAS</div><div class="sh-sbody">`;
  for(const sk of SKILLS){
    const lv=char.pericias[sk.n]||0;
    const eqB=eqSkills[sk.n]||0;
    const sv=PROF+lv+eqB;
    const lvName=lv===10?'Avançado':lv===5?'Intermediário':lv===2?'Básico':'—';
    const hasV=vants.has(sk.n);
    const rowBg=hasV?'background:rgba(74,154,90,.08);border-radius:3px':'';
    html+=`<div class="sh-row" style="${rowBg}">
      <span class="sh-lbl">${sk.n} (${sk.a})${hasV?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--green);color:var(--green);border-radius:4px">Vantagem</span>`:''}${eqB>0?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--gold);color:var(--gold);border-radius:4px">+${eqB} equip</span>`:''}</span>
      <span class="sh-val" style="font-size:.82em;font-weight:normal">${lvName} | <b>SV ${sv}</b>${eqB>0?`<span class="sh-bonus">(+${eqB} equip)</span>`:''}</span>
    </div>`;
  }
  html+=`</div></div>`;

  // TALENTOS — coluna esquerda
  if(char.talentos.length>0){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ TALENTOS</div><div class="sh-sbody">`;
    char.talentos.forEach(tn=>{
      const t=TALENTS.find(x=>x.nome===tn);
      const bns=TALENT_STAT_BONUSES[tn];
      if(t) html+=`<div class="ab"><div class="ab-name">${t.nome}${bns?` <span class="bonus-tag">${bns.label}</span>`:''}</div><div class="ab-desc">${t.descricao}</div></div>`;
    });
    html+=`</div></div>`;
  }

  // MAGIAS & TRUQUES — coluna esquerda (truques com descrição completa)
  {
    const todasMagias=[...char.magias,...char.magiasExtra];
    if(todasMagias.length>0){
      html+=`<div class="sh-sec"><div class="sh-stitle">◈ MAGIAS & TRUQUES</div><div class="sh-sbody">`;
      const truques=todasMagias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo==='Truque';});
      const outras=todasMagias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return !s||s.tipo!=='Truque';});
      if(truques.length>0){
        html+=`<div style="margin-bottom:6px"><b style="color:var(--text-dim);font-size:.78em;letter-spacing:1px">TRUQUES (0 PM — À VONTADE)</b></div>`;
        for(const mn of truques){
          const s=SPELLS.find(x=>x.nome===mn); if(!s) continue;
          const nc=ELEM_COLORS[s.natureza]||'var(--border)';
          html+=`<div class="ab">
            <div class="ab-name" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${s.nome}
              <span class="tag" style="border-color:${nc};color:${nc}">${s.natureza||'—'}</span>
              <span class="tag" style="border-color:var(--green);color:var(--green)">0 PM</span>
              ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
              ${s.alcance?`<span class="tag">${s.alcance}</span>`:''}
            </div>
            <div class="ab-desc">${s.descricao}</div>
          </div>`;
        }
      }
      if(outras.length>0){
        html+=`<div style="margin-bottom:6px;margin-top:${truques.length?'10px':'0'}"><b style="color:var(--text-dim);font-size:.78em;letter-spacing:1px">MAGIAS</b></div>`;
        for(const mn of outras){
          const s=SPELLS.find(x=>x.nome===mn); if(!s) continue;
          const nc=ELEM_COLORS[s.natureza]||'var(--border)';
          const isAdditional=char.magiasExtra.includes(mn);
          html+=`<div class="ab">
            <div class="ab-name" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
              ${s.nome}
              <span class="tag" style="border-color:${nc};color:${nc}">${s.natureza||'—'}</span>
              <span class="tag">${s.custo} PM</span>
              ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
              ${s.alcance?`<span class="tag">${s.alcance}</span>`:''}
              ${isAdditional?`<span class="tag" style="border-color:var(--purple);color:var(--purple)">adicional</span>`:''}
            </div>
            <div class="ab-desc">${s.descricao}</div>
          </div>`;
        }
      }
      html+=`</div></div>`;
    }
  }

  html+=`</div><div>`;

  // HABILIDADES DE CLASSE
  if(cl){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ CLASSE — ${char.classe}</div><div class="sh-sbody">
      <div class="ab"><div class="ab-name">${cl.hab1}</div><div class="ab-desc">${cl.h1}</div></div>
      <div class="ab"><div class="ab-name">${cl.hab2}</div><div class="ab-desc">${cl.h2}</div></div>
      ${cl.armas!=='Nenhuma'?`<div style="font-size:.78em;color:var(--text-dim);margin-top:4px">Proficiências: ${cl.armas}</div>`:''}
    </div></div>`;
  }

  // ENTIDADE ALIADA
  if(char.entidade){
    const ent=ENTITIES.find(e=>e.nome===char.entidade);
    if(ent){
      const elemC=ELEM_COLORS[ent.elemento]||'var(--gold)';
      const icon=ENTITY_ICONS[ent.tipo]||'◈';
      html+=`<div class="sh-sec" style="border-color:${elemC}66">
        <div class="sh-stitle" style="color:${elemC}">◈ ENTIDADE ALIADA — ${icon} ${ent.nome}</div>
        <div class="sh-sbody">
          <div style="font-size:.78em;color:var(--text-dim);font-style:italic;margin-bottom:6px">${ent.titulo} • ${ent.elemento}</div>
          <div style="font-size:.82em;color:var(--text);margin-bottom:8px">${ent.descricao}</div>
          <div class="ab" style="border-left:2px solid ${elemC};padding-left:8px">
            <div class="ab-name" style="color:${elemC}">⚡ ${ent.efeito_nome}</div>
            <div class="ab-desc">${ent.efeito}</div>
          </div>
        </div>
      </div>`;
    }
  }

  // HABILIDADES RACIAIS
  if(r){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ RAÇA — ${char.raca}</div><div class="sh-sbody">`;
    if(RACIAL_DATA[char.raca]){
      const rd=RACIAL_DATA[char.raca];
      html+=`<div class="sh-row"><span class="sh-lbl">Altura</span><span class="sh-val">${rd.altura}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Deslocamento</span><span class="sh-val">${rd.movimento}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Expectativa de Vida</span><span class="sh-val">${rd.expectativa_vida}</span></div>`;
      html+=`<div class="sh-row"><span class="sh-lbl">Idiomas Nativos</span><span class="sh-val" style="font-size:.78em">${rd.idiomas_nativos}</span></div>`;
      html+='<div style="border-top:1px solid var(--bg3);margin:6px 0"></div>';
    }
    r.traits.forEach(t=>{
      html+=`<div class="ab"><div class="ab-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</div><div class="ab-desc">${t.d}</div></div>`;
    });
    if(inherited.length>0){
      html+=`<div style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px"><div class="ab-name" style="font-size:.78em;color:var(--text-dim)">TRAÇOS HERDADOS</div>`;
      inherited.forEach(t=>{
        html+=`<div class="ab"><div class="ab-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</div><div class="ab-desc">${t.d}</div></div>`;
      });
      html+=`</div>`;
    }
    // Fauno — aspecto bestial com bônus completo
    if(char.raca==='Fauno'&&char.faunoAspecto){
      const asp=FAUNO_ASPECTOS[char.faunoAspecto];
      if(asp) html+=`<div class="ab" style="border-top:1px solid var(--border);margin-top:8px;padding-top:8px">
        <div class="ab-name">Traços Bestiais — Aspecto ${asp.label} <span class="bonus-tag">Ativo</span></div>
        <div class="ab-desc">${asp.desc}<br><b>Bônus quando ativado:</b> ${asp.ativo}</div>
      </div>`;
    }
    if(char.draconatoElem) html+=`<div style="font-size:.78em;color:var(--text-dim);margin-top:4px">Elemento da Linhagem: <b>${char.draconatoElem}</b></div>`;
    html+=`</div></div>`;
    // Idiomas
    const allKnown=getKnownLangs();
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ IDIOMAS</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:5px">`;
    allKnown.forEach(l=>{
      const rl=char.raca?RACE_LANGS[char.raca]:null;
      const isFixed=['Comum',...(rl?rl.fixos:[])].includes(l);
      html+=`<span class="spell-pill" style="border-color:${isFixed?'var(--green)':'var(--gold)'};color:${isFixed?'var(--green)':'var(--gold)'}">${l}</span>`;
    });
    html+=`</div></div>`;
  }

  // PROFICIÊNCIAS
  const profList=getProficienciesDisplay();
  if(profList.length>0){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ PROFICIÊNCIAS</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:5px;padding:6px 0">`;
    profList.forEach(p=>{
      const isUni=p.origem==='universal';
      html+=`<span class="spell-pill" style="border-color:${isUni?'var(--border)':'var(--gold)'};color:${isUni?'var(--text-dim)':'var(--gold)'}" title="${p.origem}">${p.label}</span>`;
    });
    html+=`</div></div>`;
  }

  // EQUIPAMENTOS
  if(kit){
    const kitEB=KIT_EQUIP_BONUSES[char.kit];
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ EQUIPAMENTOS — Kit ${char.kit}</div><div class="sh-sbody">`;
    kit.items.forEach(i=>{
      const ebItem=kitEB?kitEB.items.find(x=>x.n===i.n):null;
      const needProf=ebItem&&ebItem.prof&&!charProfs.has(ebItem.prof);
      html+=`<div class="sh-row" style="${needProf?'background:rgba(204,68,68,.07);':''}"}>
        <span class="sh-lbl">${i.n}${needProf?` <span style="font-size:.68em;padding:1px 4px;border:1px solid var(--red);color:var(--red);border-radius:4px">Sem Prof.</span>`:''}</span>
        <span style="font-size:.78em;color:var(--text-dim)">${i.d}${ebItem&&ebItem.prof&&charProfs.has(ebItem.prof)?` <span style="color:var(--green);font-size:.9em">✓</span>`:''}</span>
      </div>`;
    });
    html+=`<div style="margin-top:8px">${kit.extras.map(e=>`<span class="spell-pill">${e}</span>`).join('')}</div>`;
    html+=`</div></div>`;
  }

  // DESCRIÇÃO
  if(char.backstory||char.aparencia){
    html+=`<div class="sh-sec"><div class="sh-stitle">◈ DESCRIÇÃO</div><div class="sh-sbody">`;
    if(char.aparencia) html+=`<div class="ab"><div class="ab-name">Aparência</div><div class="ab-desc">${esc(char.aparencia)}</div></div>`;
    if(char.backstory) html+=`<div class="ab"><div class="ab-name">História</div><div class="ab-desc">${esc(char.backstory)}</div></div>`;
    html+=`</div></div>`;
  }

  html+=`
  <div style="text-align:center;padding:40px 0 24px">
    <button onclick="char.tipo=null;step=0;render()" style="padding:12px 32px;background:transparent;border:1px solid var(--gold-dim);border-radius:8px;color:var(--gold);cursor:pointer;font-family:inherit;font-size:.9em;letter-spacing:1px;transition:all .2s" onmouseover="this.style.background='rgba(201,162,39,.12)'" onmouseout="this.style.background='transparent'">← Criar Novo Personagem</button>
  </div>
  </div></div></div>`;
  set(html);
}

// ═══════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════
function set(html){document.getElementById('content').innerHTML=html;}
function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

(async () => {
  const ok = await loadFromDB();
  if (ok) render();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔ Reino Mágico — Bestiário</title>
<style>
:root{--bg:#0f0c0a;--bg2:#1a1510;--bg3:#241d14;--border:#4a3820;--gold:#c9a227;--gold-dim:#8a6d1a;--text:#e8d9b8;--text-dim:#9a8870;--card-bg:#1e1710;--card-border:#3a2e1e;--sel:#2a2008;--green:#4a9a5a;--red:#c44;--blue:#4a7fc4;--purple:#8a4ac4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;min-height:100vh;background-image:radial-gradient(ellipse at center,#1a130a 0%,#080503 100%);}
#app{max-width:1200px;margin:0 auto;padding:16px;}
header{text-align:center;padding:16px 0 8px;font-size:1.6em;letter-spacing:3px;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.4);border-bottom:2px solid var(--border);margin-bottom:16px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}

/* ── Tela de loading / erro ─────────────────────────── */
#db-loading{position:fixed;inset:0;background:#0f0c0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:16px;}
#db-error{position:fixed;inset:0;background:#0f0c0a;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:9998;gap:12px;padding:20px;text-align:center;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:40px;height:40px;border:3px solid #4a3820;border-top-color:#c9a227;border-radius:50%;animation:spin .8s linear infinite;}

/* ── Tela de apresentação ───────────────────────────── */
.intro{display:flex;flex-direction:column;align-items:center;gap:20px;text-align:center;}
.intro-title{font-size:1.4em;color:var(--gold);letter-spacing:2px;}
.intro-sub{color:var(--text-dim);font-size:.85em;letter-spacing:1px;}
.intro-map{max-width:100%;border:2px solid var(--border);border-radius:10px;box-shadow:0 0 30px rgba(0,0,0,.6);}
.intro-text{max-width:760px;text-align:left;line-height:1.7;font-size:.92em;}
.intro-text p{margin-bottom:10px;}
.intro-sign{text-align:right;color:var(--gold-dim);font-style:italic;margin-top:6px;}
.intro-divider{width:120px;height:2px;background:var(--gold-dim);margin:8px auto;}

/* ── Filtros ─────────────────────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;align-items:center;}
.fl{font-size:.75em;color:var(--text-dim);white-space:nowrap;}
.finput, .fselect{padding:6px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:.82em;}
.finput{width:200px;}
.finput:focus, .fselect:focus{outline:none;border-color:var(--gold);}
.fselect option{background:var(--bg2);}
.results-count{font-size:.78em;color:var(--text-dim);margin-bottom:10px;}

/* ── Layout catálogo ─────────────────────────────────── */
.layout{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start;}
@media (max-width:860px){.layout{grid-template-columns:1fr;}}
.creatureList{display:flex;flex-direction:column;gap:6px;max-height:78vh;overflow-y:auto;padding-right:4px;}
.creatureItem{display:flex;gap:10px;align-items:center;text-align:left;background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;font-family:inherit;color:var(--text);}
.creatureItem:hover{border-color:var(--gold-dim);background:#221c12;}
.creatureItem.active{border-color:var(--gold);background:var(--sel);}
.creatureThumb{width:48px;height:48px;object-fit:cover;border-radius:6px;border:1px solid var(--card-border);flex-shrink:0;background:var(--bg3);}
.creatureInfo{flex:1;min-width:0;}
.creatureName{font-weight:bold;color:var(--gold);font-size:.9em;}
.creatureMeta{font-size:.7em;color:var(--text-dim);margin-top:2px;}
.threatTag{font-size:.65em;padding:1px 6px;border-radius:8px;border:1px solid var(--border);color:var(--text-dim);background:var(--bg3);display:inline-block;margin-top:3px;}

/* ── Detalhe ─────────────────────────────────────────── */
.detailEmpty{display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--text-dim);font-size:.9em;border:1px dashed var(--border);border-radius:10px;}
.detailCard{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:18px;}
.detailHead{display:flex;gap:16px;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;}
.detailImg{width:180px;height:180px;object-fit:cover;border-radius:8px;border:1px solid var(--card-border);cursor:zoom-in;}

/* ── Lightbox ────────────────────────────────────────── */
.lightbox{position:fixed;inset:0;background:rgba(8,5,3,.9);display:none;align-items:center;justify-content:center;z-index:1000;padding:24px;cursor:zoom-out;}
.lightbox.open{display:flex;}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;border:2px solid var(--border);box-shadow:0 0 40px rgba(0,0,0,.7);}
.detailHeadInfo{flex:1;min-width:200px;}
.detailName{font-size:1.4em;color:var(--gold);margin-bottom:6px;}
.detailTags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px;}
.tag{font-size:.7em;padding:2px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);}
.detailQuote{font-style:italic;color:var(--text-dim);font-size:.85em;border-left:2px solid var(--gold-dim);padding-left:10px;margin-top:6px;white-space:pre-line;}

.sectionTitle{font-size:.8em;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:4px;margin:16px 0 8px;}
.detailText{font-size:.86em;line-height:1.65;white-space:pre-line;color:var(--text);}
.detailText + .detailText{margin-top:8px;}

.statsGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.statBox{background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:8px;text-align:center;}
.statLabel{font-size:.65em;color:var(--text-dim);letter-spacing:1px;}
.statValue{font-size:1.1em;color:var(--gold);margin-top:2px;}
.statValue.empty{color:var(--text-dim);font-size:.75em;}

.infoTable{width:100%;border-collapse:collapse;font-size:.84em;}
.infoTable td{padding:5px 8px;border-bottom:1px solid var(--bg3);vertical-align:top;}
.infoTable td:first-child{color:var(--text-dim);white-space:nowrap;width:160px;}
.infoTable td:last-child{color:var(--text);}
.empty-val{color:var(--text-dim);font-style:italic;}

.abilityBox{background:var(--card-bg);border:1px solid var(--card-border);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:.82em;line-height:1.5;}
.abilityBox.empty{color:var(--text-dim);font-style:italic;}

.itemsList{display:flex;flex-wrap:wrap;gap:5px;}
.itemPill{font-size:.74em;padding:2px 8px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--text);}

/* ── Botões de navegação ─────────────────────────────── */
.topNav{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.btn{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;font-size:.85em;transition:all .2s;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.primary{background:var(--gold-dim);border-color:var(--gold);color:#1a1000;font-weight:bold;}
.btn.primary:hover{background:var(--gold);}

/* ── Abas (estilo página Mecânicas) ───────────────────── */
.tabs{position:sticky;top:0;z-index:50;background:rgba(15,12,10,.96);border-bottom:1px solid var(--border);backdrop-filter:blur(8px);display:flex;gap:0;overflow-x:auto;margin-bottom:18px;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tabBtn{padding:12px 20px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:inherit;font-size:.85em;letter-spacing:.8px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.tabBtn:hover{color:var(--text);}
.tabActive{color:var(--gold);border-bottom-color:var(--gold);}

/* ── Cabeçalho de capítulo / seções (estilo Mecânicas) ── */
.chHero{text-align:center;padding:24px 0 22px;border-bottom:1px solid var(--border);margin-bottom:30px;}
.chTitle{font-size:1.7em;color:var(--gold);letter-spacing:2px;text-shadow:0 0 20px rgba(201,162,39,.25);margin-bottom:10px;}
.chDivider{width:80px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 14px;}
.chLead{color:var(--text-dim);font-size:.9em;font-style:italic;line-height:1.6;max-width:620px;margin:0 auto;}

.sec{margin-bottom:36px;}
.secTitle{font-size:1.05em;color:var(--gold);letter-spacing:2px;border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:16px;}
.secTitle::before{content:'◈ ';color:var(--gold-dim);}
.secSubTitle{font-size:.85em;color:var(--gold-dim);letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 10px;}
.secText{color:var(--text);line-height:1.75;font-size:.88em;margin-bottom:12px;}

.langTree{font-family:'Courier New',monospace;white-space:pre;font-size:.76em;color:var(--text-dim);background:var(--bg3);border:1px solid var(--card-border);border-radius:8px;padding:14px;overflow-x:auto;line-height:1.45;margin-bottom:14px;}
.secQuote{font-style:italic;color:var(--text-dim);border-left:2px solid var(--gold-dim);padding-left:12px;margin-bottom:14px;font-size:.9em;line-height:1.7;}
.secSign{text-align:right;color:var(--gold-dim);font-style:italic;font-size:.85em;margin:-4px 0 18px;white-space:pre-line;}

/* ── Sub-abas de capítulo (Idiomas e Culturas) ──────────── */
.subTabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;scrollbar-width:none;}
.subTabs::-webkit-scrollbar{display:none;}
.subTabBtn{display:flex;align-items:center;gap:6px;padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;color:var(--text-dim);font-family:inherit;font-size:.82em;letter-spacing:.5px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.subTabBtn:hover{color:var(--text);}
.subTabActive{color:var(--gold);border-bottom-color:var(--gold);}

.sectionNav{display:flex;flex-direction:column;gap:6px;margin-bottom:24px;}
.sectionNavBtn{text-align:left;background:var(--card-bg);border:1px solid var(--card-border);border-left:3px solid var(--card-border);border-radius:0 7px 7px 0;padding:10px 16px;color:var(--text-dim);font-family:inherit;font-size:.82em;cursor:pointer;transition:all .2s;}
.sectionNavBtn:hover{border-left-color:var(--gold-dim);color:var(--text);background:#1e1810;}
.sectionNavActive{border-left-color:var(--gold) !important;color:var(--gold) !important;background:#221c10 !important;}
.sectionHint{font-size:.82em;color:var(--text-dim);font-style:italic;padding:10px 0;}

.cardGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.infoCard{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:14px;}
.infoCardTitle{font-size:.92em;font-weight:bold;color:var(--gold);margin-bottom:6px;}
.infoCardText{font-size:.8em;color:var(--text);line-height:1.6;}
.infoCardText p{margin-bottom:6px;}
.infoCardExample{font-size:.75em;color:var(--text-dim);font-style:italic;margin-top:6px;}
.elementList{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0;}
.elementPill{font-size:.74em;padding:2px 10px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);color:var(--gold-dim);}
</style>
</head>
<body>
<div id="db-loading">
  <div style="font-size:2em;color:#c9a227;letter-spacing:3px">⚔ REINO MÁGICO ⚔</div>
  <div style="color:#9a8870;font-size:.9em">Carregando o Bestiário...</div>
  <div class="spinner"></div>
</div>
<div id="db-error">
  <div style="font-size:1.4em;color:#c9a227">⚔ REINO MÁGICO ⚔</div>
  <div id="db-error-msg" style="color:#e8d9b8;line-height:1.6;max-width:500px"></div>
</div>

<div id="app" style="display:none">
  <header>⚔ O Manual do Novo Aventureiro ⚔</header>
  <nav class="tabs" id="tabs"></nav>
  <div id="content"></div>
</div>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
</div>

<script>
const ASTROLONG_INTRO = [
  "Se este livro chegou às suas mãos, existem apenas duas possibilidades.",
  "A primeira é que você seja um estudioso em busca de conhecimento.",
  "A segunda é que você seja um aventureiro prestes a fazer algo extremamente perigoso.",
  "Independentemente do motivo, espero que as páginas a seguir possam mantê-lo vivo por mais tempo do que a maioria.",
  "Meu nome é Astrolong TerraNova.",
  "Nasci entre a nobreza élfica dos grandes bosques do Continente Ancestral. Durante minha juventude, esperavam que eu seguisse o caminho tradicional de minha família: estudar magia, administrar terras e participar dos intermináveis debates políticos que ocupam a vida dos nobres.",
  "Fiz exatamente o oposto.",
  "Enquanto meus iguais buscavam influência dentro dos salões de pedra e madeira dourada, eu observava o mundo além das fronteiras conhecidas. Havia algo nas florestas, montanhas e oceanos que me atraía mais do que qualquer título.",
  "Assim começou uma jornada que duraria séculos.",
  "Atravessei os bosques dos Elfos, percorri as pradarias dos Faunos, caminhei pelos salões subterrâneos dos Anões e escalei os picos dos Draconianos. Naveguei até as Ilhas dos Dragões, sobrevivi às tempestades das Terras do Norte Gelado e me aventurei pelas profundezas esquecidas da Ilha das Nagas.",
  "Mais tarde, quando o destino me levou além do mar, testemunhei as cicatrizes deixadas pela queda de Ignareth e vi com meus próprios olhos as terras que hoje chamamos de Terras Devastadas.",
  "Durante minhas viagens encontrei criaturas magníficas.",
  "Algumas eram belas.",
  "Outras eram aterrorizantes.",
  "Muitas eram incompreendidas.",
  "A maior parte dos registros existentes descreve monstros apenas como ameaças. Porém, quanto mais viajei, mais percebi que toda criatura possui um papel dentro do mundo. Predadores mantêm o equilíbrio das florestas. Espíritos protegem regiões esquecidas. Bestas ancestrais guardam segredos mais antigos que muitos reinos.",
  "Até mesmo as criaturas mais perigosas possuem uma razão para existir.",
  "Foi por isso que comecei a catalogá-las.",
  "O que começou como anotações pessoais tornou-se uma coleção de centenas de relatos, observações, desenhos, mapas e registros. Reis solicitaram cópias. Guildas de aventureiros passaram a utilizá-las como referência. Exploradores acrescentaram suas próprias descobertas.",
  "Com o passar dos anos, a obra cresceu além de mim.",
  "Este livro é o resultado desse esforço.",
  "Nele você encontrará informações sobre criaturas conhecidas e desconhecidas, seus habitats, comportamentos, níveis de ameaça e curiosidades obtidas diretamente em campo.",
  "Nem tudo aqui deve ser considerado verdade absoluta.",
  "O mundo é vasto.",
  "Novas espécies surgem.",
  "Antigas espécies desaparecem.",
  "Lendas às vezes revelam-se reais.",
  "E algumas verdades são tão estranhas que parecem lendas.",
  "Portanto, utilize este manual como um guia, não como uma certeza.",
  "Observe.",
  "Questione.",
  "Aprenda.",
  "E, acima de tudo, sobreviva.",
  "Pois existe uma diferença fundamental entre um aventureiro experiente e um aventureiro morto.",
  "O aventureiro experiente sabe quando fugir.",
];

const TABS = [
  { id: 'prefacio', label: 'Prefácio' },
  { id: 'graus', label: 'Graus de Ameaças e Categorias de Criaturas' },
  { id: 'idiomas', label: 'Idiomas e Culturas' },
  { id: 'catalogo', label: 'Catálogo de Criaturas' },
];

const GRAUS_AMEACA = [
  { titulo: 'Grau 0 — Inofensivo', paragrafos: [
    'Criaturas dóceis que raramente apresentam qualquer risco para humanoides.',
    'Normalmente fogem diante de ameaças e não possuem capacidade real de causar ferimentos graves, mesmo quando acuadas.',
    'Podem servir como alimento, montaria, companhia ou parte do ecossistema local.',
    'Exemplos: pequenos animais, aves comuns, criaturas domésticas.',
  ]},
  { titulo: 'Grau I — Comum', paragrafos: [
    'Criaturas geralmente pacíficas que podem reagir quando ameaçadas ou protegendo filhotes.',
    'Possuem força suficiente para ferir uma pessoa despreparada, mas raramente representam perigo para aventureiros experientes.',
    'São abundantes e amplamente conhecidas.',
    'Exemplos: cervos, montarias comuns, grandes herbívoros.',
  ]},
  { titulo: 'Grau II — Menor', paragrafos: [
    'Criaturas ariscas ou naturalmente agressivas.',
    'Possuem meios eficazes de defesa ou ataque e podem causar ferimentos sérios em indivíduos isolados.',
    'São consideradas perigosas para viajantes comuns.',
    'Exemplos: predadores pequenos e médios, criaturas venenosas, animais territoriais.',
  ]},
  { titulo: 'Grau III — Ameaça', paragrafos: [
    'Criaturas capazes de matar um humanoide adulto com relativa facilidade.',
    'Possuem força, velocidade, venenos ou capacidades naturais suficientemente perigosas para exigir preparação.',
    'Embora letais, geralmente evitam confrontos desnecessários para conservar energia.',
    'Exemplos: grandes predadores, monstros de caça especializados.',
  ]},
  { titulo: 'Grau IV — Elite', paragrafos: [
    'Predadores dominantes ou criaturas extremamente agressivas.',
    'Frequentemente atacam primeiro, defendem vastos territórios e representam ameaça significativa até para grupos organizados.',
    'Costumam ocupar o topo da cadeia alimentar regional.',
    'Exemplos: superpredadores, monstros territoriais excepcionais.',
  ]},
  { titulo: 'Grau V — Lendário', paragrafos: [
    'Criaturas cuja simples presença altera o equilíbrio de uma região.',
    'Possuem inteligência elevada, enorme poder físico ou capacidades sobrenaturais raras.',
    'São frequentemente tema de lendas, religiões e histórias locais.',
    'Enfrentá-las exige planejamento, recursos e experiência.',
    'Exemplos: dragões maiores, matriarcas monstruosas, guardiões ancestrais.',
  ]},
  { titulo: 'Grau VI — Mítico', paragrafos: [
    'Seres dotados de consciência avançada e compreensão do mundo.',
    'Frequentemente possuem cultura, linguagem, conhecimento ancestral ou poderes capazes de influenciar civilizações inteiras.',
    'Podem negociar, governar ou manipular eventos históricos.',
    'Exemplos: dragões extremamente antigos, entidades primordiais menores.',
  ]},
  { titulo: 'Grau VII — Cataclísmico', paragrafos: [
    'Criaturas capazes de destruir cidades, reinos ou regiões inteiras.',
    'Sua existência representa uma ameaça estratégica para nações.',
    'O surgimento de uma criatura desse nível costuma mobilizar exércitos inteiros.',
    'Exemplos: Dragões Anciões, titãs primordiais, monstros do Negativo.',
  ]},
  { titulo: 'Grau VIII — Apocalíptico', paragrafos: [
    'Entidades capazes de alterar o destino do mundo.',
    'Sua ação pode levar à extinção de espécies, destruição de continentes ou colapso de civilizações inteiras.',
    'São consideradas ameaças globais.',
    'Exemplos: entidades supremas do Negativo, Primordiais corrompidos, seres ligados ao fim dos tempos.',
  ]},
];

const CATEGORIAS_INTRO = 'Estas categorias são utilizadas para classificar a origem, natureza mágica e comportamento biológico das criaturas catalogadas por estudiosos, aventureiros e exploradores do mundo.';

const CATEGORIAS_CRIATURAS = [
  { titulo: 'Besta Comum', paragrafos: [
    'Criaturas naturais que não possuem ligação direta com elementos mágicos ou entidades superiores.',
    'Embora possuam mana natural em seus corpos, essa energia manifesta-se apenas como Arcano passivo, sem capacidades elementais evidentes.',
    'São as espécies mais abundantes do mundo e constituem a base da maioria dos ecossistemas conhecidos.',
    'Exemplos: Cervos, javalis, aves comuns, predadores naturais e montarias.',
  ]},
  { titulo: 'Besta Mágica', paragrafos: [
    'Criaturas naturalmente conectadas a um ou mais elementos fundamentais do mundo:',
  ], elementos: ['Terra', 'Fogo', 'Água', 'Vento', 'Trovão'], paragrafosFinal: [
    'Essa conexão pode manifestar-se através de características físicas, resistência sobrenatural ou habilidades mágicas naturais.',
    'Apesar de possuírem afinidade elemental, normalmente não apresentam inteligência avançada.',
    'Exemplos: Dragões menores, animais elementais e predadores mágicos.',
  ]},
  { titulo: 'Besta Mágica Tribal', paragrafos: [
    'Criaturas mágicas que desenvolveram consciência, cultura e formas próprias de comunicação.',
    'Podem formar tribos, aldeias, clãs ou sociedades primitivas.',
    'Possuem afinidade elemental ou forte conexão com o Arcano, sendo capazes de compreender idiomas, criar tradições e estabelecer relações diplomáticas ou hostis com outras espécies.',
    'Exemplos: Dríades, Orcés Nagas e algumas raças monstruosas inteligentes.',
  ]},
  { titulo: 'Besta Mágica Suprema', paragrafos: [
    'Criaturas cuja natureza transcende os elementos básicos.',
    'Além da afinidade elemental, possuem influência direta de forças ligadas às Entidades Sagradas ou Caóticas.',
    'Frequentemente ocupam posições dominantes em seus ecossistemas e são consideradas seres de enorme importância espiritual ou mística.',
    'Exemplos: Guardiões ancestrais, monstros sagrados e bestas ligadas aos Primordiais.',
  ]},
];

const SUBGRUPOS_CRIATURAS = [

      { tipo: 'p', texto: 'Minhas primeiras suspeitas surgiram durante a análise de monumentos encontrados nas Montanhas Cinzentas. Entre inscrições gigantescas esculpidas em pedra, identifiquei símbolos que apresentavam semelhanças inesperadas com marcas utilizadas por tribos orcs distantes. A princípio as diferenças pareciam significativas. Os Gigantes utilizavam estruturas complexas, compostas por longas sequências de runas cuidadosamente organizadas. Os Orcs, por outro lado, empregavam versões simplificadas desses mesmos símbolos, adaptadas para registros rápidos e comunicação prática. Contudo, quando removidas as variações culturais acumuladas ao longo dos séculos, as semelhanças tornavam-se impossíveis de ignorar.' },
      { tipo: 'p', texto: 'A descoberta tornou-se ainda mais intrigante quando comparei esses registros com os textos infernais preservados por certas ordens de estudiosos. Embora a escrita infernal moderna parecesse quase irreconhecível, seus exemplares mais antigos revelavam padrões que apontavam para a mesma origem. Estruturas gramaticais semelhantes, raízes compartilhadas e construções sintáticas equivalentes apareciam repetidamente. Era como observar três árvores completamente diferentes crescendo a partir de um mesmo tronco há muito desaparecido.' },
      { tipo: 'p', texto: 'Hoje acredito que todas essas línguas descendem de um ancestral comum que costumo chamar de Gigante Antigo. O nome não implica que os Gigantes tenham criado o idioma, mas apenas que foram aqueles que mais preservaram suas características originais. Os registros sugerem que essa língua surgiu como uma das primeiras grandes ramificações do Primordial Antigo, desenvolvendo-se entre povos ligados aos antigos titãs e às civilizações monumentais que dominaram partes do mundo durante eras esquecidas.' },
    ]},
    { titulo: 'Três Caminhos, Uma Raiz', blocos: [
      { tipo: 'p', texto: 'O Gigante moderno continua sendo o herdeiro mais fiel dessa tradição. Sua gramática permanece extensa e detalhada, permitindo expressar conceitos extremamente específicos através de uma única palavra. Os gigantes valorizam precisão acima de velocidade, motivo pelo qual seus discursos podem parecer lentos para estrangeiros. Em compensação, conceitos que exigiriam frases inteiras em outros idiomas frequentemente são representados por um único termo em sua língua. Não é exagero afirmar que o Gigante foi moldado para registrar história, filosofia e feitos dignos de serem gravados em pedra por milhares de anos.' },
      { tipo: 'p', texto: 'Os Orcs seguiram um caminho muito diferente. Conforme seus ancestrais abandonaram as antigas civilizações e passaram a viver em sociedades tribais mais dinâmicas, a língua começou a se transformar. Estruturas consideradas desnecessárias foram descartadas. Palavras excessivamente longas foram encurtadas. Regras complexas desapareceram. O resultado foi um idioma direto, agressivo e eficiente. Enquanto o Gigante procura descrever cada detalhe de uma situação, o Orc busca transmitir apenas aquilo que é necessário para agir. Essa característica fez muitos estudiosos acreditarem, incorretamente, que ambas as línguas não possuíam qualquer ligação.' },
      { tipo: 'p', texto: 'O caso do Infernal é ainda mais singular. Os registros mais antigos sugerem que seus ancestrais compartilhavam a mesma herança linguística dos Gigantes. Contudo, séculos de isolamento, pactos extraplanares e influência de entidades caóticas alteraram profundamente a língua. Palavras passaram a adquirir significados extremamente precisos. Ambiguidades foram eliminadas sempre que possível. Em contratos infernais, uma única sílaba pronunciada incorretamente pode alterar completamente a interpretação de um acordo. Tal rigor moldou o idioma ao longo das eras, transformando-o em algo distante de sua forma original.' },
    ]},
    { titulo: 'Ecos na Pedra', blocos: [
      { tipo: 'p', texto: 'Curiosamente, apesar de suas diferenças atuais, as três línguas ainda preservam traços comuns em sua escrita. As runas utilizadas por Gigantes, Orcs e Infernais compartilham formas geométricas semelhantes, linhas angulares e padrões de construção que dificilmente podem ser atribuídos ao acaso. Alguns estudiosos comparam essa relação à observada entre diferentes alfabetos derivados de um mesmo sistema ancestral. Embora um falante moderno dificilmente consiga compreender os outros idiomas, um linguista treinado consegue identificar imediatamente os laços que os unem.' },
      { tipo: 'p', texto: 'Essa descoberta oferece uma valiosa lição sobre a natureza da linguagem. Povos podem guerrear durante milênios, construir culturas completamente distintas e até esquecer suas origens, mas as palavras costumam preservar lembranças que a história tenta apagar. As línguas carregam memórias mais antigas que os reinos, mais antigas que as dinastias e, por vezes, mais antigas que os próprios povos que as falam.' },
      { tipo: 'p', texto: 'Por essa razão, considero a relação entre Gigante, Orc e Infernal uma das maiores provas de que o passado do mundo é muito mais conectado do que imaginamos. Três povos que hoje se enxergam como completamente diferentes ainda carregam, em cada palavra pronunciada, ecos de uma origem compartilhada que o tempo jamais conseguiu apagar.' },
      { tipo: 'sign', texto: '— Astrolong TerraNova, A Origem das Línguas e dos Povos Conhecidos' },
    ]},
  ]},

  { id: 'cap4', label: 'Cap. IV', icon: '🌊', titulo: 'Capítulo IV — Os Filhos das Marés: A Origem dos Nagas', secoes: [
    { titulo: 'O Povo das Correntes', blocos: [
      { tipo: 'p', texto: 'Entre todos os povos descendentes do Primordial Antigo, nenhum preservou uma relação tão íntima com o mundo natural quanto os Nagas. Enquanto outras civilizações erguiam muralhas, fundavam reinos e travavam guerras por territórios, os ancestrais dos Nagas observavam as correntes. Aprendiam os ciclos das marés. Decoravam os caminhos das tempestades e os movimentos das estrelas refletidas sobre a superfície dos oceanos.' },
      { tipo: 'p', texto: 'Os registros mais antigos sugerem que os primeiros Nagas surgiram nas regiões costeiras orientais durante os últimos séculos da Era das Sementes, quando as raças ainda buscavam compreender seu lugar no mundo. Diferentemente dos povos que se espalharam pelas florestas, montanhas ou planícies, os ancestrais naga escolheram um ambiente que poucos consideravam habitável. Estabeleceram-se entre recifes, cavernas inundadas e arquipélagos isolados, vivendo simultaneamente sob e acima das águas.' },
      { tipo: 'p', texto: 'Foi nesse isolamento que sua língua começou a se diferenciar das demais ramificações do Primordial Antigo.' },
    ]},
    { titulo: 'A Língua do Mar', blocos: [
      { tipo: 'p', texto: 'Enquanto o Celestial evoluiu para descrever conceitos espirituais e o Selvagem adaptou-se às necessidades dos caçadores e nômades, o antigo idioma dos Nagas desenvolveu um vocabulário voltado para correntes marítimas, profundidade, temperatura da água, comportamento de criaturas oceânicas e fenômenos das marés. Conceitos que outras culturas representavam com uma única palavra frequentemente possuíam dezenas de variações entre os Nagas.' },
      { tipo: 'p', texto: 'Tal característica ainda pode ser observada atualmente. Um marinheiro humano utiliza a palavra "corrente" para descrever o movimento das águas. Um Naga possui palavras diferentes para correntes superficiais, correntes profundas, correntes sazonais, correntes influenciadas pela lua e correntes capazes de alterar rotas de navegação. Essa precisão não surgiu por acaso. Ela foi moldada por milhares de anos vivendo em um ambiente onde compreender o mar significava sobreviver.' },
      { tipo: 'p', texto: 'Diversas lendas naga afirmam que seus ancestrais aprenderam parte desse conhecimento observando os espíritos elementais da Água. Embora eu não possa confirmar a veracidade dessas histórias, a ligação entre a língua naga e o Primordial Elemental é evidente. Entre todos os idiomas mortais conhecidos, o Naga moderno é aquele que preserva o maior número de raízes diretamente associadas aos elementos aquáticos. Não é incomum que antigos rituais ligados ao mar utilizem palavras naga cuja origem remonta aos primeiros séculos após a fragmentação do Primordial Antigo.' },
    ]},
    { titulo: 'O Mar Escuta Tudo', blocos: [
      { tipo: 'p', texto: 'Talvez seja justamente por essa razão que os Nagas desenvolveram uma visão tão distinta do mundo. Povos terrestres tendem a pensar em fronteiras. O mar não possui fronteiras. Povos terrestres constroem muralhas. O mar contorna muralhas. Povos terrestres acumulam riquezas. O mar leva embora tudo aquilo que não estiver preso com firmeza suficiente.' },
      { tipo: 'p', texto: 'Os Nagas aprenderam cedo uma lição que muitas civilizações demoraram séculos para compreender: nada permanece imóvel para sempre.' },
      { tipo: 'p', texto: 'Essa filosofia moldou sua cultura, sua língua e sua posição na história. Enquanto impérios surgiam e desapareciam, enquanto guerras alteravam mapas e reis disputavam coroas, os Nagas permaneceram observando. Escutando. Registrando.' },
      { tipo: 'p', texto: 'Talvez seja por isso que conheçam tantos segredos.' },
      { tipo: 'p', texto: 'O mar escuta tudo.' },
      { tipo: 'p', texto: 'E os Nagas sempre estiveram ouvindo.' },
      { tipo: 'sign', texto: '— Astrolong TerraNova, A Origem das Línguas e dos Povos Conhecidos' },
    ]},
  ]},

  { id: 'cap5', label: 'Cap. V', icon: '🕳️', titulo: 'Capítulo V — O Enigma do Abissal', secoes: [
    { titulo: 'Uma Língua Sem Raízes', blocos: [
      { tipo: 'p', texto: 'Se o Primordial Antigo representa a raiz da maioria das línguas conhecidas e o Arcano Antigo revela a busca dos mortais pelo conhecimento, o Abissal permanece como uma afronta a tudo aquilo que acreditamos compreender sobre a evolução da linguagem. Durante mais de duzentos anos de pesquisa encontrei conexões entre povos distantes, reconstruí idiomas perdidos e identifiquei ancestrais comuns onde antes se acreditava existir apenas coincidência. Contudo, toda vez que meus estudos me conduziam ao Abissal, encontrava apenas um vazio.' },
      { tipo: 'p', texto: 'Não me refiro à ausência de registros. Pelo contrário. Existem inúmeros textos, inscrições, pactos, fragmentos de grimórios e relatos de indivíduos que tiveram contato com essa língua. O problema é que nenhum deles aponta para uma origem. O Abissal simplesmente surge. Não possui raízes identificáveis no Primordial Antigo. Não apresenta estruturas herdadas da Família Arcana. Não compartilha parentesco com os idiomas dos Gigantes, dos Nagas ou de qualquer outro povo conhecido. É como encontrar uma árvore sem sementes, sem raízes e sem solo.' },
      { tipo: 'p', texto: 'Minhas primeiras investigações concentraram-se nos aspectos gramaticais da língua. A lógica sugeria que, em algum momento, eu encontraria padrões compartilhados com outros idiomas. Entretanto, quanto mais profundamente analisava sua estrutura, mais inquietante a situação se tornava. Certas palavras pareciam mudar de significado dependendo não apenas do contexto, mas da intenção daquele que as pronunciava. Em alguns casos, dois estudiosos diferentes traduziam a mesma frase e chegavam a resultados completamente distintos, mesmo quando utilizavam métodos rigorosos de análise.' },
    ]},
    { titulo: 'Ecos de Outro Lugar', blocos: [
      { tipo: 'p', texto: 'Os relatos mais antigos associados ao Abissal não falam de um povo ou de uma civilização. Falam de lugares. Fendas abertas em regiões remotas. Ruínas onde a realidade parecia enfraquecida. Sonhos compartilhados por indivíduos que jamais haviam se encontrado. Em quase todos os casos, a língua aparece associada ao contato com algo exterior ao mundo conhecido. Algo que observava sem ser visto. Algo que respondia sem possuir voz.' },
      { tipo: 'p', texto: 'Essa característica levou muitos estudiosos a defender uma hipótese perturbadora. Talvez o Abissal não tenha sido criado por uma civilização. Talvez jamais tenha sido uma língua mortal.' },
      { tipo: 'p', texto: 'Embora tal conclusão seja frequentemente descartada pelas academias, confesso que nunca encontrei uma explicação melhor. Diversos registros indicam que indivíduos expostos ao Abismo começam a reconhecer palavras antes mesmo de estudá-las. Alguns afirmam ouvir sussurros em idiomas desconhecidos. Outros relatam compreender fragmentos de textos que jamais haviam visto anteriormente. Há inclusive relatos de conjuradores que passaram a falar partes da língua durante sonhos ou estados de transe sem qualquer treinamento prévio.' },
      { tipo: 'p', texto: 'Naturalmente, tais testemunhos podem ser atribuídos à influência corruptora do próprio Abismo. Ainda assim, o fenômeno permanece intrigante. Em nenhum outro idioma conhecido observamos comportamento semelhante. Línguas são aprendidas. O Abissal, por vezes, parece ser lembrado.' },
      { tipo: 'p', texto: 'Talvez seja essa a característica mais assustadora de todas.' },
      { tipo: 'p', texto: 'Enquanto outras línguas descrevem o mundo, o Abissal frequentemente parece descrevê-lo de uma perspectiva externa. Muitos de seus termos não possuem equivalentes em idiomas mortais porque representam conceitos que simplesmente não deveriam existir. Certas palavras descrevem estados impossíveis da matéria. Outras fazem referência a lugares que não aparecem em qualquer mapa conhecido. Algumas sequer possuem tradução, pois seus significados parecem contradizer as próprias leis da realidade.' },
      { tipo: 'p', texto: 'Essa estranheza também se manifesta em sua escrita. Símbolos abissais raramente seguem padrões consistentes. Manuscritos copiados por escribas diferentes frequentemente apresentam pequenas variações, como se os próprios caracteres resistissem à reprodução exata. Há relatos de textos que parecem alterar detalhes de sua forma após longos períodos de observação. Nunca testemunhei tal fenômeno pessoalmente, mas encontrei registros suficientes para não ignorá-lo completamente.' },
    ]},
    { titulo: 'O Que o Abissal Não Conta', blocos: [
      { tipo: 'p', texto: 'Talvez o maior erro cometido pelos estudiosos seja tentar compreender o Abissal utilizando as mesmas ferramentas empregadas para analisar outros idiomas. Fazemos isso porque assumimos que toda língua nasce para comunicar. Contudo, após décadas estudando seus fragmentos, comecei a suspeitar que essa premissa pode estar errada. Talvez o Abissal não exista para transmitir conhecimento entre indivíduos. Talvez ele exista para outra finalidade.' },
      { tipo: 'p', texto: 'Qual finalidade seria essa, não ouso afirmar.' },
      { tipo: 'p', texto: 'O que sei é que toda língua conhecida conta uma história sobre seus criadores. O Celestial fala sobre ordem. O Selvagem sobre adaptação. O Naga sobre observação. O Gigante sobre memória. O Arcano sobre conhecimento.' },
      { tipo: 'p', texto: 'O Abissal não conta história alguma.' },
      { tipo: 'p', texto: 'E talvez seja exatamente isso que o torna tão perigoso.' },
      { tipo: 'p', texto: 'Pois se uma língua existe sem origem, sem povo e sem história... então aquilo que a criou pode ser algo que jamais pertenceu ao nosso mundo.' },
      { tipo: 'sign', texto: '— Astrolong TerraNova, A Origem das Línguas e dos Povos Conhecidos' },
    ]},
  ]},

  { id: 'cap6', label: 'Cap. VI', icon: '📜', titulo: 'Capítulo VI — Classificação Acadêmica Moderna das Línguas', secoes: [
    { titulo: 'Um Estudo Isolado', blocos: [
      { tipo: 'p', texto: 'Durante grande parte da história conhecida, as línguas foram estudadas de maneira isolada. Sacerdotes dedicavam-se ao Celestial, magos preservavam o Arcano, anciões gigantes registravam sua própria tradição e estudiosos élficos concentravam seus esforços no Élfico e no Comum. Poucos se preocupavam em compreender como esses idiomas se relacionavam entre si. A maioria acreditava que cada língua havia surgido de forma independente, criada por deuses, espíritos ou pelos próprios povos que a utilizavam.' },
      { tipo: 'p', texto: 'Somente após séculos de pesquisas, comparações de manuscritos antigos e análises de inscrições encontradas em ruínas de diferentes eras, tornou-se possível construir uma visão mais ampla. Embora muitas lacunas permaneçam sem resposta, a comunidade acadêmica moderna reconhece que a maioria das línguas conhecidas pode ser organizada em grandes famílias linguísticas, agrupadas de acordo com sua origem, evolução e características estruturais.' },
    ]},
    { titulo: 'As Grandes Famílias Linguísticas', blocos: [
      { tipo: 'p', texto: 'A maior delas é a chamada Família Primordial. Seus idiomas descendem, direta ou indiretamente, do Primordial Antigo, a mais antiga língua conhecida pelos estudiosos. Apesar das profundas transformações sofridas ao longo dos milênios, ainda é possível identificar elementos compartilhados entre seus descendentes. O Celestial preservou conceitos ligados à ordem, à espiritualidade e às forças divinas. O Selvagem desenvolveu-se entre tribos nômades e povos adaptados à sobrevivência em ambientes hostis. O Silvestre surgiu mais tarde como resultado da influência feérica sobre antigos dialetos selvagens. O Naga especializou-se em descrever fenômenos marítimos e espirituais associados aos oceanos. O Gigante manteve muitas estruturas ancestrais e continua sendo considerado um dos idiomas mais conservadores do mundo. O Orc simplificou essas mesmas estruturas para atender às necessidades de sociedades tribais guerreiras. O Infernal seguiu um caminho próprio, moldado por pactos e pela busca obsessiva por precisão jurídica e semântica. Já o Primordial moderno representa o descendente mais direto das antigas formas elementais preservadas desde as primeiras eras.' },
      { tipo: 'p', texto: 'Paralelamente, existe a Família Arcana, cuja origem continua sendo objeto de intenso debate entre os estudiosos. Diferentemente da Família Primordial, que parece ter surgido naturalmente entre os povos antigos, o Arcano Antigo apresenta indícios de planejamento deliberado. Sua estrutura demonstra um nível de organização incomum, levando muitos pesquisadores a acreditar que tenha sido criado especificamente para registrar conhecimento mágico. Dessa tradição nasceram diversos idiomas que moldaram a história intelectual do mundo. O Élfico preservou grande parte da elegância e complexidade do Arcano original. O Comum simplificou seus elementos para facilitar a comunicação entre diferentes povos e civilizações. O Feérico adaptou conceitos arcanos às tradições espirituais dos Reinos das Fadas, desenvolvendo características poéticas próprias. O Dracônico, por sua vez, permanece como um dos maiores enigmas linguísticos conhecidos, combinando estruturas arcanas com elementos oriundos de uma fonte desconhecida. Apesar de suas diferenças, todos compartilham raízes suficientemente profundas para serem reconhecidos como membros da mesma família.' },
      { tipo: 'p', texto: 'Entretanto, nem toda língua pode ser encaixada nessas classificações. Algumas resistem a qualquer tentativa de categorização. Entre elas destaca-se o Abissal, atualmente classificado como uma língua isolada. Nenhuma relação convincente foi estabelecida entre ele e qualquer outro idioma conhecido. Não compartilha estruturas fundamentais com a Família Primordial nem apresenta vínculos claros com a Família Arcana. Sua origem permanece desconhecida, assim como a identidade de seus primeiros falantes. Essa ausência de conexões faz do Abissal uma exceção singular entre todas as línguas estudadas até hoje.' },
    ]},
    { titulo: 'Limitações e o Futuro', blocos: [
      { tipo: 'p', texto: 'Embora a Classificação Acadêmica Moderna seja amplamente aceita pelas principais academias do mundo, seus próprios defensores reconhecem suas limitações. Novas descobertas arqueológicas continuam surgindo a cada década. Ruínas anteriormente inacessíveis revelam inscrições desconhecidas. Bibliotecas esquecidas trazem à luz textos que desafiam teorias estabelecidas. É possível que futuras gerações ampliem ou modifiquem essa classificação. Talvez novas famílias sejam identificadas. Talvez idiomas considerados isolados revelem ancestrais ocultos. Talvez até mesmo o Primordial Antigo deixe de ocupar o lugar que atualmente lhe atribuímos.' },
      { tipo: 'p', texto: 'Ainda assim, até que novas evidências sejam encontradas, esta permanece como a melhor representação da história linguística conhecida. Uma árvore incompleta, certamente, mas suficiente para demonstrar que as palavras carregam memórias muito mais antigas do que aqueles que as pronunciam. Sob diferentes sotaques, alfabetos e tradições, quase todas as línguas do mundo continuam ecoando fragmentos de um passado comum, preservando em cada sílaba vestígios de eras que a própria história quase esqueceu.' },
      { tipo: 'sign', texto: '— Astrolong TerraNova, A Origem das Línguas e dos Povos Conhecidos' },
    ]},
    { titulo: 'Árvore de Classificação', blocos: [
      { tipo: 'pre', texto: CLASSIFICACAO_ACADEMICA },
    ]},
  ]},

  { id: 'cap7', label: 'Cap. VII', icon: '🏕️', titulo: 'Capítulo VII — Os Povos Entre os Reinos', secoes: [
    { titulo: 'Civilização Sem Muralhas', blocos: [
      { tipo: 'p', texto: 'Nem toda civilização ergue muralhas.' },
      { tipo: 'p', texto: 'Os cartógrafos gostam de desenhar o mundo como se ele fosse composto por reinos. Fronteiras coloridas. Capitais marcadas com símbolos elaborados. Estradas ligando cidades importantes. É uma forma confortável de enxergar a realidade.' },
      { tipo: 'p', texto: 'Também é uma das mais incompletas.' },
      { tipo: 'p', texto: 'Entre os grandes reinos existem povos que nunca desejaram construir impérios. Povos que não enviam representantes ao Grande Conselho, não cunham moedas próprias e não disputam territórios através de tratados diplomáticos. Alguns são mais antigos que os próprios reinos. Outros surgiram após catástrofes que destruíram civilizações inteiras. Todos compartilham uma característica em comum: sobreviveram sem precisar se tornar aquilo que o restante do mundo considera civilizado.' },
    ]},
    { titulo: 'Caminhos Diferentes', blocos: [
      { tipo: 'p', texto: 'Os Orcs mantiveram suas tribos quando impérios surgiram e desapareceram ao seu redor. Não possuem uma capital para ser conquistada nem um rei cuja morte encerre uma dinastia. Quando uma tribo cai, outra continua. Quando uma rota desaparece, uma nova é encontrada. É uma forma de existência difícil de destruir porque não depende de um único ponto de apoio.' },
      { tipo: 'p', texto: 'Os Nagas seguiram um caminho diferente. Enquanto outros povos disputavam fronteiras em terra firme, eles aprenderam que o mar não reconhece fronteiras. Construíram sua sociedade entre correntes, ilhas e recifes, observando o mundo mudar sem sentir necessidade de participar de cada mudança. Conhecem segredos que atravessaram eras simplesmente porque permaneceram observando enquanto os demais estavam ocupados guerreando.' },
      { tipo: 'p', texto: 'Os Gigantes escolheram o isolamento. Habitam montanhas tão remotas que muitos viajantes atravessam seus territórios sem perceber. Não buscam aliados, comércio ou influência. Sua civilização existe para si mesma e, ao que tudo indica, está perfeitamente satisfeita com isso.' },
      { tipo: 'p', texto: 'Nas profundezas da Floresta Negra vivem os Magins, um povo que desafia qualquer tentativa de classificação. São tribais, agressivos e aparentemente primitivos. Ainda assim, preservam fragmentos do Primordial Antigo que estudiosos modernos não conseguem traduzir completamente. Há mais história escondida em suas aldeias do que muitos reinos gostariam de admitir.' },
      { tipo: 'p', texto: 'No Vale dos Abissais, onde a maioria das criaturas responde à presença de estrangeiros tentando devorá-los, os Bogles construíram algo raro: comunidades. Tribos. Tradições. Uma língua própria. Sobreviveram a transformações que destruíram quase tudo ao redor e desenvolveram uma cultura moldada pelo ambiente mais hostil conhecido.' },
      { tipo: 'p', texto: 'Até mesmo as Dríades, que muitos insistem em tratar como espíritos ou criaturas mágicas, mantêm pequenas sociedades escondidas entre árvores ancestrais, vivendo de acordo com ritmos que pouco têm a ver com as preocupações dos povos civilizados.' },
    ]},
    { titulo: 'O Que é Civilização', blocos: [
      { tipo: 'p', texto: 'Talvez esse seja o erro mais comum cometido pelos estudiosos das grandes cidades. Assumem que civilização e reino são a mesma coisa.' },
      { tipo: 'p', texto: 'Não são.' },
      { tipo: 'p', texto: 'Um reino é apenas uma forma de organização.' },
      { tipo: 'p', texto: 'Civilização é algo muito maior.' },
      { tipo: 'p', texto: 'Civilização é memória compartilhada. É cultura transmitida entre gerações. É um povo que encontra uma maneira de existir no mundo e decide continuar existindo.' },
      { tipo: 'p', texto: 'Sob essa definição, algumas das civilizações mais antigas ainda vivas jamais construíram uma única capital.' },
      { tipo: 'p', texto: 'E talvez seja justamente por isso que sobreviveram por tanto tempo.' },
      { tipo: 'sign', texto: '— Astrolong TerraNova, Povos Entre os Reinos' },
    ]},
  ]},
];

let CREATURES = [];
let screen = 'prefacio'; // 'prefacio' | 'graus' | 'idiomas' | 'catalogo'
let filters = { search:'', categoria:'', tipo:'', natureza:'', grau_ameaca:'', tamanho:'' };
let selected = null;
let idiomaCap = IDIOMAS_CAPITULOS[0].id;
let idiomaSec = null;

async function loadFromDB(){
  const loadEl = document.getElementById('db-loading');
  const errEl  = document.getElementById('db-error');
  try{
    const resp = await fetch('/api/bestiary');
    if(!resp.ok) throw new Error(`HTTP ${resp.status}`);
    CREATURES = await resp.json();
    loadEl.style.display = 'none';
    document.getElementById('app').style.display = '';
    render();
  }catch(e){
    loadEl.style.display = 'none';
    errEl.style.display = 'flex';
    document.getElementById('db-error-msg').textContent =
      'Não foi possível conectar ao servidor (' + e.message + '). Verifique se o backend está em execução.';
  }
}

function esc(s){
  if(s === null || s === undefined) return '';
  return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

function val(v, placeholder='A definir'){
  if(v === null || v === undefined || v === '' ) return `<span class="empty-val">${placeholder}</span>`;
  return esc(v);
}

function imgUrl(name){
  return '/img/Bestiario/' + encodeURIComponent(name);
}

function renderTabs(){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = TABS.map(t => `
    <button class="tabBtn ${screen===t.id?'tabActive':''}" data-tab="${t.id}">${t.label}</button>
  `).join('');
  tabs.querySelectorAll('[data-tab]').forEach(el => {
    el.addEventListener('click', () => { screen = el.dataset.tab; render(); });
  });
}

function render(){
  const content = document.getElementById('content');
  const active = document.activeElement;
  const focusFilter = active && active.dataset && active.dataset.filter;
  const caret = focusFilter ? active.selectionStart : null;
  const prevList = content.querySelector('.creatureList');
  const listScroll = prevList ? prevList.scrollTop : 0;

  renderTabs();

  if(screen === 'prefacio') content.innerHTML = renderPrefacio();
  else if(screen === 'graus') content.innerHTML = renderGraus();
  else if(screen === 'idiomas') content.innerHTML = renderIdiomas();
  else content.innerHTML = renderCatalog();

  if(screen === 'idiomas'){
    bindIdiomasEvents();
  }

  if(screen === 'catalogo'){
    bindCatalogEvents();
    const newList = content.querySelector('.creatureList');
    if(newList) newList.scrollTop = listScroll;
    if(focusFilter){
      const el = content.querySelector(`[data-filter="${focusFilter}"]`);
      if(el){
        el.focus();
        if(caret !== null && el.setSelectionRange) el.setSelectionRange(caret, caret);
      }
    }
  }
}

function renderPrefacio(){
  return `
    <div class="intro">
      <p class="intro-sub">Compilado por</p>
      <h1 class="intro-title">Astrolong TerraNova</h1>
      <p class="intro-sub">Naturalista, Explorador, Cartógrafo e Membro Honorário de Sete Guildas de Aventureiros</p>
      <img class="intro-map" src="/img/Bestiario/Mapa%20Mundi.png" alt="Mapa Mundi">
      <div class="intro-divider"></div>
      <div class="intro-text">
        ${ASTROLONG_INTRO.map(p => `<p>${esc(p)}</p>`).join('')}
        <p class="intro-sign">— Astrolong TerraNova</p>
      </div>
    </div>
  `;
}

function renderCategoriaCard(c){
  const elementos = c.elementos ? `<div class="elementList">${c.elementos.map(e => `<span class="elementPill">${esc(e)}</span>`).join('')}</div>` : '';
  const todos = (c.paragrafos || []).concat(c.paragrafosFinal || []);
  return `
    <div class="infoCard">
      <div class="infoCardTitle">${esc(c.titulo)}</div>
      <div class="infoCardText">
        ${c.paragrafos.map(p => `<p>${esc(p)}</p>`).join('')}
        ${elementos}
        ${(c.paragrafosFinal || []).map(p => `<p>${esc(p)}</p>`).join('')}
      </div>
    </div>
  `;
}

function renderGraus(){
  return `
    <div class="chHero">
      <h2 class="chTitle">Graus de Ameaça e Categorias de Criaturas</h2>
      <div class="chDivider"></div>
      <p class="chLead">O conhecimento catalogado por Astrolong TerraNova ao longo de séculos de exploração.</p>
    </div>

    <div class="sec">
      <h3 class="secTitle">Graus de Ameaça</h3>
      <div class="cardGrid">
        ${GRAUS_AMEACA.map(g => `
          <div class="infoCard">
            <div class="infoCardTitle">${esc(g.titulo)}</div>
            <div class="infoCardText">${g.paragrafos.map(p => `<p>${esc(p)}</p>`).join('')}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="sec">
      <h3 class="secTitle">Categorias de Criaturas</h3>
      <p class="secText">${esc(CATEGORIAS_INTRO)}</p>
      <div class="cardGrid">
        ${CATEGORIAS_CRIATURAS.map(renderCategoriaCard).join('')}
      </div>
    </div>

    ${SUBGRUPOS_CRIATURAS.map(grupo => `
      <div class="sec">
        <h3 class="secTitle">${esc(grupo.titulo)}</h3>
        <div class="cardGrid">
          ${grupo.categorias.map(renderCategoriaCard).join('')}
        </div>
      </div>
    `).join('')}
  `;
}

function renderBlocoIdioma(b){
  if(b.tipo === 'pre') return `<pre class="langTree">${esc(b.texto)}</pre>`;
  if(b.tipo === 'sub') return `<div class="secSubTitle">${esc(b.texto)}</div>`;
  if(b.tipo === 'sign') return `<p class="secSign">${esc(b.texto)}</p>`;
  if(b.tipo === 'quote') return `<p class="secQuote">${esc(b.texto)}</p>`;
  return `<p class="secText">${esc(b.texto)}</p>`;
}

function renderIdiomas(){
  const cap = IDIOMAS_CAPITULOS.find(c => c.id === idiomaCap) || IDIOMAS_CAPITULOS[0];
  const sec = cap.secoes.find(s => s.titulo === idiomaSec);

  return `
    <div class="chHero">
      <h2 class="chTitle">Idiomas e Culturas</h2>
      <div class="chDivider"></div>
      <p class="chLead">Um estudo de Astrolong TerraNova sobre a origem das línguas e dos povos do mundo conhecido.</p>
    </div>

    <div class="subTabs">
      ${IDIOMAS_CAPITULOS.map(c => `
        <button class="subTabBtn ${c.id===idiomaCap?'subTabActive':''}" data-idioma-cap="${c.id}">${c.icon} ${esc(c.label)}</button>
      `).join('')}
    </div>

    <div class="sec">
      <h3 class="secTitle">${esc(cap.titulo)}</h3>
      <div class="sectionNav">
        ${cap.secoes.map(s => `
          <button class="sectionNavBtn ${s.titulo===idiomaSec?'sectionNavActive':''}" data-idioma-sec="${esc(s.titulo)}">${esc(s.titulo)}</button>
        `).join('')}
      </div>
      ${sec
        ? sec.blocos.map(renderBlocoIdioma).join('')
        : `<p class="sectionHint">Selecione uma seção acima para ler.</p>`}
    </div>
  `;
}

function bindIdiomasEvents(){
  document.querySelectorAll('[data-idioma-cap]').forEach(el => {
    el.addEventListener('click', () => {
      idiomaCap = el.dataset.idiomaCap;
      idiomaSec = null;
      render();
    });
  });
  document.querySelectorAll('[data-idioma-sec]').forEach(el => {
    el.addEventListener('click', () => {
      const titulo = el.dataset.idiomaSec;
      idiomaSec = (idiomaSec === titulo) ? null : titulo;
      render();
    });
  });
}

function uniqueValues(field){
  const set = new Set();
  CREATURES.forEach(c => { if(c[field]) set.add(c[field]); });
  return [...set].sort();
}

function filteredCreatures(){
  return CREATURES.filter(c => {
    if(filters.search && !c.nome.toLowerCase().includes(filters.search.toLowerCase())) return false;
    if(filters.categoria && c.categoria !== filters.categoria) return false;
    if(filters.tipo && c.tipo !== filters.tipo) return false;
    if(filters.natureza && c.natureza !== filters.natureza) return false;
    if(filters.grau_ameaca && c.grau_ameaca !== filters.grau_ameaca) return false;
    if(filters.tamanho && c.tamanho !== filters.tamanho) return false;
    return true;
  }).sort((a,b) => a.nome.localeCompare(b.nome, 'pt-BR'));
}

function selectOptions(field, label){
  const opts = uniqueValues(field);
  return `
    <select class="fselect" data-filter="${field}">
      <option value="">${label}</option>
      ${opts.map(o => `<option value="${esc(o)}" ${filters[field]===o?'selected':''}>${esc(o)}</option>`).join('')}
    </select>
  `;
}

function renderCatalog(){
  const list = filteredCreatures();
  const detail = selected ? CREATURES.find(c => c.nome === selected) : null;
  return `
    <div class="topNav">
      <span class="results-count">${list.length} de ${CREATURES.length} criaturas catalogadas</span>
    </div>
    <div class="filters">
      <span class="fl">Filtrar:</span>
      <input class="finput" type="text" placeholder="Buscar por nome..." data-filter="search" value="${esc(filters.search)}">
      ${selectOptions('categoria', 'Categoria')}
      ${selectOptions('tipo', 'Tipo')}
      ${selectOptions('natureza', 'Natureza')}
      ${selectOptions('grau_ameaca', 'Grau de Ameaça')}
      ${selectOptions('tamanho', 'Tamanho')}
    </div>
    <div class="layout">
      <div class="creatureList">
        ${list.map(c => `
          <button class="creatureItem ${selected===c.nome?'active':''}" data-nome="${esc(c.nome)}">
            <img class="creatureThumb" src="${imgUrl(c.imagem)}" alt="${esc(c.nome)}" onerror="this.style.visibility='hidden'">
            <div class="creatureInfo">
              <div class="creatureName">${esc(c.nome)}</div>
              <div class="creatureMeta">${esc(c.categoria)} · ${esc(c.tipo)}</div>
              <span class="threatTag">${esc(c.grau_ameaca)}</span>
            </div>
          </button>
        `).join('')}
        ${list.length===0 ? '<div class="detailEmpty">Nenhuma criatura encontrada</div>' : ''}
      </div>
      <div class="entDetail">
        ${detail ? renderDetail(detail) : '<div class="detailEmpty"><span>Selecione uma criatura para ver os detalhes</span></div>'}
      </div>
    </div>
  `;
}

function renderDetail(c){
  const stats = [
    ['FOR', c.for_], ['DES', c.des], ['VIT', c.vit], ['INT', c.int_], ['PRE', c.pre],
    ['Vida', c.vida], ['Defesa', c.defesa], ['Mana', c.mana],
  ];
  const pericias = [
    ['Atletismo', c.atletismo], ['Reflexo', c.reflexo], ['Tenacidade', c.tenacidade],
    ['Vontade', c.vontade], ['Foco', c.foco], ['Luta', c.luta], ['Sobrevivência', c.sobrevivencia],
  ];
  const habilidades = [c.habilidade1, c.habilidade2, c.habilidade3, c.habilidade4, c.habilidade5];
  const itens = (c.itens || '').split('\n').map(s => s.trim()).filter(Boolean);

  return `
    <div class="detailCard">
      <div class="detailHead">
        <img class="detailImg" src="${imgUrl(c.imagem)}" alt="${esc(c.nome)}" onerror="this.style.display='none'">
        <div class="detailHeadInfo">
          <div class="detailName">${esc(c.nome)}</div>
          <div class="detailTags">
            <span class="tag">${esc(c.categoria)}</span>
            <span class="tag">${esc(c.tipo)}</span>
            <span class="tag">${esc(c.natureza)}</span>
            <span class="tag">${esc(c.grau_ameaca)}</span>
            <span class="tag">${esc(c.tamanho)}</span>
            <span class="tag">${esc(c.comportamento)}</span>
          </div>
          ${c.anotacao ? `<div class="detailQuote">${esc(c.anotacao)}</div>` : ''}
        </div>
      </div>

      <div class="sectionTitle">Descrição</div>
      <div class="detailText">${val(c.descricao)}</div>

      <div class="sectionTitle">Aparência</div>
      <div class="detailText">${val(c.aparencia)}</div>

      <div class="sectionTitle">Habitat</div>
      <div class="detailText">${val(c.habitat)}</div>

      <div class="sectionTitle">Curiosidades de Astrolong TerraNova</div>
      <div class="detailText">${val(c.curiosidades)}</div>

      <div class="sectionTitle">Itens / Materiais</div>
      ${itens.length ? `<div class="itemsList">${itens.map(i => `<span class="itemPill">${esc(i)}</span>`).join('')}</div>` : `<div class="empty-val">A definir</div>`}

      <div class="sectionTitle">Estatísticas</div>
      <div class="statsGrid">
        ${stats.map(([label, v]) => `
          <div class="statBox">
            <div class="statLabel">${label}</div>
            <div class="statValue ${v===null||v===undefined?'empty':''}">${v===null||v===undefined?'—':esc(v)}</div>
          </div>
        `).join('')}
      </div>

      <table class="infoTable" style="margin-top:10px">
        <tr><td>Ataque Básico</td><td>${val(c.ataque_basico)}</td></tr>
        <tr><td>CD Conjurador</td><td>${val(c.cd_conjurador)}</td></tr>
        <tr><td>Atributo Conjurador</td><td>${val(c.atributo_conjurador)}</td></tr>
        <tr><td>Resistência</td><td>${val(c.resistencia)}</td></tr>
        <tr><td>Fraqueza</td><td>${val(c.fraqueza)}</td></tr>
      </table>

      <div class="sectionTitle">Habilidades</div>
      ${habilidades.map((h,i) => {
        if(!h || h === '-') return `<div class="abilityBox empty">Habilidade ${i+1}: A definir</div>`;
        return `<div class="abilityBox">${esc(h)}</div>`;
      }).join('')}

      <div class="sectionTitle">Perícias</div>
      <div class="statsGrid">
        ${pericias.map(([label, v]) => `
          <div class="statBox">
            <div class="statLabel">${label}</div>
            <div class="statValue ${v===null||v===undefined?'empty':''}">${v===null||v===undefined?'—':esc(v)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function bindCatalogEvents(){
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('input', e => {
      filters[el.dataset.filter] = e.target.value;
      render();
    });
    el.addEventListener('change', e => {
      filters[el.dataset.filter] = e.target.value;
      render();
    });
  });
  document.querySelectorAll('.creatureItem').forEach(el => {
    el.addEventListener('click', () => {
      const nome = el.dataset.nome;
      selected = selected === nome ? null : nome;
      render();
    });
  });
  const detailImg = document.querySelector('.detailImg');
  if(detailImg){
    detailImg.addEventListener('click', () => openLightbox(detailImg.src, detailImg.alt));
  }
}

function openLightbox(src, alt){
  const lightbox = document.getElementById('lightbox');
  const img = document.getElementById('lightboxImg');
  img.src = src;
  img.alt = alt;
  lightbox.classList.add('open');
}

function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
}

document.getElementById('lightbox').addEventListener('click', closeLightbox);
document.addEventListener('keydown', e => {
  if(e.key === 'Escape') closeLightbox();
});

loadFromDB();
</script>
</body>
</html>

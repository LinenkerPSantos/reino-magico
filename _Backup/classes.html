<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classes — Reino Mágico</title>
<style>
:root{
  --bg:#0a0806;--bg2:#1a1510;--bg3:#241d14;
  --border:#4a3820;--gold:#c9a227;--gold-dim:#8a6d1a;
  --text:#e8d9b8;--text-dim:#9a8870;
  --card-bg:#1e1710;--card-border:#3a2e1e;
  --green:#4a9a5a;--red:#c44;--blue:#4a7fc4;--purple:#8a4ac4;
  --nav-h:64px;
  --hero-accent-a:120,80,20;
  --hero-accent-b:180,120,40;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;overflow-x:hidden;}

nav{position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:rgba(10,8,6,.97);border-bottom:1px solid rgba(74,56,32,.4);
  backdrop-filter:blur(12px);z-index:1000;
  display:flex;align-items:center;justify-content:space-between;padding:0 40px;}
.nav-brand{font-size:1.2em;color:var(--gold);letter-spacing:3px;text-decoration:none;
  text-shadow:0 0 18px rgba(201,162,39,.35);}
.nav-brand span{font-size:.6em;color:var(--text-dim);display:block;letter-spacing:1px;}
.nav-links{display:flex;align-items:center;gap:4px;list-style:none;}
.nav-links a{display:block;padding:8px 14px;color:var(--text-dim);text-decoration:none;
  border-radius:5px;font-size:.85em;letter-spacing:.5px;transition:all .2s;}
.nav-links a:hover,.nav-links a.active{color:var(--gold);}
.dropdown{position:relative;}
.dropdown-btn{display:flex;align-items:center;gap:5px;padding:8px 14px;color:var(--text-dim);
  border:none;background:none;font-family:inherit;font-size:.85em;letter-spacing:.5px;
  border-radius:5px;cursor:pointer;transition:all .2s;}
.dropdown-btn:hover{color:var(--gold);}
.dropdown-btn::after{content:'▾';font-size:.7em;color:var(--gold-dim);transition:transform .2s;}
.dropdown:hover .dropdown-btn::after{transform:rotate(-180deg);}
.dropdown-menu{position:absolute;top:calc(100%+4px);right:0;background:var(--bg2);
  border:1px solid var(--border);border-radius:8px;min-width:200px;overflow:hidden;
  opacity:0;visibility:hidden;transform:translateY(-8px);
  transition:opacity .2s,transform .2s,visibility .2s;box-shadow:0 8px 24px rgba(0,0,0,.6);}
.dropdown:hover .dropdown-menu{opacity:1;visibility:visible;transform:translateY(0);}
.dropdown-menu a{display:flex;align-items:center;gap:10px;padding:12px 18px;color:var(--text-dim);
  text-decoration:none;font-size:.85em;border-bottom:1px solid var(--bg3);transition:all .15s;}
.dropdown-menu a:last-child{border-bottom:none;}
.dropdown-menu a:hover{background:var(--bg3);color:var(--gold);}
.dm-icon{font-size:1.1em;}.dm-info{display:flex;flex-direction:column;gap:2px;}
.dm-title{color:var(--text);font-size:.9em;}.dm-desc{font-size:.75em;color:var(--text-dim);}

/* ── HERO ── */
.hero{
  position:relative;
  min-height:500px;
  padding-top:var(--nav-h);
  display:flex;align-items:flex-end;
  overflow:hidden;
  background:var(--bg);
  transition:background .5s;
}
.hero-bg{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 60% 80% at 70% 50%,
      rgba(var(--hero-accent-a),.18) 0%,transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%,
      rgba(var(--hero-accent-b),.08) 0%,transparent 60%);
  transition:all .6s;
}
.hero-bg::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:160px;
  background:linear-gradient(transparent,var(--bg));
}
.hero-content{
  position:relative;z-index:2;
  padding:0 60px 60px;
  max-width:700px;
}
.hero-eyebrow{
  font-size:.72em;letter-spacing:5px;text-transform:uppercase;
  color:rgba(var(--hero-accent-b),.8);margin-bottom:12px;
}
.hero-title{
  font-size:clamp(3em,7vw,5.5em);
  color:#fff;
  letter-spacing:4px;
  line-height:1;
  margin-bottom:18px;
  text-shadow:
    0 0 60px rgba(var(--hero-accent-b),.4),
    0 2px 4px rgba(0,0,0,.8);
  transition:color .4s,text-shadow .4s;
}
.hero-intro{
  font-size:.92em;color:rgba(232,217,184,.75);
  line-height:1.75;max-width:560px;
}
.hero-glyph{
  position:absolute;right:80px;top:50%;transform:translateY(-50%);
  font-size:clamp(8em,18vw,15em);
  opacity:.06;
  pointer-events:none;
  filter:blur(2px);
  transition:all .5s;
  user-select:none;
}

/* ── SELECTOR STRIP ── */
.selector-strip{
  background:rgba(10,8,6,.95);
  border-top:1px solid rgba(74,56,32,.5);
  border-bottom:1px solid rgba(74,56,32,.5);
  padding:0;
  position:sticky;top:var(--nav-h);
  z-index:900;
  backdrop-filter:blur(12px);
}
.selector-inner{
  display:flex;
  overflow-x:auto;
  gap:0;
  scrollbar-width:none;
}
.selector-inner::-webkit-scrollbar{display:none;}
.sel-item{
  display:flex;flex-direction:column;align-items:center;
  padding:14px 20px;
  cursor:pointer;
  border-bottom:3px solid transparent;
  white-space:nowrap;
  transition:all .2s;
  flex-shrink:0;
  min-width:90px;
  position:relative;
}
.sel-item::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  opacity:0;transition:opacity .2s;
}
.sel-item:hover{background:rgba(201,162,39,.06);}
.sel-item.active{background:rgba(201,162,39,.08);}
.sel-item.active::after{opacity:1;}
.sel-icon{font-size:1.4em;margin-bottom:4px;transition:transform .2s;}
.sel-item:hover .sel-icon,.sel-item.active .sel-icon{transform:scale(1.15);}
.sel-name{font-size:.7em;color:var(--text-dim);letter-spacing:.5px;transition:color .2s;}
.sel-item.active .sel-name{color:var(--gold);}
.sel-item:hover .sel-name{color:var(--text);}

/* ── CONTENT AREA ── */
.content-area{max-width:1200px;margin:0 auto;padding:50px 40px 80px;}

/* DATA GRID */
.data-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;margin-bottom:40px;}
.data-section-title{
  font-size:.72em;letter-spacing:4px;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:18px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}

/* RACIAL STATS */
.stat-list{display:flex;flex-direction:column;gap:8px;}
.stat-row{display:grid;grid-template-columns:140px 1fr;align-items:center;
  padding:8px 0;border-bottom:1px solid rgba(74,56,32,.3);}
.stat-row:last-child{border-bottom:none;}
.stat-label{font-size:.74em;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;}
.stat-value{font-size:.85em;color:var(--text);}

/* BONUS CHIPS */
.bonus-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;}
.bonus-chip{font-size:.78em;font-weight:bold;
  padding:6px 14px;border-radius:20px;
  border:1px solid rgba(var(--hero-accent-b),.6);
  color:rgba(var(--hero-accent-b),1);
  background:rgba(var(--hero-accent-a),.12);}

/* TRAITS */
.traits-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
.trait-card{
  background:rgba(26,21,16,.6);
  border:1px solid var(--card-border);
  border-radius:8px;padding:16px;
  transition:border-color .2s;
}
.trait-card:hover{border-color:rgba(var(--hero-accent-b),.5);}
.trait-name{font-size:.9em;font-weight:bold;color:var(--gold);margin-bottom:6px;}
.trait-bonus-tag{display:inline-block;font-size:.65em;padding:2px 7px;border-radius:10px;
  border:1px solid var(--green);color:var(--green);margin-left:6px;}
.trait-desc{font-size:.78em;color:var(--text-dim);line-height:1.55;}

/* LORE */
.lore-section{margin-top:50px;padding-top:40px;border-top:1px solid var(--border);}
.lore-title{font-size:.72em;letter-spacing:5px;text-transform:uppercase;
  color:var(--gold-dim);margin-bottom:24px;}
.lore-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px;}
.lore-tab{padding:10px 22px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);font-family:inherit;font-size:.82em;letter-spacing:.8px;
  cursor:pointer;transition:all .2s;text-transform:uppercase;}
.lore-tab:hover{color:var(--text);}
.lore-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.lore-panel{display:none;animation:fadeUp .25s;}
.lore-panel.visible{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lore-text{font-size:.9em;color:var(--text);line-height:1.85;margin-bottom:0;max-width:820px;}
.lore-label{font-size:.68em;color:var(--gold-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.lore-block{border-left:2px solid rgba(var(--hero-accent-b),.5);
  padding:14px 20px;background:rgba(var(--hero-accent-a),.06);
  border-radius:0 6px 6px 0;margin-bottom:0;}
.names-text{font-size:.85em;color:var(--text-dim);line-height:2;}

/* LOADING */
#loading{text-align:center;padding:80px;color:var(--text-dim);font-style:italic;}

::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}
@media(max-width:768px){
  nav{padding:0 16px;}
  .hero-content{padding:0 20px 50px;}
  .hero-glyph{display:none;}
  .content-area{padding:30px 20px 60px;}
  .data-grid{grid-template-columns:1fr;}
}
</style>
<style>
.ability-card{background:rgba(26,21,16,.6);border:1px solid var(--card-border);border-radius:8px;padding:18px;}
.ability-name{font-size:.9em;font-weight:bold;color:var(--gold);margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.ability-name::before{content:'⚔ ';color:var(--gold-dim);}
.ability-desc{font-size:.8em;color:var(--text-dim);line-height:1.6;}
.pill-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{font-size:.74em;padding:4px 12px;border-radius:12px;}
.pill.peri{background:rgba(74,154,90,.1);border:1px solid var(--green);color:var(--green);}
.pill.prof{background:rgba(74,127,196,.1);border:1px solid var(--blue);color:var(--blue);}
.pill.spell{background:rgba(138,74,196,.1);border:1px solid var(--purple);color:var(--purple);}
.pill.spell-extra{background:rgba(201,162,39,.1);border:1px solid var(--gold-dim);color:var(--gold-dim);}
.stats-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
.stat-trio-item{background:rgba(26,21,16,.6);border:1px solid var(--card-border);border-radius:8px;
  padding:14px;text-align:center;}
.stat-trio-val{font-size:1.6em;font-weight:bold;color:var(--gold);}
.stat-trio-lbl{font-size:.68em;color:var(--text-dim);margin-top:3px;text-transform:uppercase;letter-spacing:.5px;}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-brand">⚔ REINO MÁGICO<span>Sistema de RPG</span></a>
  <ul class="nav-links">
    <li><a href="/">Início</a></li>
    <li><a href="/mecanicas">Mecânicas</a></li>
    <li><a href="/historia">História</a></li>
    <li><a href="/racas" id="nav-racas">Raças</a></li>
    <li><a href="/classes" id="nav-classes">Classes</a></li>
    <li class="dropdown">
      <button class="dropdown-btn">Conteúdo</button>
      <div class="dropdown-menu">
        <a href="/ficha" target="_blank"><span class="dm-icon">📋</span><span class="dm-info"><span class="dm-title">Ficha de Personagem</span><span class="dm-desc">Criar aventureiro ↗</span></span></a>
        <a href="/gerador"><span class="dm-icon">🐉</span><span class="dm-info"><span class="dm-title">Gerador de Criaturas</span><span class="dm-desc">Em breve</span></span></a>
      </div>
    </li>
  </ul>
</nav>

<div class="hero" id="class-hero">
  <div class="hero-bg" id="hero-bg"></div>
  <div class="hero-glyph" id="hero-glyph">◈</div>
  <div class="hero-content">
    <p class="hero-eyebrow" id="hero-eyebrow">Especializações</p>
    <h1 class="hero-title" id="hero-title">Classes</h1>
    <p class="hero-intro" id="hero-intro">Escolha uma classe para conhecer seu papel e habilidades.</p>
  </div>
</div>

<div class="selector-strip">
  <div class="selector-inner" id="selector-strip"></div>
</div>

<div id="loading">Carregando...</div>
<div class="content-area" id="class-content" style="display:none"></div>

<script>
const CLASS_LORE = {"Alquimista": {"desc": "O Alquimista é um estudioso das substâncias, dos segredos ocultos na matéria e das interações entre o físico e o arcano. Sua força não está no combate direto, mas na capacidade de analisar, preparar e reagir com inteligência diante de qualquer situação. Especialista em investigação e manipulação, o Alquimista enxerga o que outros ignoram — padrões, resíduos, mecanismos e detalhes ocultos que revelam armadilhas, segredos e perigos iminentes.", "papel": "Investigação e Desarme de Armadilhas"}, "Assassino": {"desc": "O Assassino é a personificação da precisão letal. Ele não busca confrontos diretos, mas sim o momento perfeito para atacar — quando o alvo está vulnerável, distraído ou já condenado sem perceber. Movendo-se nas sombras e explorando falhas na defesa inimiga, o Assassino transforma oportunidade em morte rápida. Sua força não está na resistência, mas na capacidade de encerrar combates antes que eles realmente comecem.", "papel": "Ataques Furtivos e Críticos"}, "Bardo": {"desc": "O Bardo é um manipulador de emoções, palavras e percepções. Sua força não está na violência, mas na capacidade de influenciar decisões, moldar narrativas e conduzir situações a seu favor. Seja em salões nobres, tavernas movimentadas ou negociações perigosas, o Bardo atua como mediador, enganador ou líder — adaptando sua abordagem conforme a necessidade. Ele entende que vencer um conflito sem lutar é, muitas vezes, a forma mais eficaz de alcançar seus objetivos.", "papel": "Interação, Política e Manipulação"}, "Bruxo": {"desc": "O Bruxo é um manipulador de forças além da compreensão comum. Seu poder não vem apenas de estudo, mas de pactos — acordos com entidades que concedem poder em troca de influência, controle ou sacrifício. Ele atua controlando o campo de batalha de forma indireta, enfraquecendo inimigos, manipulando alvos prioritários e explorando vulnerabilidades através de vínculos sobrenaturais.", "papel": "Controle e Manipulação de Grupo"}, "Caçador": {"desc": "O Caçador é um especialista em rastreamento, sobrevivência e combate à distância. Ele domina o ambiente ao seu redor, utilizando paciência, precisão e conhecimento do terreno para eliminar seus alvos antes mesmo de ser percebido. Diferente de combatentes diretos, o Caçador prefere manter distância, observar e agir no momento exato. Cada disparo é calculado, cada movimento tem propósito.", "papel": "Ataques à Longa Distância e Rastreamento"}, "Cavaleiro": {"desc": "O Cavaleiro é um combatente excepcional, capaz de assumir a linha de frente como defensor implacável ou duelista nato. Sua força não está apenas em derrotar inimigos, mas em proteger aliados, conter ameaças e dominar o campo de batalha com presença e disciplina. Enfrentando diretamente os maiores perigos, o Cavaleiro mantém o controle do combate através de firmeza, estratégia e posicionamento preciso.", "papel": "Tank e Duelista de Linha de Frente"}, "Espiritualista": {"desc": "O Espiritualista é a ponte entre o mundo material e as forças que o sustentam. Sua força não está em golpes ou destruição, mas na capacidade de fortalecer aliados, curar ferimentos e moldar o fluxo de mana ao redor do grupo. Presente em culturas diversas como sacerdote, chamã, místico ou guardador de espíritos, o Espiritualista é aquele que mantém o grupo de pé quando tudo parece desabar.", "papel": "Suporte, Cura e Buffs"}, "Guardião": {"desc": "O Guardião é o mestre dos escudos e das armaduras pesadas, um defensor implacável que permanece na linha de frente protegendo seus aliados. Sua presença no combate garante segurança ao grupo, interceptando ameaças e suportando o peso das batalhas mais difíceis. Além de sua resistência excepcional, o Guardião atua como suporte em momentos críticos, socorrendo companheiros e mantendo a formação unida.", "papel": "Tank e Suporte"}, "Guerreiro": {"desc": "O Guerreiro é a expressão mais direta do combate. Ele não precisa de truques, alianças sobrenaturais ou poderes arcanos para dominar um campo de batalha — basta o corpo, a arma e a vontade de não recuar. Forjado pelo treino e pela experiência, o Guerreiro converte cada golpe em impacto real e cada ferimento sofrido em combustível para continuar lutando. É o arquétipo do combatente puro: simples na essência, devastador na execução.", "papel": "Combate Corpo a Corpo Baseado em Força"}, "Mago": {"desc": "O Mago é o ápice do estudo arcânico. Nenhuma classe compreende a magia com tanta profundidade — nem a manipula com tamanha precisão. Onde outros veem força, o Mago vê padrões. Onde outros agem, o Mago calcula. Cada magia conjurada por um Mago é o resultado de anos de estudo, tentativa e refinamento. Sua arma mais poderosa não é o fogo ou o gelo, mas a compreensão de como e quando usá-los.", "papel": "Dano Mágico e Estudioso"}, "Monge": {"desc": "O Monge é um combatente espiritual e arcano, especializado em múltiplos ataques rápidos, movimentos ágeis e reflexos extraordinários. Seu corpo é altamente disciplinado e preparado para suportar as mais diversas condições, transformando-o em um guerreiro versátil e resistente. Guiado por sua conexão com os espíritos, o Monge luta com técnica, equilíbrio e poder interior.", "papel": "DPS Físico e Mágico (Híbrido)"}};
const CLASS_ICONS = {
  'Alquimista':'⚗','Assassino':'🗡','Bardo':'🎵','Bruxo':'👁',
  'Caçador':'🏹','Cavaleiro':'🛡','Espiritualista':'✨',
  'Guardião':'🏰','Guerreiro':'⚔','Mago':'📖','Monge':'👊'
};
const CLASS_COLORS = {"Alquimista": ["20,80,100", "40,160,180"], "Assassino": ["30,30,30", "180,30,30"], "Bardo": ["80,40,100", "180,80,200"], "Bruxo": ["40,20,80", "140,40,180"], "Caçador": ["40,80,30", "80,160,60"], "Cavaleiro": ["30,50,100", "60,100,200"], "Espiritualista": ["80,60,20", "200,160,40"], "Guardião": ["60,40,20", "180,120,40"], "Guerreiro": ["100,30,20", "220,80,40"], "Mago": ["20,40,120", "60,100,240"], "Monge": ["60,30,20", "180,100,40"]};

const ATTR_NAMES = {FOR:'Força',DES:'Destreza',VIT:'Vitalidade',INT:'Intelecto',PRE:'Presença'};
let CLASSES_DATA = {};

async function loadData(){
  const loadEl = document.getElementById('loading');
  const timer = setTimeout(()=>{ loadEl.innerHTML='<b style="color:#c9a227">⚠ Servidor offline</b><br><span style="font-size:.85em;color:#9a8870">Execute <code style="background:#1a1510;padding:2px 6px;border-radius:4px">python server.py</code> e recarregue a página.</span>'; }, 4000);
  try{
    const r = await fetch('/api/all');
    const d = await r.json();
    clearTimeout(timer);
    CLASSES_DATA = d.classes || {};
    
    buildStrip();
    loadEl.style.display='none';
  }catch(e){
    clearTimeout(timer);
    loadEl.innerHTML='<b style="color:#c9a227">⚠ Servidor offline</b><br><span style="font-size:.85em;color:#9a8870">Execute <code style="background:#1a1510;padding:2px 6px;border-radius:4px">python server.py</code> e recarregue a página.</span>';
  }
}
function buildStrip(){
  const strip = document.getElementById('selector-strip');
  const names = Object.keys(CLASSES_DATA).sort();
  strip.innerHTML = names.map(name => `
    <div class="sel-item" id="sel-${name}" onclick="showClass('${name}')">
      <div class="sel-icon">${CLASS_ICONS[name]||'◈'}</div>
      <div class="sel-name">${name}</div>
    </div>`).join('');
  if(names.length) showClass(names[0]);
}

function showClass(name){
  document.querySelectorAll('.sel-item').forEach(t=>t.classList.remove('active'));
  const sel = document.getElementById('sel-'+name);
  if(sel){ sel.classList.add('active'); sel.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}); }

  const cl = CLASSES_DATA[name];
  const lore = CLASS_LORE[name] || {};
  if(!cl) return;

  const cols = CLASS_COLORS[name] || ['60,40,20','180,120,40'];
  document.documentElement.style.setProperty('--hero-accent-a', cols[0]);
  document.documentElement.style.setProperty('--hero-accent-b', cols[1]);

  document.getElementById('hero-title').textContent  = name;
  document.getElementById('hero-intro').textContent  = lore.desc ? lore.desc.substring(0,180)+'...' : '';
  document.getElementById('hero-glyph').textContent  = CLASS_ICONS[name]||'◈';
  document.getElementById('hero-eyebrow').textContent = (lore.papel ? '◈ '+lore.papel : 'Especializações');

  const spells  = cl.spellAccess || [];
  const armas   = cl.armas && cl.armas!=='Nenhuma' ? cl.armas.split(',').map(s=>s.trim()) : [];
  const pericias = cl.pericias || [];
  const extraSlots = cl.extraSlots||0;
  const extraType  = cl.extraSlotType||'';

  const spellPills = spells.map(s=>`<span class="pill spell">${s}</span>`).join('')
    + (extraSlots>0?`<span class="pill spell-extra">+${extraSlots} ${extraType}</span>`:'');
  const profPills  = (armas.length ? armas : ['Armas Simples']).map(p=>`<span class="pill prof">${p}</span>`).join('');
  const periPills  = pericias.map(p=>`<span class="pill peri">${p}</span>`).join('');

  const content = document.getElementById('class-content');
  content.style.display = 'block';
  content.innerHTML = `
    <div class="stats-trio">
      <div class="stat-trio-item"><div class="stat-trio-val">+${cl.vida}</div><div class="stat-trio-lbl">❤ Vida</div></div>
      <div class="stat-trio-item"><div class="stat-trio-val">+${cl.mana}</div><div class="stat-trio-lbl">💧 Mana</div></div>
      <div class="stat-trio-item"><div class="stat-trio-val">${ATTR_NAMES[cl.atrib]||cl.atrib}</div><div class="stat-trio-lbl">Atributo Principal</div></div>
    </div>

    <div class="data-grid" style="margin-bottom:28px">
      <div class="ability-card">
        <div class="ability-name">${cl.hab1||'Habilidade 1'}</div>
        <div class="ability-desc">${cl.h1||''}</div>
      </div>
      <div class="ability-card">
        <div class="ability-name">${cl.hab2||'Habilidade 2'}</div>
        <div class="ability-desc">${cl.h2||''}</div>
      </div>
    </div>

    <div class="data-grid">
      <div>
        <div class="data-section-title">Perícias de Classe</div>
        <div class="pill-row">${periPills}</div>
        <div class="data-section-title" style="margin-top:24px">Proficiências</div>
        <div class="pill-row">${profPills}</div>
      </div>
      <div>
        <div class="data-section-title">Acesso a Magias</div>
        <div class="pill-row">${spellPills}</div>
      </div>
    </div>

    ${lore.desc ? `
    <div class="lore-section">
      <div class="lore-title">Sobre a Classe</div>
      <p class="lore-text" style="max-width:820px">${lore.desc}</p>
    </div>` : ''}`;
}

loadData();
</script>
</body>
</html>

a", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador manifesta parcialmente o Domínio de sua entidade sobre o mundo físico, criando uma área sobrenatural com raio de 9 metros ao seu redor. Todas as criaturas dentro da área são transportadas para o Domínio da entidade. As criaturas permanecem presas no Domínio por, no mínimo, 1 rodada, sendo afetadas continuamente por suas propriedades, perigos e efeitos especiais. Ao fim da duração, retornam às posições originais ou ao espaço desocupado mais próximo disponível."}, {"nome": "Invocação das Sombras do Caos", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Fome das Sombras", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "5 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador invoca sombras famintas que circulam constantemente ao seu redor em busca de sofrimento e morte. Cria uma área de 12 metros ao redor do conjurador. Criaturas hostis dentro da área devem realizar uma salvaguarda de Tenacidade. Em caso de falha, ficam Amedrontadas por 1 rodada. Sempre que uma criatura dentro da área sofrer dano, recebe +1d8 de dano caótico adicional. Metade do dano adicional causado (arredondado para cima, mínimo 1) é recuperado pelo conjurador como Vida ou Mana, à sua escolha. Se uma criatura morrer dentro da área, o conjurador recupera Vida e Mana ao mesmo tempo."}, {"nome": "Maldição da Entidade", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Maldição das Sombras", "execucao": "Completa", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador amplia a maldição do pacto, permitindo que a própria presença da entidade afete diretamente a mente e o corpo da vítima. Além dos efeitos de Maldição das Sombras, a criatura sofre efeitos adicionais de acordo com a entidade vinculada ao pacto: Espelho Dourado: Confuso e Desorientado por 1 rodada. Dama dos Desejos: Alucinado e Silenciado por 1 rodada. Mestre do Banquete: Envenenado por 3 rodadas. O Ruivo: Enfurecido por 3 rodadas. O Colecionador: Vulnerável e Silenciado por 1 rodada. O Sonolento: Lentidão e Fadigado por 1 rodada. Mil Olhos: Amedrontado e Confuso por 1 rodada."}, {"nome": "Mente Expansiva das Sombras", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Servo das Sombras", "execucao": "", "alcance": "Curto", "alvo": "Pessoal", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador expande sua consciência através do Servo das Sombras, transformando-o em uma extensão parcial de sua mente e magia. Enquanto esta magia estiver ativa, o Servo das Sombras pode receber uma das seguintes funções no turno do conjurador: Manter uma magia sustentada do conjurador. Conjurar uma magia conhecida pelo conjurador. Utilizar a ação de Provocar do Servo das Sombras. Magias conjuradas pelo servo utilizam os atributos, alcance, testes e CD do conjurador. O servo age imediatamente após o turno do conjurador como uma ação padrão adicional. O Servo das Sombras é destruído imediatamente ao ser alvo de um ataque, sofrer dano direto ou ser atingido por dano em área."}, {"nome": "Mestre dos Domínios das Maldições", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Troca de Corações", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador manifesta um domínio maldito capaz de concentrar toda dor, corrupção e sofrimento em um único recipiente. Cria uma área de 12 metros ao redor do conjurador. Todas as condições negativas de criaturas dentro da área são removidas. Em seguida, escolha uma criatura dentro da área. Ela deve realizar uma salvaguarda de Vontade com CD +5. Em caso de falha, recebe todas as condições negativas removidas pela magia. Se o alvo possuir afinidade Sagrada: a CD da salvaguarda aumenta para +10; todas as condições positivas da criatura são removidas antes da aplicação das condições negativas."}, {"nome": "Negação da Luz", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Pequeno Buraco Negro", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "3 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador manifesta um vazio absoluto que consome luz, esperança e energia divina. Cria uma área com raio de 32 metros envolta em escuridão sobrenatural. Toda iluminação comum ou mágica dentro da área é anulada, deixando criaturas cegas enquanto permanecerem no local. Magias de natureza Sagrada conjuradas dentro da área são automaticamente anuladas. Sempre que uma criatura tentar conjurar uma magia dentro da área, deve realizar um teste de Foco contra a CD do conjurador. Em caso de falha, a magia é anulada sem consumir a ação. Criaturas com afinidade Sagrada sofrem +5 na dificuldade deste teste."}, {"nome": "Possessão Corporal", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Dreno de Vida", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "5 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador força uma entidade do pacto a habitar temporariamente o corpo de uma criatura abatida. Criaturas sem corpo físico não podem ser alvo desta magia. Escolha o corpo de uma criatura abatida dentro do alcance. O corpo retorna sob controle do conjurador, obedecendo suas ordens até o fim da duração. A criatura possui: Vida igual à soma de Foco + Intelecto do conjurador; os atributos e estatísticas físicas originais; incapacidade de conjurar magias ou utilizar habilidades mágicas; apenas ataques físicos, causando metade do dano original. Quando a duração termina ou a criatura chega a 0 Vida, o corpo é destruído e reduzido a cinzas."}, {"nome": "Presença da Entidade", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Aura do Patrono", "execucao": "Completo", "alcance": "Curto", "alvo": "Pessoal", "duracao": "Sustentada", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador permite que seu patrono manifeste parcialmente sua verdadeira forma no mundo físico. A simples presença da entidade distorce o ambiente, tornando o ar pesado e a realidade instável. Ao conjurar esta magia, o patrono é invocado parcialmente ao custo de metade da Vida atual do conjurador (arredondada para cima, mínimo de 1). Enquanto a magia permanecer sustentada, no início de cada turno do conjurador, ele perde novamente metade de sua Vida atual, seguindo a mesma regra. A entidade age imediatamente após ser invocada e novamente no turno do conjurador enquanto permanecer manifesta, obedecendo fielmente às ordens dadas pelo conjurador dentro das limitações e natureza do patrono."}, {"nome": "Armagedom Elemental", "tipo": "Magia Proibida", "custo": 12, "prereq": "Nível Lendário em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Região", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Negativo", "descricao": "O conjurador desencadeia uma ruptura absoluta nos fluxos elementais da realidade, fazendo com que fogo se transforme em gelo, trovões se tornem sombras e a própria essência mágica das criaturas entre em colapso. O campo de batalha mergulha em um caos elemental impossível de controlar. Todas as criaturas dentro da área têm seus elementos alterados aleatoriamente entre os elementos existentes, exceto Caótico e Sagrado. Afinidades, resistências, vulnerabilidades e efeitos relacionados aos elementos assumem imediatamente a nova natureza elemental sorteada. Além disso, todas as criaturas na área sofrem dano equivalente à metade de seus Pontos de Vida máximos, ignorando resistências elementais. Enquanto permanecerem na área, criaturas não conseguem conjurar magias normalmente, a menos que realizem uma salvaguarda de Foco no momento da conjuração. Em caso de sucesso, a magia é conjurada normalmente; em caso de falha, a conjuração é interrompida e a Mana ainda é consumida."}, {"nome": "Cataclismo Elemental", "tipo": "Magia Proibida", "custo": 12, "prereq": "Nível Lendário em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Local", "duracao": "10 Rodadas", "categoria": "Ofensiva", "natureza": "Negativo", "descricao": "O conjurador desencadeia uma reação em cadeia entre os elementos primordiais, rompendo o equilíbrio natural do mundo e criando um cataclismo capaz de devastar regiões inteiras. Fogo, água, terra, vento e trovão colidem incessantemente, transformando a área em um cenário apocalíptico. A cada hora, uma onda elemental aleatória varre toda a área. Role 1d5 para determinar o elemento ativo (Fogo, Água, Terra, Vento ou Trovão). Todas as criaturas e estruturas atingidas sofrem 10d10 de dano do elemento correspondente. Estruturas comuns começam a ruir progressivamente após as primeiras ondas e eventualmente são destruídas por completo, a critério do mestre. Enquanto permanecerem na área, criaturas sofrem –4 em todos os atributos devido ao estresse físico, mental e espiritual causado pelo desequilíbrio elemental. Esse redutor nunca pode reduzir um atributo abaixo de 0. Apenas locais protegidos por magia sagrada, barreiras divinas ou abrigos consagrados conseguem resistir plenamente aos efeitos do cataclismo."}, {"nome": "Maldição da Decadência", "tipo": "Magia Proibida", "custo": 12, "prereq": "Nível Lendário em conjuração", "execucao": "Padrão", "alcance": "Médio", "alvo": "1 criatura", "duracao": "Permanente", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "O conjurador tece uma maldição ancestral que acelera o envelhecimento e a decadência da criatura alvo, consumindo lentamente sua vitalidade e enfraquecendo sua existência. O conjurador realiza um ataque mágico. Em sucesso, o alvo perde permanentemente 20 pontos de Vida máxima ao início de cada turno enquanto estiver amaldiçoado. A maldição só pode ser removida por uma Magia Sagrada de nível Divino ou superior. Criaturas com a característica Eterno são imunes a este efeito."}, {"nome": "Maré das Eras", "tipo": "Magia Proibida", "custo": 12, "prereq": "Nível Lendário", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "5 Rodadas", "categoria": "Controle", "natureza": "Água", "descricao": "O conjurador invoca as Águas Primordiais do início dos tempos, uma força ancestral capaz de apagar e reescrever o próprio terreno ao redor. Uma inundação colossal cobre uma área de 27 metros de raio com água primordial devastadora. Criaturas dentro da área devem realizar uma salvaguarda de Tenacidade com CD +5. Em falha, sofrem 10d10 de dano de Água e ficam Paralisadas por 1 rodada. Em sucesso, sofrem apenas metade do dano e não ficam Paralisadas. Criaturas aquáticas sofrem apenas metade do dano desta magia. O terreno na área torna-se completamente alagado e considerado terreno difícil enquanto a magia persistir. Uma chuva torrencial cai continuamente sobre o campo de batalha, causando Lentidão em todas as criaturas dentro da área. Enquanto este efeito estiver ativo, nenhuma magia de Água de círculo inferior pode ser conjurada dentro da área, pois as Águas Primordiais dominam completamente o fluxo mágico do ambiente."}, {"nome": "Tempestade Eterna", "tipo": "Magia Proibida", "custo": 12, "prereq": "Nível Lendário em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Região", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Trovão", "descricao": "O conjurador altera drasticamente o clima da região, manipulando ventos, nuvens e correntes atmosféricas para criar tempestades violentas, chuvas torrenciais, furacões ou dissipar completamente o mau tempo, deixando o céu limpo e calmo. Enquanto uma tempestade estiver ativa, relâmpagos caem aleatoriamente pela área. No início do turno, cada criatura deve lançar 1d6. Em um resultado 1, um raio atinge instantaneamente a criatura, causando 8d12 de dano de Trovão. O mestre pode aplicar efeitos adicionais conforme o clima escolhido, como terreno difícil durante chuvas intensas, redução de visibilidade em tempestades ou deslocamento reduzido em furacões."}, {"nome": "Apagar da Existência", "tipo": "Magia Proibida", "custo": 16, "prereq": "Nível Secreto em conjuração.", "execucao": "Completa", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Negativo", "descricao": "O conjurador toca o alvo e inicia o apagamento de sua existência do tecido da realidade. Memórias, registros e até sua presença física começam a ser consumidos pelo vazio absoluto. O alvo deve realizar uma salvaguarda de Vontade com CD +10. Em falha, é instantaneamente Eliminado da existência."}, {"nome": "Desejo Caótico", "tipo": "Magia Proibida", "custo": 16, "prereq": "Nível Secreto em conjuração", "execucao": "Completa", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Caótico", "descricao": "O conjurador força a realidade a obedecer sua vontade através de um fragmento dos primordiais, distorcendo leis naturais, magia e destino. Ao conjurar esta magia, o jogador pode produzir praticamente qualquer efeito mágico, alterar eventos, recriar fenôenos semelhantes a outras magias ou manifestar milagres temporários, desde que o mestre considere o efeito possível dentro da escala da campanha. Efeitos simples podem ocorrer instantaneamente; efeitos grandiosos ou capazes de alterar o mundo podem gerar consequências catastróficas definidas pelo mestre. Conjurar Desejo Caótico consome imediatamente metade da Vida máxima e metade da Mana máxima do conjurador, ignorando reduções, resistências ou imunidades. Esse custo não pode reduzir o conjurador abaixo de 1 de Vida. Após a conjuração, a magia é imediatamente esquecida e removida da mente do conjurador, não podendo ser utilizada novamente até ser redescoberta, reaprendida ou obtida por meios extraordinários definidos pelo mestre. Toda vez que Desejo Caótico é utilizado, o mestre pode introduzir efeitos colaterais imprevisíveis, deformações mágicas, alterações permanentes na realidade ou consequências narrativas proporcionais ao poder do desejo realizado."}, {"nome": "O Nome Verdadeiro", "tipo": "Magia Proibida", "custo": 16, "prereq": "Nível Secreto em conjuração e saber nome verdadeiro da criatura.", "execucao": "Completa", "alcance": "Curto", "alvo": "Criatura", "duracao": "10 Rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador descobre e pronuncia o Nome Verdadeiro de uma criatura, estabelecendo domínio absoluto sobre sua essência. A criatura deve realizar uma salvaguarda de Vontade com CD +10. Em falha, a criatura fica completamente controlada pelo conjurador. No início de cada turno, ela pode realizar uma nova salvaguarda de Vontade com CD do conjurador +5 para romper o controle. Em sucesso, a criatura resiste a magia, reconhece imediatamente quem tentou subjugar seu Nome Verdadeiro e pode agir livremente contra o conjurador. O efeito é encerrado caso o conjurador morra ou caso uma Magia Proibida de nível equivalente ou superior seja utilizada para romper o vínculo."}, {"nome": "Singularidade", "tipo": "Magia Proibida", "custo": 16, "prereq": "Nível Secreto em conjuração.", "execucao": "Completa", "alcance": "Longo", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador cria um ponto de gravidade absoluta capaz de distorcer matéria, energia e magia, comprimindo tudo ao redor em uma singularidade devastadora. A área afetada possui 36 metros de raio. Todas as criaturas na área têm seu deslocamento reduzido à metade e são constantemente puxadas em direção ao centro da singularidade. Ao início de cada rodada, criaturas afetadas devem realizar uma salvaguarda de Atletismo. Em falha, são arrastadas 9 metros em direção ao centro. Criaturas que alcançarem a zona central da singularidade, em um raio de 3 metros, sofrem 15d10 de dano por rodada, ignorando todas as resistências e reduções de dano. Quando a magia é encerrada, a singularidade colapsa violentamente, liberando uma onda de choque destrutiva que causa 8d10 de dano em uma área de 18 metros ao redor do ponto central."}, {"nome": "Viagem a Lugar Nenhum", "tipo": "Magia Proibida", "custo": 16, "prereq": "Nível Secreto em conjuração", "execucao": "Completa", "alcance": "Ilimitado", "alvo": "Região", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Arcano", "descricao": "O conjurador rasga o tecido da realidade e cria um portal para qualquer local ou dimensão que deseje. O portal permanece aberto até o encerramento da magia, permitindo a travessia livre entre planos, mundos e dimensões. Criaturas podem atravessar o portal em ambas as direções enquanto ele permanecer ativo."}];
const TALENTS = [{"nome": "Aplicar Toxina", "descricao": "O dano causado pela condição Envenenado é aumentado para 2d6 por rodada."}, {"nome": "Afinidade Elemental", "descricao": "Escolha um elemento entre Água, Fogo, Terra, Vento ou Trovão. Você recebe resistência ao dano causado por esse elemento."}, {"nome": "Arqueólogo", "descricao": "Recebe vantagem em testes de História e Prestidigitação."}, {"nome": "Arquimemória Arcana", "descricao": "Pré-requisito: Intelecto 3 ou superior - Sua mente processa magia e conhecimento em velocidade sobrenatural. Testes para identificar magia recebem vantagem. Uma vez por descanso curto, pode reduzir em 1 o custo de Mana de uma magia."}, {"nome": "Atirador Mágico", "descricao": "Aumenta em 9 metros o alcance das magias conjuradas por você"}, {"nome": "Aura de Liderança", "descricao": "Pré-requisito: Presença 3 ou superior - Sua presença inspira aqueles ao seu redor. Aliados a até 9 metros de você recebem +2 em testes de salvaguarda com base no atributo Prenseça. Esse bônus é passivo e sempre ativo enquanto você estiver consciente e não estiver com a condição Silenciado ou Amedrontado."}, {"nome": "Chamas Incontroláveis", "descricao": "Ao aplicar um ataque magico contra uma criatura com elemento fogo e causar a condição Em Chamas ela causa +1d8 de dano contínuo adicional."}, {"nome": "Colosso de Guerra", "descricao": "Pré-requisito: Armas de duas mãos e Força 3 ou superior - Seu corpo foi treinado para esmagar defesas inimigas. Ao acertar um ataque corpo a corpo, você pode empurrar o alvo 3 metro sem teste."}, {"nome": "Coração de Leão", "descricao": "Pré-requisito: Presença 3 ou superior. Sua coragem e determinação permanecem firmes mesmo diante do impossível. Recebe vantagem em salvaguardas e testes de Vontade"}, {"nome": "Corte Profundo", "descricao": "Ao realizar um acerto crítico com uma arma corpo a corpo do tipo cortante ou perfurante, o alvo sofre Sangramento por 2 rodadas."}, {"nome": "Criar Veneno Mortal", "descricao": "A cada descanso, você pode criar uma quantidade de frascos de Veneno Mortal igual ao seu Intelecto. Cada frasco pode ser aplicado em uma arma corpo a corpo ou à distância (não funciona em armas mágicas). Ataques realizados com armas envenenadas causam dano mágico e aplicam a condição Envenenado ao alvo. Cada frasco possui uma única utilização."}, {"nome": "Dançarino das Lâminas", "descricao": "Pré-requisito: Destreza 3 ou superior - Sua velocidade torna seus movimentos quase impossíveis de acompanhar. Uma vez por rodada, ao errar um ataque corpo a corpo, você pode mover até 3 metros sem provocar ataques de oportunidade."}, {"nome": "Disparo Violento", "descricao": "Ao realizar um acerto crítico com uma arma de ataque à distância contra criaturas a menos de 6 metros de você, o alvo é empurrado 3 metros para trás."}, {"nome": "Empunhadura Dupla", "descricao": "Quando estiver empunhando duas armas de uma mão, o personagem pode realizar um ataque adicional com a arma secundária após executar um ataque. Esse ataque extra causa apenas metade do dano normal da arma secundária."}, {"nome": "Encantar com Veneno Mortal", "descricao": "O primeiro ataque crítico realizado por você com armas corpo a corpo ou à distância aplica Aplicar Toxina por 3 rodadas, aumentando o dano da condição para 2d6."}, {"nome": "Envenenar Arma", "descricao": "Seus ataques críticos com armas corpo a corpo aplicam a condição Envenenado ao alvo."}, {"nome": "Execução Final", "descricao": "Você recebe vantagem em ataques contra criaturas sob Enfraquecido, Paralisado ou Atordoado."}, {"nome": "Explosão Tóxica", "descricao": "Ao final do turno, criaturas envenenadas por você sofrem 1d4 de dano adicional de Veneno."}, {"nome": "Físico Escultural", "descricao": "Pré-requisito: Força 3 ou superior. Seu corpo foi levado ao auge da capacidade física. Recebe vantagem em salvaguardas e testes de Atletismo."}, {"nome": "Ganância Insaciável", "descricao": "Você aprendeu a transformar sofrimento em benefício próprio. Sempre que derrotar uma criatura, recupera Mana ou Vida igual ao seu Intelecto ou Vitalidade. Porém, sofre desvantagem para resistir a efeitos de Provocado relacionados a recompensas, tesouros ou poder."}, {"nome": "Gelo Sepulcral", "descricao": "Ao usar uma magia de ataque que causa a condição Congelando, as criaturas que sobrevivêrem recebem a condição de Lentidão por 2 rodadas."}, {"nome": "Genialidade", "descricao": "Pré-requisito: Intelecto 3 ou superior. Sua mente possui capacidade analítica e intelectual excepcional. Recebe vantagem em salvaguardas e testes de Investigação."}, {"nome": "Golpe Fulminante", "descricao": "Ao realizar um acerto crítico com uma arma de duas mãos, o alvo fica Atordoado por 1 rodada."}, {"nome": "Golpe Silenciador", "descricao": "Pré-requisito: Destreza 2 ou superior - Ao realizar um acerto crítico com armas de longa distância, contra uma criatura, o alvo deve passar em uma salvaguarda de Tenacidade ou ficará Silenciado por 1 rodada."}, {"nome": "Gula Abissal", "descricao": "Você consome energia, vida e poder sem limites. Sempre que causar dano contínuo (Sangramento, Em Chamas, Veneno), recupera Vida igual a metade do dano realizado, uma única vez por rodada. Porém, recebe desvantagem contra efeitos de Fadigado."}, {"nome": "Hemorragia Brutal", "descricao": "Pré-requisito: Força 2 ou superior - Sempre que causar Sangramento, o alvo também recebe a condição Enfraquecido até o fim do próximo turno."}, {"nome": "Inveja Predatória", "descricao": "Você odeia ver outros superiores a você. Uma vez por descanso curto, pode copiar temporariamente um talento de um aliado por 1 rodada a qualquer momento. Porém, após utilizar esse talento terá desvantagem no próxima salvaguarda."}, {"nome": "Ira Devastadora", "descricao": "Quanto mais ferido você está, mais brutal se torna. Sempre que entrar na condição Enfurecido, você recebe resistência a dano físico até o fim da cena."}, {"nome": "Lista de Magias Expandida", "descricao": "Concede 3 magias s de Águia", "descricao": "Ao utilizar armas de arremesso ou armas de ataque à distância, você ignora penalidades de ataque contra alvos em até 18 metros."}, {"nome": "Olhos de Coruja", "descricao": "Você enxerga no escuro não mágico em até 18 metros. Caso já possua visão no escuro, o alcance aumenta para 32 metros. Além disso, recebe +2 em salvaguardas contra ataques furtivos"}, {"nome": "Orgulho Absoluto", "descricao": "Você acredita estar acima de todos os outros. Sempre que vencer uma salvaguarda contra um efeito hostil, recebe vantagem no próximo ataque ou magia realizada até o fim do turno seguinte. Porém, não pode receber a ação Ajudar ou bônus morais de aliados enquanto estiver consciente."}, {"nome": "Pacto Ancestral", "descricao": "Restrição: Não Possuir Pacto com Nenhuma Entidade. Permite escolher uma Entidade Caótica e concedendo acesso as Magias de Pacto."}, {"nome": "Pacto Elemental", "descricao": "Restrição: Não Possuir Pacto com Nenhuma Entidade. Permite escolher uma Entidade Elemental e concedendo acesso as Magias de Antigas."}, {"nome": "Pacto Santificado", "descricao": "Restrição: Não Possuir Pacto com Nenhuma Entidade. Seu personagem recebe a subclasse Sagrado, podendo escolher uma Entidade Sagrada. Além disso, ganha acesso às Magias Sagradas. Ao realizar descansos em locais sagrados, recupera pontos adicionais de regeneração iguais ao seu valor de Presença."}, {"nome": "Passo Silencioso", "descricao": "Pré-requisito: Destreza 2 ou superior -  Seu controle corporal permite eliminar completamente o ruído dos seus movimentos. Você nunca sofre penalidade de Furtividade pelo tipo de terreno em que está se movendo. Além disso, ao se mover até a metade do seu deslocamento em um turno, recebe +5 em testes de Furtividade."}, {"nome": "Penetração Mágica", "descricao": "Quando uma criatura possuir resistência contra o tipo de dano mágico causado por você, a efetividade dessa resistência é reduzida pela metade."}, {"nome": "Poliglota", "descricao": "Você aprende um novo idioma à sua escolha. Além disso, recebe vantagem em testes relacionados a idiomas que conhece."}, {"nome": "Posição de Fortaleza", "descricao": "Você recebe uma reação adicional do tipo Bloqueio por rodada. Ao utilizar essa reação, recebe bônus de Defesa igual à sua Tenacidade. Caso ainda sofra dano após o bloqueio, reduza o dano recebido em um valor igual à sua Tenacidade."}, {"nome": "Potencializar Veneno", "descricao": "A duração da condição Envenenado causada por você é aumentada em +2 rodadas."}, {"nome": "Preguiça Entorpecente", "descricao": "Seu corpo se move pouco, mas sua mente evita desperdícios. Sempre que permanecer sem se mover durante um turno inteiro, recebe +2 em Defesa e salvaguardas até o próximo turno."}, {"nome": "Proficiência Armadura Leve", "descricao": "Tem acesso a armaduras leves."}, {"nome": "Proficiência Armadura Pesado", "descricao": "Tem acesso a armaduras pesadas."}, {"nome": "Proficiência Armas de Disparo", "descricao": "Tem acesso a armas de ataque de longa distância"}, {"nome": "Proficiência Armas Mágicas", "descricao": "Tem acesso a armas mágicas"}, {"nome": "Proficiência Armas Táticas", "descricao": "Tem acesso a armas táticas"}, {"nome": "Proficiência em Magia", "descricao": "Aumenta a CD em +2 pontos."}, {"nome": "Proficiência em Mana", "descricao": "Para cada ponto em proficiência recebe +2 de mana máximo."}, {"nome": "Proficiência em Vitalidade", "descricao": "Para cada ponto em proficiência recebe +3 em vida máximo."}, {"nome": "Proficiência Escudo", "descricao": "Tem acesso a escudos"}, {"nome": "Prontidão", "descricao": "Pré-requisito: Destreza 3 ou superior. Você está sempre atento ao ambiente e pronto para reagir ao perigo. Recebe vantagem em salvaguardas, testes de Iniciativa e testes de Percepção."}, {"nome": "Quebra de Limite", "descricao": "Aumenta o limite máximo de Mana por Turno em +2."}, {"nome": "Reações Rápidas", "descricao": "Você recebe uma reação bônus adicional por rodada."}, {"nome": "Refletir Veneno", "descricao": "Sempre que você sofrer um ataque crítico, a criatura atacante recebe a condição Envenenado por 3 rodadas."}, {"nome": "Reserva Arcana", "descricao": "Pré-requisito: Presença 2 ou superior - Você desenvolveu uma reserva mágica secundária que alimenta sua conjuração em momentos críticos. Você possui uma reserva de Mana adicional igual à sua Presença. Essa reserva se recupera somente em descanso longo e pode ser usada normalmente para pagar custos de magias."}, {"nome": "Resistência a Caótico", "descricao": "Você recebe resistência ao elemento caótico, ao escolher esse elemento está restrito ao talento Resistência Sagrada"}, {"nome": "Resistência à Morte", "descricao": "Sua determinação desafia os limites da sobrevivência. Você recebe vantagem em salvaguardas realizadas enquanto estiver na condição Morrendo."}, {"nome": "Resistência a Sagrado", "descricao": "Você recebe resistência ao elemento sagrado, ao escolher esse elemento está restrito ao talento Resistência Caótico"}, {"nome": "Sensibilidade Aguçada", "descricao": "Você consegue perceber emoções e intenções de outras criaturas, como medo, raiva ou malícia. Recebe +5 em testes de Carisma relacionados a Persuasão, Intimidação e Enganação."}, {"nome": "Sobrevivente Selvagem", "descricao": "Vitalidade 3 ou superior. Você domina técnicas naturais de adaptação e sobrevivência. Recebe vantagem em salvaguardas e testes de Sobrevivência."}, {"nome": "Terror Implacável", "descricao": "Pré-requisito: Presença 2 ou superior - Sempre que reduzir uma criatura a menos da metade da Vida, ela deve realizar uma salvaguarda de Tenacidade. Em caso de falha, fica Amedrontada por 1 rodada."}, {"nome": "Treinamento Marcial", "descricao": "Você recebe uma reação adicional do tipo Contra-Ataque por rodada. Ao utilizar essa reação, recebe bônus de Defesa igual à sua Luta. Caso obtenha sucesso na defesa, pode realizar imediatamente um ataque desarmado contra a criatura atacante."}, {"nome": "Vigor Inabalável", "descricao": "Pré-requisito: Vitalidade 2 ou superior -  Sua constituição robusta acelera sua recuperação. Sempre que recuperar Vida por descanso curto ou longo, você recupera pontos adicionais de Vida iguais ao dobro da sua Vitalidade."}, {"nome": "Vitalidade Inabalável", "descricao": "Pré-requisito: Vitalidade 3 ou superior - Seu corpo suporta danos que destruiriam outras criaturas. Ao cair para 0 pontos de vida, pode permanecer consciente até o fim do próximo turno uma vez por descanso longo."}];

// Calcula todas as perícias que têm Vantagem (de talentos + traços raciais)
function getSkillVantagens(){
  const set=new Set();
  // De talentos selecionados
  for(const t of char.talentos){
    const v=TALENT_VANTAGENS[t];
    if(v) v.forEach(s=>set.add(s));
  }
  // De traços raciais (base + herdados)
  const r=getRaceData();
  if(r){
    r.traits.forEach(t=>{const v=RACIAL_VANTAGENS[t.n];if(v)v.forEach(s=>set.add(s));});
  }
  getInheritedTraits().forEach(t=>{const v=RACIAL_VANTAGENS[t.n];if(v)v.forEach(s=>set.add(s));});
  // Fauno aspecto
  if(char.raca==='Fauno'&&char.faunoAspecto==='Raposa') set.add('Enganação');
  // Equipamentos do kit
  const eq=getEquipBonuses();
  eq.vantagens.forEach(s=>set.add(s));
  return set;
}

function getEquipBonuses(){
  if(!char.kit||!KIT_EQUIP_BONUSES[char.kit]) return {db:0,skills:{},vantagens:[],items:[]};
  return KIT_EQUIP_BONUSES[char.kit];
}

function getCharProficiencies(){
  const cl=getClassData();
  const profs=new Set();
  if(!cl) return profs;
  const armas=cl.armas;
  if(armas.includes('Táticas'))  profs.add('Armas Táticas');
  if(armas.includes('Mágicas'))  profs.add('Armas Mágicas');
  if(armas.includes('Disparo'))  profs.add('Armas de Disparo');
  if(armas.includes('Leve'))     profs.add('Armadura Leve');
  if(armas.includes('Pesada'))   profs.add('Armadura Pesada');
  if(armas.includes('Escudo'))   profs.add('Escudo');
  // Traços raciais que concedem proficiência
  const allTraits=[...(getRaceData()?getRaceData().traits:[]),...getInheritedTraits()];
  allTraits.forEach(t=>{
    if(t.n==='Proficiência Inata'){profs.add('Armadura Leve');profs.add('Armadura Pesada');}
    if(t.n==='Herança Vermelha') {profs.add('Armas Táticas');profs.add('Armadura Leve');}
  });
  // Talentos de proficiência
  if(char.talentos.includes('Proficiência Armadura Leve'))     profs.add('Armadura Leve');
  if(char.talentos.includes('Proficiência Armadura Pesado'))   profs.add('Armadura Pesada');
  if(char.talentos.includes('Proficiência Armas de Disparo'))  profs.add('Armas de Disparo');
  if(char.talentos.includes('Proficiência Armas Mágicas'))     profs.add('Armas Mágicas');
  if(char.talentos.includes('Proficiência Armas Táticas'))     profs.add('Armas Táticas');
  if(char.talentos.includes('Proficiência Escudo'))            profs.add('Escudo');
  return profs;
}

// Retorna lista de proficiências com sua origem para exibição
function getProficienciesDisplay(){
  const cl=getClassData();
  const r=getRaceData();
  const list=[];
  // Armas Simples — todos podem usar
  list.push({label:'Armas Simples', origem:'universal'});
  // De classe
  if(cl&&cl.armas!=='Nenhuma'){
    cl.armas.split(',').map(s=>s.trim()).forEach(p=>{
      if(p) list.push({label:p, origem:`Classe: ${char.classe}`});
    });
  }
  // De raça / traços herdados
  const allTraits=[...(r?r.traits:[]),...getInheritedTraits()];
  allTraits.forEach(t=>{
    if(t.n==='Proficiência Inata') {list.push({label:'Armadura Leve',origem:`Traço: ${t.n}`});list.push({label:'Armadura Pesada',origem:`Traço: ${t.n}`});}
    if(t.n==='Herança Vermelha')  {list.push({label:'Armas Táticas',origem:`Traço: ${t.n}`});list.push({label:'Armadura Leve',origem:`Traço: ${t.n}`});}
  });
  // De talentos
  const talProfMap={'Proficiência Armadura Leve':'Armadura Leve','Proficiência Armadura Pesado':'Armadura Pesada','Proficiência Armas de Disparo':'Armas de Disparo','Proficiência Armas Mágicas':'Armas Mágicas','Proficiência Armas Táticas':'Armas Táticas','Proficiência Escudo':'Escudo'};
  for(const [tal,prof] of Object.entries(talProfMap)){
    if(char.talentos.includes(tal)) list.push({label:prof, origem:`Talento: ${tal}`});
  }
  // Dedup
  const seen=new Set();
  return list.filter(p=>{const k=p.label;if(seen.has(k))return false;seen.add(k);return true;});
}

function checkTalentPrereq(name){
  const pre=TALENT_PREREQS[name];
  if(!pre) return null;
  if(pre.attr&&getAttr(pre.attr)<pre.min) return `Requer ${pre.label}`;
  if(pre.pacto){
    const pactos=['Pacto Ancestral','Pacto Elemental','Pacto Santificado'];
    if(pactos.filter(p=>p!==name&&char.talentos.includes(p)).length>0) return 'Já possui um pacto ativo';
  }
  return null;
}

function getSpellRequiredLangs(spell){
  if(!spell||!spell.prereq) return [];
  const match=spell.prereq.match(/Idioma\s+([A-Za-zÀ-ú]+(?:\s+e\s+[A-Za-zÀ-ú]+)*)/i);
  if(!match) return [];
  return match[1].split(/\s+e\s+/i);
}

function canLearnSpell(spell){
  const reqLangs=getSpellRequiredLangs(spell);
  if(!reqLangs.length) return {ok:true,missing:[]};
  const known=getKnownLangs();
  const missing=reqLangs.filter(l=>!known.includes(l));
  return {ok:missing.length===0, missing};
}

// Returns inherited traits for Híbrido / Maculado
function getInheritedTraits(){
  let out=[];
  if(char.raca==='Híbrido'){
    for(const {raceName,traitIdx} of char.hibridoTraits){
      const r=RACES[raceName];
      if(r&&r.traits[traitIdx]) out.push(r.traits[traitIdx]);
    }
  }
  if(char.raca==='Maculado'&&char.maculadoTrait){
    const {raceName,traitIdx}=char.maculadoTrait;
    const r=RACES[raceName];
    if(r&&r.traits[traitIdx]) out.push(r.traits[traitIdx]);
  }
  return out;
}

function getTalentBonuses(){
  const b={vida:0,mana:0,db:0,cd:0,lmt:0,spells:0};
  for(const t of char.talentos){
    const bns=TALENT_STAT_BONUSES[t];
    if(bns){
      if(bns.vida) b.vida+=bns.vida;
      if(bns.mana) b.mana+=bns.mana;
      if(bns.db)   b.db  +=bns.db;
      if(bns.cd)   b.cd  +=bns.cd;
      if(bns.lmt)  b.lmt +=bns.lmt;
    }
    if(t==='Lista de Magias Expandida') b.spells+=3;
    if(t==='Reserva Arcana') b.mana+=getAttr('PRE'); // +PRE extra mana pool
  }
  return b;
}

function getRacialBonuses(){
  const b={vida:0,mana:0,db:0,cd:0,lmt:0};
  if(!char.raca) return b;
  const r=getRaceData();
  if(!r) return b;

  // Fixed racial bonuses already NOT in bMana (they're calculated separately):
  // Draconato → Escamas Naturais +1 DB
  if(char.raca==='Draconato') b.db+=1;
  // Maculado → Fluxo Arcano +2 LMT
  if(char.raca==='Maculado') b.lmt+=2;

  // Inherited traits (Híbrido / Maculado selections)
  for(const t of getInheritedTraits()){
    const bns=TRAIT_BONUSES[t.n];
    if(bns){
      if(bns.vida) b.vida+=bns.vida;
      if(bns.mana) b.mana+=bns.mana;
      if(bns.db)   b.db  +=bns.db;
      if(bns.cd)   b.cd  +=bns.cd;
      if(bns.lmt)  b.lmt +=bns.lmt;
    }
  }
  return b;
}

function calcVida(){
  const cl=getClassData(); if(!cl)return 10;
  const tb=getTalentBonuses();
  const rb=getRacialBonuses();
  return 10+getAttr('VIT')+cl.vida+tb.vida+rb.vida;
}
function calcMana(){
  const cl=getClassData(); if(!cl)return 0;
  const r=getRaceData();
  const tb=getTalentBonuses();
  const rb=getRacialBonuses();
  return getAttr('PRE')*2+cl.mana+(r?r.bMana:0)+tb.mana+rb.mana;
}
function calcDB(){
  const rb=getRacialBonuses();
  const eq=getEquipBonuses();
  return 10+getAttr('DES')+rb.db+getTalentBonuses().db+eq.db;
}
function calcCD(){
  const cl=getClassData(); if(!cl)return 8;
  const foco=char.pericias['Foco']||0;
  return 8+getAttr(cl.atrib)+foco+getTalentBonuses().cd+getRacialBonuses().cd;
}
function calcLMT(){
  const rb=getRacialBonuses();
  const tb=getTalentBonuses();
  return PROF+2+rb.lmt+tb.lmt; // Prof + base + bonuses
}

function totalAttrPoints(){
  const r=getRaceData();
  return 7+(r?r.bAttrExtra:0);
}
function usedAttrPoints(){return Object.values(char.attrs).reduce((a,b)=>a+b,0);}
function remainingPoints(){return totalAttrPoints()-usedAttrPoints();}

function getSpellAccess(){
  const cl=getClassData(); if(!cl)return ['Truque','Magias Iniciais'];
  let access=[...cl.spellAccess];
  const r=getRaceData();
  if(cl.espiritualista&&char.espiritualistaChoice==='Antigas') access.push('Magias Antigas');
  if(cl.espiritualista&&char.espiritualistaChoice==='Sagradas') access.push('Magias Sagradas');
  if(r&&r.extraSpellType&&!access.includes(r.extraSpellType)) access.push(r.extraSpellType);
  if(char.raca==='Celestial'&&!access.includes('Magias Sagradas')) access.push('Magias Sagradas');
  if(char.talentos.includes('Pacto Ancestral')&&!access.includes('Magias de Pacto')) access.push('Magias de Pacto');
  if(char.talentos.includes('Pacto Elemental')&&!access.includes('Magias Antigas')) access.push('Magias Antigas');
  if(char.talentos.includes('Pacto Santificado')&&!access.includes('Magias Sagradas')) access.push('Magias Sagradas');
  return access;
}

// Base spells = 2 + INT; truques = 2; extra slots are additional (Grimório, racial)
function getSpellSlots(){
  const cl=getClassData();
  const tb=getTalentBonuses();
  const r=getRaceData();
  const intVal=getAttr('INT');
  return {
    base: 2+intVal,          // Magias Iniciais/Pacto/Antigas/Sagradas
    truques: 2,               // Truques separados
    extra: cl?cl.extraSlots:0, // Mago +3 Grimório (adicional)
    extraType: cl?cl.extraSlotType:null,
    extraSpells: tb.spells,   // de talentos (Lista de Magias Expandida)
    racialExtra: r&&r.extraSpellType?{type:r.extraSpellType,count:r.extraSpellTypeCount||1}:null,
  };
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
function go(dir){
  const err=validateStep();
  if(dir>0&&err){showErr(err);return;}
  step=Math.max(0,Math.min(STEP_NAMES.length-1,step+dir));
  render();
}
function showErr(msg){
  let e=document.getElementById('stepErr');
  if(!e){e=document.createElement('div');e.id='stepErr';e.className='err';document.getElementById('content').appendChild(e);}
  e.textContent='⚠ '+msg;
  setTimeout(()=>{if(e)e.textContent='';},3500);
}
function validateStep(){
  if(step===1&&!char.classe)return 'Escolha uma classe para continuar.';
  if(step===2&&!char.raca) return 'Escolha uma raça para continuar.';
  if(step===2&&char.raca==='Híbrido'&&char.hibridoTraits.length<2) return 'Escolha 2 traços da Herança Dupla.';
  if(step===3&&!char.kit)  return 'Escolha um kit inicial para continuar.';
  if(step===4&&remainingPoints()>0)return `Distribua os ${remainingPoints()} pontos restantes.`;
  return null;
}

// ═══════════════════════════════════════════════════════
//  RENDER MAIN
// ═══════════════════════════════════════════════════════
function render(){
  document.getElementById('stepsBar').innerHTML=
    STEP_NAMES.map((n,i)=>`<div class="sp${i===step?' active':i<step?' done':''}">${n}</div>`).join('');
  const fns=[renderInfo,renderClasse,renderRaca,renderKit,renderAtributos,renderPericias,renderIdiomas,renderMagias,renderTalentos,renderFicha];
  document.getElementById('content').innerHTML='';
  fns[step]();
  document.getElementById('btnPrev').disabled=step===0;
  const last=step===STEP_NAMES.length-1;
  const nb=document.getElementById('btnNext');
  nb.style.display=last?'none':'';
  nb.textContent=step===STEP_NAMES.length-2?'Ver Ficha →':'Próximo →';
  let pb=document.getElementById('printBtn');
  if(last){if(!pb){pb=document.createElement('button');pb.id='printBtn';pb.className='print-btn';pb.textContent='💾 Salvar como PDF';pb.title='Abre diálogo de impressão — escolha "Salvar como PDF" no navegador';pb.onclick=()=>window.print();document.body.appendChild(pb);}}
  else if(pb)pb.remove();
}

function renderRaca(){
  let html=`<h2>◈ Escolha sua Raça</h2><div class="cards-grid">`;
  for(const [name,r] of Object.entries(RACES)){
    const sel=char.raca===name;
    const bonusTags=r.traits.filter(t=>t.bonus).map(t=>`<span class="tag" style="border-color:var(--green);color:var(--green)">${t.bonus}</span>`).join('');
    html+=`<div class="card${sel?' selected':''}" onclick="selectRaca('${name}')">
      <div class="card-title">${name}</div>
      <div class="card-tags">${bonusTags}</div>
      <div class="card-body" style="margin-top:4px">${r.traits[0].n}: ${r.traits[0].d.substring(0,80)}...</div>
    </div>`;
  }
  html+=`</div>`;

  if(char.raca){
    const r=RACES[char.raca];
    html+=`<div class="info-box"><b>${char.raca}</b><br>`;
    r.traits.forEach(t=>{
      html+=`<b>${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</b>: ${t.d}<br>`;
    });
    html+=`<br><b>Idiomas:</b> ${r.idiomas}<br><b>Deslocamento:</b> ${r.move}m</div>`;

    // Aspecto Fauno
    if(char.raca==='Fauno'){
      html+=`<div class="fg"><label class="fl2">◈ Traços Bestiais — Escolha um Aspecto</label>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px;margin-top:4px">
          ${Object.entries(FAUNO_ASPECTOS).map(([key,asp])=>`
            <div class="trait-opt${char.faunoAspecto===key?' selected':''}" onclick="char.faunoAspecto='${key}';renderRaca()">
              <div>
                <div class="trait-opt-name">${asp.label} <span class="bonus-tag">Quando ativado</span></div>
                <div class="trait-opt-desc">${asp.desc}</div>
                <div style="font-size:.7em;color:var(--gold);margin-top:3px">⚡ Ativo: ${asp.ativo}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
    }
    // Elemento Draconato
    if(char.raca==='Draconato'){
      html+=`<div class="fg"><label class="fl2">Elemento da Linhagem</label>
        <select class="finput" onchange="char.draconatoElem=this.value">
          <option value="">Escolha...</option>
          ${['Fogo','Água','Terra','Vento','Trovão'].map(a=>`<option value="${a}"${char.draconatoElem===a?' selected':''}>${a}</option>`).join('')}
        </select></div>`;
    }
    // Herança Dupla — Híbrido
    if(char.raca==='Híbrido'){
      html+=renderHibridoPicker();
    }
    // Herança Ancestral — Maculado
    if(char.raca==='Maculado'){
      html+=renderMaculadoPicker();
    }
  }
  set(html);
}

function selectRaca(name){
  char.raca=name;
  char.hibridoTraits=[];
  char.maculadoTrait=null;
  char.idiomas=[];  // reset idiomas extras ao trocar de raça
  const r=RACES[name];
  // Auto-add fixed racial spell
  if(r&&r.extraSpell){
    if(!char.magias.includes(r.extraSpell)) char.magias.push(r.extraSpell);
  }
  renderRaca();
}

// Racial trait pickers
const HIBRIDO_EXCLUDED = ['Maculado','Celestial','Híbrido'];
const MACULADO_EXCLUDED = ['Híbrido','Celestial','Maculado'];

function renderHibridoPicker(){
  const selected=char.hibridoTraits;
  let html=`<div class="trait-picker">
    <h3>Herança Dupla — Escolha 2 traços raciais <span class="cnt-badge${selected.length>=2?' full':''}">${selected.length}/2</span></h3>
    <div style="font-size:.78em;color:var(--text-dim);margin-bottom:8px">Raças disponíveis: todas exceto Maculado e Celestial.</div>`;
  for(const [raceName,r] of Object.entries(RACES)){
    if(HIBRIDO_EXCLUDED.includes(raceName)) continue;
    html+=`<div class="race-group"><div class="race-group-title">${raceName}</div>`;
    r.traits.forEach((t,ti)=>{
      const isSel=selected.some(x=>x.raceName===raceName&&x.traitIdx===ti);
      const isDisabled=!isSel&&selected.length>=2;
      html+=`<div class="trait-opt${isSel?' selected':''} ${isDisabled?' disabled':''}" onclick="${isDisabled?'showErr(\'Limite de 2 traços atingido.\')':'toggleHibridoTrait(\''+raceName+'\','+ti+')'}">
        <span class="trait-opt-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</span>
        <span class="trait-opt-desc">${t.d}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function toggleHibridoTrait(raceName,traitIdx){
  const idx=char.hibridoTraits.findIndex(x=>x.raceName===raceName&&x.traitIdx===traitIdx);
  if(idx>=0){char.hibridoTraits.splice(idx,1);}
  else if(char.hibridoTraits.length<2){char.hibridoTraits.push({raceName,traitIdx});}
  renderRaca();
}

function renderMaculadoPicker(){
  const sel=char.maculadoTrait;
  let html=`<div class="trait-picker">
    <h3>Herança Ancestral — Escolha 1 traço racial <span class="cnt-badge${sel?' full':''}">${sel?1:0}/1</span></h3>
    <div style="font-size:.78em;color:var(--text-dim);margin-bottom:8px">Raças disponíveis: todas exceto Híbrido e Celestial.</div>`;
  for(const [raceName,r] of Object.entries(RACES)){
    if(MACULADO_EXCLUDED.includes(raceName)) continue;
    html+=`<div class="race-group"><div class="race-group-title">${raceName}</div>`;
    r.traits.forEach((t,ti)=>{
      const isSel=sel&&sel.raceName===raceName&&sel.traitIdx===ti;
      const isDisabled=!isSel&&sel!=null;
      html+=`<div class="trait-opt${isSel?' selected':''} ${isDisabled?' disabled':''}" onclick="${isDisabled?'showErr(\'Limite de 1 traço atingido.\')':'selectMaculadoTrait(\''+raceName+'\','+ti+')'}">
        <span class="trait-opt-name">${t.n}${t.bonus?` <span class="bonus-tag">${t.bonus}</span>`:''}</span>
        <span class="trait-opt-desc">${t.d}</span>
      </div>`;
    });
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}

function selectMaculadoTrait(raceName,traitIdx){
  if(char.maculadoTrait&&char.maculadoTrait.raceName===raceName&&char.maculadoTrait.traitIdx===traitIdx){
    char.maculadoTrait=null;
  } else {
    char.maculadoTrait={raceName,traitIdx};
  }
  renderRaca();
}

// ═══════════════════════════════════════════════════════
//  STEP 3: KIT INICIAL
// ═══════════════════════════════════════════════════════
function renderKit(){
  let html=`<h2>◈ Escolha seu Kit Inicial</h2>
  <div class="info-box">O kit define seu equipamento de partida. Pode ser escolhido independentemente da classe.</div>
  <div class="cards-grid" style="grid-template-columns:repeat(auto-fill,minmax(280px,1fr))">`;
  const profs=getCharProficiencies();
  for(const [name,k] of Object.entries(KITS)){
    const sel=char.kit===name;
    const eb=KIT_EQUIP_BONUSES[name];
    let profWarnings=[];
    if(eb) eb.items.forEach(i=>{if(i.prof&&!profs.has(i.prof)) profWarnings.push(`${i.n} (requer ${i.prof})`);});
    html+=`<div class="card${sel?' selected':''}" onclick="char.kit='${name}';renderKit()">
      <div class="card-title">Kit ${name}</div>
      ${k.items.map(i=>{
        const eb2=eb?eb.items.find(x=>x.n===i.n):null;
        const needProf=eb2&&eb2.prof&&!profs.has(eb2.prof);
        return `<div style="font-size:.78em;margin:2px 0${needProf?';color:var(--red)':''}"><b>${i.n}</b>${needProf?` ⚠️`:''}  — ${i.d}</div>`;
      }).join('')}
      ${profWarnings.length>0?`<div style="font-size:.7em;color:var(--red);margin-top:4px">⚠ Sem prof.: ${profWarnings.map(w=>w.split(' (')[0]).join(', ')}</div>`:''}
      <div class="card-tags" style="margin-top:8px">${k.extras.map(e=>`<span class="tag">${e}</span>`).join('')}</div>
    </div>`;
  }
  html+=`</div>`;
  set(html);
}

// ═══════════════════════════════════════════════════════
function renderAtributos(){
  const cl=getClassData();
  const r=getRaceData();
  const rem=remainingPoints();
  let html=`<h2>◈ Distribuição de Atributos</h2>
  <div class="pts-box">Pontos Restantes: <b id="ptsLeft">${rem}</b> / ${totalAttrPoints()}</div>`;
  if(cl) html+=`<div class="info-box">Atributo Principal de <b>${char.classe}</b>: <b>${ATTR_NAMES[cl.atrib]}</b> (usado na CD de Conjuração)</div>`;
  html+=`<div class="attrs-wrap">`;
  for(const [abbr,nome] of Object.entries(ATTR_NAMES)){
    const v=char.attrs[abbr]||0;
    const isKey=cl&&cl.atrib===abbr;
    html+=`<div class="attr-box${isKey?' key-attr':''}">
      <div class="attr-name">${nome}</div><div class="attr-abbr">(${abbr})${isKey?' ⭐':''}</div>
      <div class="attr-ctrl">
        <button class="attr-btn" onclick="changeAttr('${abbr}',-1)"${v<=0?' disabled':''}>−</button>
        <div class="attr-val">${v}</div>
        <button class="attr-btn" onclick="changeAttr('${abbr}',1)"${rem<=0?' disabled':''}>+</button>
      </div>
    </div>`;
  }
  html+=`</div><h3>Estatísticas Calculadas</h3><div class="stats-mini">`;
  html+=statsHtml();
  html+=`</div>`;
  if(r&&r.bMana>0) html+=`<div class="info-box" style="font-size:.8em">🔷 Bônus racial (${char.raca}): <b>+${r.bMana} Mana</b></div>`;
  if(r&&r.bAttrExtra>0) html+=`<div class="info-box" style="font-size:.8em">🔷 Bônus racial (${char.raca}): <b>+${r.bAttrExtra} ponto de atributo</b></div>`;
  set(html);
}

function statsHtml(){
  const rb=getRacialBonuses();
  const tb=getTalentBonuses();
  function bonus(v,r,t){
    const total=r+t;
    return total>0?` <span style="color:var(--green);font-size:.8em">(+${total})</span>`:'';
  }
  return `<div class="stat-chip">❤ Vida: <span>${calcVida()}</span>${bonus(0,rb.vida,tb.vida)}</div>
    <div class="stat-chip">💧 Mana: <span>${calcMana()}</span>${bonus(0,rb.mana,tb.mana)}</div>
    <div class="stat-chip">🛡 DB: <span>${calcDB()}</span>${bonus(0,rb.db,tb.db)}</div>
    <div class="stat-chip">🎯 CD: <span>${calcCD()}</span>${bonus(0,rb.cd,tb.cd)}</div>
    <div class="stat-chip">⚡ LMT: <span>${calcLMT()}</span>${bonus(0,rb.lmt,tb.lmt)}</div>`;
}

function changeAttr(abbr,delta){
  const v=char.attrs[abbr]||0;
  const nv=v+delta;
  if(nv<0||nv>7)return;
  if(delta>0&&remainingPoints()<=0)return;
  char.attrs[abbr]=nv;
  renderAtributos();
}

// ═══════════════════════════════════════════════════════
//  STEP 5: PERÍCIAS
// ═══════════════════════════════════════════════════════
function renderPericias(){
  const cl=getClassData();
  const r=getRaceData();
  const classPer=cl?cl.pericias:[];
  const extraPer=(r?r.extraPer:0);
  const manualMax=extraPer;
  const manualUsed=Object.entries(char.pericias).filter(([k,v])=>v>0&&!classPer.includes(k)).length;

  let html=`<h2>◈ Perícias</h2>
  <div class="info-box">
    <b>Perícias de Classe</b> (marcadas automaticamente): ${classPer.join(', ')}<br>
    ${manualMax>0?`<b>Perícias Extras da Raça</b>: ${manualUsed}/${manualMax} selecionadas<br>`:''}
    <b>Níveis:</b> Básico +2 | Intermediário +5 | Avançado +10 | Salvaguarda = Prof(${PROF}) + Nível
  </div>
  <div class="skills-grid">`;

  const vantagens=getSkillVantagens();
  const eqBonuses=getEquipBonuses().skills;
  for(const sk of SKILLS){
    const isClass=classPer.includes(sk.n);
    const lv=char.pericias[sk.n]||0;
    const eqB=eqBonuses[sk.n]||0;
    const sv=PROF+(lv||0)+eqB;
    const hasVant=vantagens.has(sk.n);
    html+=`<div class="skill-row" style="${hasVant?'border-color:var(--green);':''}">
      <span class="skill-name">${sk.n} <span style="color:var(--text-dim);font-size:.8em">(${sk.a})</span>${hasVant?` <span style="font-size:.65em;padding:1px 4px;border:1px solid var(--green);color:var(--green);border-radius:4px">Vant.</span>`:''}${eqB>0?` <span style="font-size:.65em;padding:1px 4px;border:1px solid var(--gold);color:var(--gold);border-radius:4px">+${eqB} equip</span>`:''}</span>
      <div class="skill-lv">
        ${isClass?`<span class="lbtn cls" title="Perícia de Classe">Cls</span>`:''}
        <button class="lbtn${lv===2?' on':''}" onclick="setPer('${sk.n}',${lv===2?0:2},'${isClass?'class':'extra'}',${manualMax},${manualUsed})">Bás</button>
        <button class="lbtn${lv===5?' on':''}" onclick="setPer('${sk.n}',${lv===5?0:5},'${isClass?'class':'extra'}',${manualMax},${manualUsed})">Int</button>
        <button class="lbtn${lv===10?' on':''}" onclick="setPer('${sk.n}',${lv===10?0:10},'${isClass?'class':'extra'}',${manualMax},${manualUsed})">Avç</button>
      </div>
      <span class="skill-sv">${sv}</span>
    </div>`;
  }
  html+=`</div>`;
  set(html);
  // Auto-set class skills
  for(const p of classPer){if(!(char.pericias[p]>=2))char.pericias[p]=2;}
}

function setPer(skill,lv,type,maxManual,usedManual){
  if(type==='extra'){
    const isAlreadyTrained=char.pericias[skill]>0;
    if(lv>0&&!isAlreadyTrained&&usedManual>=maxManual){showErr(`Limite de ${maxManual} perícias extras atingido.`);return;}
  }
  char.pericias[skill]=lv;
  renderPericias();
}

function getKnownLangs(){
  const r=getRaceData();
  const rl=char.raca?RACE_LANGS[char.raca]:null;
  const fixos=rl?rl.fixos:[];
  return ['Comum',...fixos,...char.idiomas.filter(l=>!fixos.includes(l)&&l!=='Comum')];
}

function renderIdiomas(){
  const cl=getClassData();
  const r=getRaceData();
  const rl=char.raca?RACE_LANGS[char.raca]:{fixos:[],extras:0};
  const fixos=['Comum',...rl.fixos];
  const maxExtras=rl.extras||0;
  const chosen=char.idiomas.filter(l=>!fixos.includes(l));
  const remaining=maxExtras-chosen.length;

  let html=`<h2>◈ Idiomas</h2>
  <div class="info-box">
    <b>Idiomas Base:</b> ${fixos.map(l=>`<span class="spell-pill">${l}</span>`).join(' ')}<br>
    <b>Extras disponíveis:</b> ${maxExtras} (${remaining} restante${remaining!==1?'s':''})<br>
    ${cl&&cl.classe==='Mago'||char.classe==='Mago'?'<span style="color:var(--gold)">⚠ <b>Mago:</b> Para usar magias do Grimório é necessário saber <b>Arcano</b>. Elfos já conhecem Arcano automaticamente.</span>':''}
    ${char.classe==='Mago'&&!fixos.includes('Arcano')&&!chosen.includes('Arcano')?'<br><span style="color:var(--red)">⚠ Recomendado: escolha <b>Arcano</b> para acessar seu Grimório.</span>':''}
  </div>`;

  // Já conhecidos (fixos)
  html+=`<div class="sh-sec"><div class="sh-stitle">Idiomas Conhecidos</div><div class="sh-sbody" style="display:flex;flex-wrap:wrap;gap:6px;padding:10px">`;
  fixos.forEach(l=>{
    html+=`<div style="padding:6px 12px;background:var(--bg3);border:1px solid var(--green);border-radius:20px;font-size:.85em;color:var(--green)">${l} <span style="font-size:.75em;opacity:.7">(base)</span></div>`;
  });
  chosen.forEach(l=>{
    html+=`<div style="padding:6px 12px;background:var(--sel);border:1px solid var(--gold);border-radius:20px;font-size:.85em;color:var(--gold);cursor:pointer" onclick="toggleLang('${l}')">${l} ✕</div>`;
  });
  html+=`</div></div>`;

  if(maxExtras>0){
    html+=`<h3 style="margin-top:12px;margin-bottom:8px">Escolha ${maxExtras} idioma${maxExtras>1?'s':''} adicional${maxExtras>1?'is':''}</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:6px">`;
    ALL_LANGS.forEach(lang=>{
      const isFixed=fixos.includes(lang);
      const isSel=chosen.includes(lang);
      const isDisabled=!isSel&&remaining<=0;
      html+=`<div class="trait-opt${isSel?' selected':''} ${isFixed?'disabled':''} ${isDisabled&&!isSel?'disabled':''}"
        onclick="${isFixed?'':isDisabled&&!isSel?`showErr('Limite de ${maxExtras} idiomas extras atingido.')`:`toggleLang('${lang}')`}"
        style="${isFixed?'opacity:.4;cursor:default;':''}"
      >
        <div>
          <div class="trait-opt-name">${lang}${isFixed?' <span style="font-size:.7em;color:var(--green)">(racial)</span>':''}</div>
          <div class="trait-opt-desc" style="font-size:.72em">${getLangDesc(lang)}</div>
        </div>
      </div>`;
    });
    html+=`</div>`;
  }
  set(html);
}

function toggleLang(lang){
  const rl=char.raca?RACE_LANGS[char.raca]:{fixos:[],extras:0};
  const fixos=['Comum',...rl.fixos];
  if(fixos.includes(lang))return;
  const idx=char.idiomas.indexOf(lang);
  if(idx>=0){char.idiomas.splice(idx,1);}
  else{
    const chosen=char.idiomas.filter(l=>!fixos.includes(l));
    if(chosen.length>=rl.extras){showErr(`Limite de ${rl.extras} idiomas extras atingido.`);return;}
    char.idiomas.push(lang);
  }
  renderIdiomas();
}

function getLangDesc(lang){
  const descs={
    'Élfico':'Língua refinada da magia e natureza, usada em textos arcânicos.',
    'Anão':'Idioma robusto e percussivo dos subterrâneos e forjadores.',
    'Dracônico':'Língua dos dragões e da magia primordial. Base de muitas fórmulas.',
    'Infernal':'Linguagem de demônios e pactos. Cada palavra carrega peso contratual.',
    'Celestial':'Idioma sagrado de anjos e ordens divinas.',
    'Selvagem':'Língua tribal direta de povos bestiais e nômades.',
    'Silvestre':'Linguagem espiritual de fadas e criaturas da floresta.',
    'Abissal':'Idioma caótico associado ao vazio e à corrupção.',
    'Gigante':'Língua antiga de gigantes e titãs. Raramente sussurrada.',
    'Orc':'Linguagem agressiva de tribos guerreiras. Funcional e direta.',
    'Feérico':'Idioma místico do Reino das Fadas, sotaque único.',
    'Arcano':'Usado em grimórios, runas e fórmulas mágicas. Invocado, não falado.',

}

let spellFilters={tipo:'',natureza:'',categoria:'',search:''};

function renderMagias(){
  const access=getSpellAccess();
  const slots=getSpellSlots();
  const r=getRaceData();

  const selTruque=char.magias.filter(m=>SPELLS.find(s=>s.nome===m&&s.tipo==='Truque'));
  const selBase=char.magias.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo!=='Truque';});
  const selExtra=char.magiasExtra;

  // Racial extra spell type count
  const racialCount=slots.racialExtra?char.magiasExtra.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo===slots.racialExtra.type;}).length:0;
  const extraGrimCount=char.magiasExtra.filter(m=>{const s=SPELLS.find(x=>x.nome===m);return s&&s.tipo===slots.extraType;}).length;

  let html=`<h2>◈ Magias & Truques</h2>`;

  // Slot info
  html+=`<div class="info-box" style="font-size:.8em">
    <b>Magias base:</b> 2 + Intelecto (${getAttr('INT')}) = <b>${slots.base}</b> magias conhecidas (escolha do pool acessível)<br>
    <b>Truques:</b> <b>2</b> truques (0 PM, à vontade)<br>
    ${slots.extra>0?`<b>${slots.extraType} (adicional):</b> <b>${slots.extra}</b> magias extras (não contam no limite base)<br>`:''}
    ${slots.extraSpells>0?`<b>Magias Adicionais (talento):</b> +${slots.extraSpells}<br>`:''}
    ${slots.racialExtra?`<b>Magia Racial (${slots.racialExtra.type}):</b> +${slots.racialExtra.count} (adicional)<br>`:''}
    ${r&&r.extraSpell?`<b>Magia Racial Fixa:</b> ${r.extraSpell} (adicionada automaticamente)`:''}
  </div>`;

  // Counters
  html+=`<div class="counter">
    <span class="cnt-badge${selTruque.length>=slots.truques?' full':''}">Truques: ${selTruque.length}/${slots.truques}</span>
    <span class="cnt-badge${selBase.length>=slots.base?' full':''}">Magias: ${selBase.length}/${slots.base}</span>
    ${slots.extra>0?`<span class="cnt-badge extra${extraGrimCount>=slots.extra?' full':''}">${slots.extraType?.replace('Magias ','')}: ${extraGrimCount}/${slots.extra} (adicional)</span>`:''}
    ${slots.racialExtra?`<span class="cnt-badge extra${racialCount>=slots.racialExtra.count?' full':''}">${slots.racialExtra.type?.replace('Magias ','')}: ${racialCount}/${slots.racialExtra.count} (racial)</span>`:''}
    ${slots.extraSpells>0?`<span class="cnt-badge extra">Lista Expandida: +${slots.extraSpells} slots</span>`:''}
  </div>`;

  // Filters
  const tipos=access;
  const naturezas=[...new Set(SPELLS.filter(s=>access.includes(s.tipo)).map(s=>s.natureza).filter(Boolean))].sort();
  const cats=[...new Set(SPELLS.filter(s=>access.includes(s.tipo)&&s.categoria).map(s=>s.categoria))].sort();

  html+=`<div class="filters">
    <span class="fl">Tipo:</span>
    <button class="fbtn${!spellFilters.tipo?' on':''}" onclick="setSF('tipo','')">Todos</button>
    ${tipos.map(t=>`<button class="fbtn${spellFilters.tipo===t?' on':''}" onclick="setSF('tipo','${t}')">${t.replace('Magias ','')}</button>`).join('')}
    <span class="fl" style="margin-left:6px">Elem:</span>
    <button class="fbtn${!spellFilters.natureza?' on':''}" onclick="setSF('natureza','')">Todos</button>
    ${naturezas.map(n=>`<button class="fbtn${spellFilters.natureza===n?' on':''}" style="border-color:${spellFilters.natureza===n?ELEM_COLORS[n]||'var(--gold)':'var(--border)'};color:${spellFilters.natureza===n?ELEM_COLORS[n]||'var(--gold)':'var(--text-dim)'}" onclick="setSF('natureza','${n}')">${n}</button>`).join('')}
  </div>
  <div class="filters">
    <span class="fl">Categ:</span>
    <button class="fbtn${!spellFilters.categoria?' on':''}" onclick="setSF('categoria','')">Todos</button>
    ${cats.map(cat=>`<button class="fbtn${spellFilters.categoria===cat?' on':''}" onclick="setSF('categoria','${cat}')">${cat}</button>`).join('')}
    <span class="fl" style="margin-left:6px">Busca:</span>
    <input class="search" value="${esc(spellFilters.search)}" placeholder="Buscar magia..." oninput="setSF('search',this.value)">
  </div>`;

  // Filtered spells
  let filtered=SPELLS.filter(s=>access.includes(s.tipo));
  if(spellFilters.tipo) filtered=filtered.filter(s=>s.tipo===spellFilters.tipo);
  if(spellFilters.natureza) filtered=filtered.filter(s=>s.natureza===spellFilters.natureza);
  if(spellFilters.categoria) filtered=filtered.filter(s=>s.categoria===spellFilters.categoria);
  if(spellFilters.search){const q=spellFilters.search.toLowerCase();filtered=filtered.filter(s=>s.nome.toLowerCase().includes(q)||s.descricao.toLowerCase().includes(q));}

  html+=`<div class="spells-grid">`;
  for(const s of filtered){
    const inBase=char.magias.includes(s.nome);
    const inExtra=char.magiasExtra.includes(s.nome);
    const sel=inBase||inExtra;
    const isExtra=s.tipo===slots.extraType||(slots.racialExtra&&s.tipo===slots.racialExtra.type);
    const nc=ELEM_COLORS[s.natureza]||'var(--border)';
    const cc=CAT_COLORS[s.categoria]||'var(--border)';
    const langChk=canLearnSpell(s);
    const locked=!langChk.ok&&!sel;
    html+=`<div class="sc${inBase?' selected':inExtra?' extra-selected':''}${locked?' disabled':''}"
      style="${locked?'opacity:.45;cursor:not-allowed;border-color:var(--red)!important;':''}"
      onclick="toggleSpell('${s.nome.replace(/'/g,"\\'")}')">
      <div class="sc-name">${s.nome}${inBase?' ✓':inExtra?' ⭐':locked?' 🔒':''}</div>
      <div class="sc-meta">
        <span class="tag" style="border-color:${nc};color:${sel?nc:'var(--text-dim)'}">${s.natureza||'—'}</span>
        ${s.categoria?`<span class="tag" style="border-color:${cc};color:${sel?cc:'var(--text-dim)'}">${s.categoria}</span>`:''}
        <span class="tag">${s.tipo.replace('Magias de ','').replace('Magias ','')}</span>
        <span class="tag">${s.custo} PM</span>
        ${s.execucao?`<span class="tag">${s.execucao}</span>`:''}
        ${isExtra?`<span class="tag" style="border-color:var(--purple);color:var(--purple)">adicional</span>`:''}
      </div>
      ${locked?`<div style="font-size:.7em;color:var(--red);margin-bottom:3px">🔒 Requer Idioma: ${langChk.missing.join(', ')}</div>`
              :s.prereq?`<div style="font-size:.7em;color:var(--gold);margin-bottom:3px">Pré-req: ${s.prereq}</div>`:''}
      <div class="sc-desc">${s.descricao}</div>
    </div>`;
  }
  if(!filtered.length) html+=`<div style="color:var(--text-dim);padding:20px;grid-column:1/-1">Nenhuma magia encontrada.</div>`;
  html+=`</div>`;
  set(html);
}

function setSF(k,v){spellFilters[k]=v;renderMagias();}

function toggleSpell(name){
  const s=SPELLS.find(x=>x.nome===name); if(!s)return;
  const slots=getSpellSlots();
  const inBase=char.magias.includes(name);
  const inExtra=char.magiasExtra.includes(name);

  if(inBase){char.magias=char.magias.filter(m=>m!==name);renderMagias();return;}
  if(inExtra){char.magiasExtra=char.magiasExtra.filter(m=>m!==name);renderMagias();return;}

  // Verificar pré-requisito de idioma
  const langCheck=canLearnSpell(s);
  if(!langCheck.ok){showErr(`Pré-requisito não atendido: necessita Idioma ${langCheck.missing.join(' e ')}.`);return;}

  // Determine where this spell goes
  if(s.tipo==='Truque'){
    const cnt=char.magias.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo==='Truque';}).length;
    if(cnt>=slots.truques){showErr(`Limite de ${slots.truques} truques atingido.`);return;}
    char.magias.push(name); renderMagias(); return;
  }

  // Extra slots (Grimório, Racial)
  if(slots.extraType&&s.tipo===slots.extraType){
    const cnt=char.magiasExtra.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo===slots.extraType;}).length;
    if(cnt>=slots.extra){showErr(`Limite de ${slots.extra} ${slots.extraType} atingido.`);return;}
    char.magiasExtra.push(name); renderMagias(); return;
  }
  if(slots.racialExtra&&s.tipo===slots.racialExtra.type){
    const cnt=char.magiasExtra.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo===slots.racialExtra.type;}).length;
    if(cnt>=slots.racialExtra.count){showErr(`Limite de ${slots.racialExtra.count} magia(s) racial atingido.`);return;}
    char.magiasExtra.push(name); renderMagias(); return;
  }

  // Base slots
  const cntBase=char.magias.filter(m=>{const sp=SPELLS.find(x=>x.nome===m);return sp&&sp.tipo!=='Truque';}).length;
  const totalBase=slots.base+slots.extraSpells;
  if(cntBase>=totalBase){showErr(`Limite de ${totalBase} magias atingido.`);return;}
  char.magias.push(name); renderMagias();
}

let talentFilter='';

function renderTalentos(){
  const r=getRaceData();
  const maxTal=PROF+(r&&r.extraTal?r.extraTal:0); // Proficiência(2) + bônus racial
  const inherited=getInheritedTraits();

  let html=`<h2>◈ Talentos</h2>
  <div class="info-box">
    <b>Talentos = Proficiência (${PROF})${r&&r.extraTal?` + ${r.extraTal} bônus racial`:''} = ${maxTal} talentos</b><br>
    Talentos com <span style="color:var(--green)">bônus de estatísticas</span> têm seus efeitos calculados automaticamente na ficha.
    ${inherited.length>0?`<br><b>Traços herdados:</b> ${inherited.map(t=>t.n).join(', ')}`:''}
  </div>
  <div class="counter">
    <span class="cnt-badge${char.talentos.length>=maxTal?' full':''}">Talentos: ${char.talentos.length}/${maxTal}</span>
  </div>
  <div class="filters">
    <span class="fl">Busca:</span>
    <input class="search" value="${esc(talentFilter)}" placeholder="Buscar talento..." oninput="talentFilter=this.value;renderTalentos()">
  </div>
  <div class="tgrid">`;

  let filtered=TALENTS;
  if(talentFilter){const q=talentFilter.toLowerCase();filtered=filtered.filter(t=>t.nome.toLowerCase().includes(q)||t.descricao.toLowerCase().includes(q));}

  for(const t of filtered){
    const sel=char.talentos.includes(t.nome);
    const bns=TALENT_STAT_BONUSES[t.nome];
    const prereqErr=checkTalentPrereq(t.nome);
    const locked=!sel&&prereqErr!==null;
    html+=`<div class="tc${sel?' selected':''}${locked?' disabled':''}"
      style="${locked?'opacity:.5;cursor:not-allowed;border-color:var(--red)!important;':''}"
      onclick="toggleTalent('${t.nome.replace(/'/g,"\\'")}',${maxTal})">
      <div class="tc-name">${t.nome}${sel?' ✓':locked?' 🔒':''}</div>
      ${bns?`<div class="tc-bonus">📊 Bônus: ${bns.label}</div>`:''}
      ${locked?`<div style="font-size:.7em;color:var(--red);margin-bottom:3px">🔒 ${prereqErr}</div>`:''}
      ${!locked&&TALENT_PREREQS[t.nome]?`<div style="font-size:.7em;color:var(--green);margin-bottom:3px">✓ Pré-req: ${TALENT_PREREQS[t.nome].label} — atendido</div>`:''}
      <div class="tc-desc">${t.descricao}</div>
    </div>`;
  }
  html+=`</div>`;
  set(html);
}

function toggleTalent(name,max){
  if(char.talentos.includes(name)){char.talentos=char.talentos.filter(t=>t!==name);}
  else{
    const prereqErr=checkTalentPrereq(name);
    if(prereqErr){showErr(`Pré-requisito não atendido: ${prereqErr}.`);return;}
    if(char.talentos.length>=max){showErr(`Limite de ${max} talento(s) atingido.`);return;}
    char.talentos.push(name);
  }
  renderTalentos();
}

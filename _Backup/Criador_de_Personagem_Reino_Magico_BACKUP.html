ra sofre 2d8 de dano Terra, cai ao chão e deve gastar uma ação de Movimento ou Padrão para se levantar. Em caso de sucesso, recebe apenas metade do dano e não cai ao chão."}, {"nome": "Titan de Pedra Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador molda um pequeno golem de pedra a partir do solo, que obedece às suas ordens e age no mesmo turno do conjurador, imediatamente após a conjuração. O golem possui 15 de Defesa, causa 2d6 de dano físico de Impacto em seus ataques e tem Vida igual a 3 vezes o Intelecto do conjurador. Caso o conjurador fique inconsciente, o golem se desfaz imediatamente. Conjurar esta habilidade novamente enquanto o golem ainda existir restaura completamente sua Vida e reinicia a duração da magia."}, {"nome": "Tsunami Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador invoca uma onda colossal que varre tudo à sua frente, arrastando criaturas e destruindo estruturas frágeis. A onda avança em uma linha de 18 metros de comprimento por 6 metros de largura. Criaturas na área devem superar uma salvaguarda de Tenacidade ou sofrer 4d8 de dano de Água, serem arremessadas 9 metros para trás. O local afetado se torna terreno difícil e coberto por lamaçal. Criaturas aquáticas sofrem apenas metade do dano e ignoram os efeitos do terreno difícil."}, {"nome": "Vácuo Silencioso Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Vento", "descricao": "O conjurador remove completamente o ar de uma área, criando um vazio sufocante onde sons desaparecem e palavras jamais conseguem ser pronunciadas. Em uma área de 6 metros, criaturas ficam com a condição Silenciado e devem realizar uma salvaguarda de Tenacidade ao início de cada rodada. Em caso de falha, ficam Paralisadas até o início de seu próximo turno."}, {"nome": "Vôo Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Movimento", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Vento", "descricao": "O conjurador cria asas formadas por correntes de vento condensado, leves e velozes como tempestades celestiais. Enquanto a magia permanecer ativa, recebe deslocamento de voo de 18 metros."}, {"nome": "Vulcão Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador abre uma fissura vulcânica no solo, liberando violentos jatos de magma contra tudo ao redor. Criaturas em um raio de 6 metros devem realizar uma salvaguarda de Reflexo. Em falha, sofrem 4d8 de dano de Fogo. Em sucesso, sofrem apenas metade do dano. O terreno atingido torna-se terreno difícil coberto por magma e rochas incandescentes. Criaturas que atravessarem a área ou iniciarem o turno dentro dela sofrem 2d8 de dano de Fogo."}, {"nome": "Aerinë Tintallë Dança das Estrelas Cadentes", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Élfico", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "\"Que as estrelas caiam sobre aquele que ousa se opor à harmonia do cosmos.\" O conjurador realiza um ataque mágico enquanto fragmentos de luz estelar convergem sobre o alvo em rajadas de raios prateados que perfuram defesas mágicas. Em acerto, a magia causa 2d8 + 4 de dano Arcano. Os estilhaços de luz permanecem vibrando sobre as defesas do alvo, desestabilizando sua energia mágica e impondo penalidade em salvaguardas igual ao Intelecto do conjurador até o início do próximo turno do conjurador."}, {"nome": "Benedicta Lux Luz Abençoada", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Celestial", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Arcano", "descricao": "“Lux Benedicta! Que a glória dos planos superiores julgue esta criatura pela verdade de sua alma!” O conjurador cria uma luz arcana sobre a criatura alvo e invoca o espírito de um celestial ancestral para julgá-la diante das verdades superiores. Enquanto o efeito persistir, o conjurador pode realizar perguntas diretamente à criatura e recebe +10 em testes de Intelecto ou Presença para obter respostas, discernir mentiras ou extrair informações ocultas. Caso o alvo seja um Morto-Vivo ou uma criatura do Elemento Negativo, o bônus aumenta para +20, pois a luz celestial queima sua essência e enfraquece sua capacidade de ocultar a verdade."}, {"nome": "Eilian Môr Gwyn Névoas Soniferas", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Silvestre", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Utilidade", "natureza": "Água", "descricao": "O conjurador invoca uma névoa densa e pesada em uma área de 18 metros, preenchida por ilusões de sons distantes, aromas suaves e sussurros etéreos que confundem os sentidos. Criaturas dentro da névoa devem realizar uma salvaguarda de Vontade. Em falha, ficam na condição Adormecido enquanto permanecerem sob o efeito da magia. Em sucesso, permanecem despertas, mas sofrem desvantagem em testes de Percepção e Pontaria até o fim do efeito."}, {"nome": "Elessë Calma Escudo de Graça Imortal", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Élfico", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Pessoal", "duracao": "3 rodadas", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "“A graça dos imortais seja meu escudo; que nenhum golpe atravesse a paz que carrego.” Como um reflexo instintivo, o conjurador ergue um campo protetor de energia élfica, tecido com padrões luminosos de folhas e estrelas ancestrais. O escudo concede +3 em Defesa Base e Resistência 15 contra qualquer dano mágico. A magia pode ser ativada como reação ao receber um ataque. Caso o conjurador ainda sofra dano após a redução, regenera 1d6 de Mana."}, {"nome": "Flagrare Animam Queimar a Alma", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Infernal", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "\"Flagrare! Que a chama do Inferno encontre sua alma e a marque como minha.\" O conjurador realiza um ataque mágico e, em caso de acerto, amaldiçoa o alvo com chamas infernais que ignoram armaduras e queimam diretamente sua vitalidade. Enquanto estiver amaldiçoado, o alvo sofre 2d8 de dano de Fogo ao início de cada rodada. Além disso, sempre que conjurar uma magia sob este efeito, perde 1d4 pontos de Vida adicionais, pois as chamas se alimentam da energia mágica liberada. Ao final de cada rodada, o alvo pode realizar uma salvaguarda de Vontade para suprimir a maldição e encerrar o efeito."}, {"nome": "Gaia Fractura Fissura da Terra Primordial", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Primordial", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "As primeiras palavras da criação são pronunciadas ao contrário — onde antes existia solo, agora resta apenas vazio. O conjurador entoa sílabas proibidas e o terreno se rompe violentamente, abrindo uma fissura de até 9 metros de comprimento e 1,5 metro de largura. Criaturas sobre a fissura devem realizar uma salvaguarda de Reflexo. Em caso de falha, caem em seu interior, sofrendo 3d6 de dano de Impacto e ficando Presas. Criaturas presas devem gastar uma ação padrão e realizar um teste de Atletismo contra a CD do conjurador para conseguir sair da fissura. Em caso de sucesso, conseguem escapar para um espaço adjacente. A fissura permanece aberta durante toda a duração da magia."}, {"nome": "Gwydion Dŵr Magia das Águas Vivas", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Silvestre", "execucao": "Padrão", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Água", "descricao": "\"Dŵr byw! Que as águas da floresta tragam vida e renovação a este ser da natureza!\" O conjurador convoca as águas vivas que correm pelas veias da terra, direcionando-as para curar e nutrir. O alvo recupera 3d6+4 pontos de vida, e qualquer veneno de origem natural é neutralizado automaticamente. Se usada em combate, a água também pode formar uma muralha líquida que concede cobertura parcial (+2 de Defesa) ao alvo até o início do próximo turno do conjurador."}, {"nome": "Impus Servitor Diabrete Serviçal", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Infernal", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "5 Rodadas", "categoria": "Invocação", "natureza": "Fogo", "descricao": "“Das brasas do submundo, ergo um servo efêmero cuja morte anuncia o fogo infernal.” O conjurador invoca um pequeno diabrete envolto em brasas infernais para servi-lo temporariamente. O diabrete age no turno do conjurador e pode ser movido até 18 metros por rodada. Ele não pode realizar ataques, mas é capaz de executar pequenas ações, como mover objetos leves, abrir portas, carregar pequenos itens ou interagir com mecanismos simples. Ao sofrer qualquer quantidade de dano, o diabrete explode em chamas infernais, causando 3d10 de dano de Fogo em criaturas em um raio de 6 metros. Após a explosão, o diabrete é destruído."}, {"nome": "Sanctum Scutum Escudo Sagrado", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Celestial", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Invocação", "natureza": "Arcano", "descricao": "\"Scutum sanctum! Que a proteção dos anjos envolva este ser e o guarde do mal!\" O conjurador invoca a alma de um celestial ancestral, manifestando um Guardião Sagrado diante de si. A presença do celestial emana autoridade divina irresistível, provocando criaturas ao redor do conjurador. Criaturas na área devem realizar uma salvaguarda de Vontade. Criaturas do Elemento Negativo e Mortos-Vivos sofrem CD +10 nesta salvaguarda. Em falha, as criaturas são compelidas a direcionar seus ataques e hostilidade exclusivamente ao celestial enquanto o efeito persistir. No início de cada turno, criaturas afetadas devem repetir a salvaguarda para tentar resistir ao efeito. O Guardião Celestial é indestrutível, não sofre dano, condições ou qualquer outro efeito, existindo apenas para atrair a agressividade das criaturas afetadas até o término da magia."}, {"nome": "Scutum Manae Escudo de Mana", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Arcano", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Pessoal", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "\"Mana scutum! Que minha própria força arcana se torne barreira entre mim e o perigo!\" O conjurador transforma sua própria reserva de Mana em um escudo protetor arcano. O escudo possui 30 pontos de absorção; todo dano recebido, independentemente do tipo, é reduzido primeiro dos pontos do escudo antes de afetar o conjurador. Quando os pontos de absorção chegam a 0, o escudo se rompe e a magia é encerrada. O conjurador pode gastar adicionalmente 2 ponto de Mana para aumentar o escudo em +20 pontos de absorção, desde que possua Mana suficiente para sustentar a amplificação. Esta magia não é acumulativa; uma nova conjuração reinicia completamente os pontos do escudo anterior."}, {"nome": "Tempus Fractum Tempo Fraturado", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Arcano", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "\"Fractum tempus! Que o fio do tempo se parta e te force a viver este instante duas vezes!\"  O conjurador distorce o fluxo do destino e obriga a criatura alvo a repetir sua última rolagem, abandonando completamente o resultado anterior. O alvo deve obrigatoriamente utilizar o novo resultado obtido, mesmo que seja pior."}, {"nome": "Tenebris Vinculum Correntes das Trevas", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Infernal", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Vinculum! Que as correntes do abismo te prendam e dobrem sua vontade à minha!\" O conjurador realiza um ataque mágico, fazendo correntes de sombra infernal emergirem do chão e se enrolarem ao redor do alvo. Em caso de acerto, o alvo fica Imobilizado, não podendo se mover, e sofre uma penalidade de –5 em ataques e testes de perícia enquanto permanecer preso pelas correntes. Ao final de cada rodada, a criatura pode tentar se libertar realizando um teste de Atletismo contra a CD do ataque mágico do conjurador."}, {"nome": "Thac Nakit Vur Asas do Dragão do Relampago", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Dracônico", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Trovão", "descricao": "\"Vur nakit! Que meus toques carreguem a ira do trovão dos dragões tempestários.\" O conjurador invoca asas formadas por relâmpagos e correntes elétricas vibrantes, movendo-se com a velocidade de uma tempestade viva. Enquanto as asas estiverem ativas, o conjurador recebe +10 em Iniciativa, uma reação adicional por rodada e aumenta seu deslocamento em +6 metros. Além disso, pode voar até 9 metros durante seus movimentos, sustentado pelas correntes elétricas das asas trovejantes."}, {"nome": "Tündér Bűvölet Encanto Feérico", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Feérico", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Bűvölet! Que o encantamento das fadas toque sua mente e você veja apenas maravilha onde há batalha!\" O conjurador lança um pó feérico cintilante sobre o alvo. A criatura deve realizar um teste de Vontade contra a CD do conjurador. Em caso de falha, o alvo fica fascinado por uma ilusão deslumbrante, perdendo suas ações de movimento até o final do efeito da magia. Caso a criatura afetada receba dano, o efeito é interrompido imediatamente."}, {"nome": "Vortex Arcani Vórtice Arcano", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Arcano", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "\"Arcanus vortex! Que o abismo entre os planos se abra aqui e devore tudo em seu turbilhão!\" O conjurador cria um subespaço arcano capaz de armazenar uma quantidade de itens igual ao seu Intelecto +1. Apenas itens com tamanho igual ou inferior a 9 metros podem ser guardados nesse espaço extradimensional. Ao conjurar esta magia novamente, o conjurador pode acessar livremente o subespaço para retirar ou armazenar itens."}, {"nome": "Ziil Garurt Svabol Alento de Fogo Eterno", "tipo": "Magias de Grimório", "custo": 4, "prereq": "Idioma Dracônico", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "\"Svabol! Que o fogo dos primeiros dragões consuma tudo que se atreve a se opor a mim.\" O conjurador pronuncia palavras dracônicas de destruição e libera um cone de chamas ancestrais à sua frente, queimando tudo em uma área de 9 metros. Criaturas na área sofrem 2d10 de dano de Fogo e devem realizar uma salvaguarda de Reflexo contra a CD do conjurador para sofrer apenas metade do dano. As chamas deixam marcas dracônicas incandescentes nas superfícies atingidas, transformando a área em terreno difícil. Criaturas que iniciarem o turno ou atravessarem o terreno afetado sofrem 1d8 de dano de Fogo."}, {"nome": "Aura do Patrono", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "3 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "A presença da entidade vinculada ao pacto envolve o conjurador como uma névoa sobrenatural, alterando sua voz, olhar e postura de maneira perturbadora ou fascinante. Durante a duração, o conjurador recebe +10 em testes de Enganação, Persuasão ou Intimidação, à sua escolha no momento da conjuração. Este efeito não acumula com outras habilidades ou magias semelhantes."}, {"nome": "Dreno de Vida", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador drena parte da essência vital da criatura alvo através do pacto sombrio. Realiza um ataque mágico contra a criatura. Se atingir, causa 2d10 de dano caótico e o conjurador recupera 1d4 de Vida. A criatura deve realizar uma salvaguarda de Tenacidade. Em caso de falha, fica Enfraquecida por 1 rodada."}, {"nome": "Equipamento do Patrono", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "Conjura um equipamento vinculado ao patrono. O conjurador possui proficiência automática com o equipamento. O item desaparece caso o conjurador fique inconsciente. Apenas o pactuado pode utilizar o equipamento. Cada equipamento concede um benefício poderoso acompanhado de uma penalidade vinculada ao pacto. • O Espelho Dourado — Acessório: Reflexo Dourado +2 na CD das magias. Penalidade: –2 em testes de Presença. • A Dama dos Desejos — Acessório: Joia dos Desejos Magias ofensivas causam +1d6 de dano mágico. Penalidade: Não pode realizar ataques físicos. • Mestre do Banquete — Armadura: Vestes do Banquete +2 de Defesa. Penalidade: Cura mágica recebida reduzida pela metade. • O Ruivo — Arma: Machado do Ruivo Machado mágico que causa 2d8 de dano e concede +2 em ataques. Penalidade: –2 na CD das magias. • O Colecionador — Acessório: Relicário Maldito Escolha: +10 Vida máxima e –5 Mana máxima. +10 Mana máxima e –5 Vida máxima. • O Sonolento — Calçado: Botas da Preguiça Ignora penalidades de Fração de Segundos. Penalidade: –2 de Defesa. • Mil Olhos — Arma: Cajado dos Mil Olhos Escolha até 2 magias. Elas custam –2 Mana. Penalidade: Todas as outras magias custam +2 Mana."}, {"nome": "Fome das Sombras", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "Criaturas feridas atraem entidades famintas do vazio. Sempre que uma criatura dentro do alcance sofrer dano, o conjurador pode consumir sua reação para realizar um ataque mágico contra ela. Se atingir, causa 2d6 de dano caótico adicional. Se a criatura morrer sob este efeito, o conjurador recupera 1d6 de Mana."}, {"nome": "Maldição das Sombras", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "1 Criatura", "duracao": "3 Rodadas", "categoria": "", "natureza": "Caótico", "descricao": "Sombras vivas se prendem ao alvo, alimentando o conjurador com fragmentos de sua essência. O conjurador recebe vantagem em ataques físicos, mágicos e testes ofensivos contra a criatura amaldiçoada. Caso o alvo morra durante a duração da magia, o conjurador absorve parte de sua energia, recuperando 1d6 de mana."}, {"nome": "Pequeno Buraco Negro", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador cria uma pequena distorção gravitacional que deforma o espaço ao redor. Cria uma área com raio de 9 metros. Criaturas dentro da área sofrem: deslocamento reduzido pela metade; –2 em rolagens de ataque; –2 em salvaguardas baseadas em Força e Destreza. Os efeitos permanecem enquanto a criatura estiver dentro da área."}, {"nome": "Servo das Sombras", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "3 rodadas", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador cria uma criatura sombria disforme que atua como distração e extensão limitada de sua vontade. Ao ser conjurado, o Servo das Sombras provoca todas as criaturas em um raio de 9 metros. Criaturas afetadas devem realizar uma salvaguarda de Vontade; em caso de falha, são obrigadas a atacar o servo até o início do próximo turno do conjurador. O servo não pode atacar, realizar testes complexos ou conjurar magias, servindo apenas para distração, interações simples e ações básicas."}, {"nome": "Troca de Corações", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Completo", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador força uma ligação maldita entre almas, transferindo sofrimento de um corpo para outro. Realiza um ataque mágico contra uma criatura. Caso esteja em desvantagem neste ataque, a desvantagem é ignorada. Se atingir, o conjurador pode transferir todas as condições negativas de uma criatura à escolha dele (incluindo si mesmo) para a criatura alvo."}, {"nome": "Visitar ao Domínio", "tipo": "Magias de Pacto", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Pessoal e 1 criatura", "duracao": "1 rodada", "categoria": "", "natureza": "Caótico", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Se o ataque for bem-sucedido, ambos são imediatamente transportados para o Domínio da entidade vinculada ao pacto. As criaturas permanecem no Domínio por, no mínimo, 1 rodada, sofrendo ou recebendo todos os efeitos e regras especiais impostos por esse local sobrenatural. Ao término da duração, retornam ao espaço original que ocupavam ou para o espaço desocupado mais próximo disponível."}, {"nome": "“Porta arcanum!” Porta Mágica", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Arcano", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "“Porta arcanum!” O conjurador marca uma porta específica com um selo arcano invisível, vinculando-a ao fluxo espacial da magia. Enquanto a porta marcada existir, o conjurador pode utilizar qualquer passagem em formato retangular, como portas, arcos ou corredores estreitos, para criar temporariamente uma conexão mágica com o ponto marcado. Ao abrir a passagem escolhida, ela conduz imediatamente à porta vinculada, permitindo atravessar instantaneamente entre os dois locais. A marca só pode existir em uma única porta por vez; ao marcar uma nova porta, a anterior perde imediatamente o vínculo mágico. Criaturas sem permissão do conjurador não conseguem utilizar a passagem."}, {"nome": "Aegis Abyssi Égide do Abismo", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Infernal", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Pessoal", "duracao": "5 Rodadas", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "\"Abyssi aegis! Que as sombras do abismo se tornem meu escudo e minha vingança!\". O conjurador invoca um escudo de sombras densas do Abismo que envolve todo o seu corpo. Enquanto a magia estiver ativa, o conjurador recebe +3 de Defesa e 20 pontos de redução contra dano mágico. Sempre que uma criatura acertar o conjurador com um ataque físico corpo a corpo, ela sofrerá 2d6 de dano de fogo infernal, causado pelas sombras que punem qualquer contato direto. Durante o efeito, a aparência do conjurador se torna distorcida e sombria, impondo uma penalidade de –5 em todos os testes de Presença."}, {"nome": "Aether Tempestas Tempestade Etérea", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Arcano e Primordial", "execucao": "Completo", "alcance": "Longo", "alvo": "Local", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Tempestas aetheria! Que a fúria dos planos etéreos se manifeste e destrua tudo que não é puro arcano!\"  O conjurador cria uma tempestade arcana em um raio de 18 metros. Todas as criaturas dentro da área têm o custo de suas magias aumentado em um valor igual ao Intelecto do conjurador. Além disso, todas as magias lançadas dentro da tempestade são realizadas com desvantagem."}, {"nome": "Coeden Fyw A Árvore que Caminha", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Silvestre", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Terra", "descricao": "\"Coeden fyw! Que a floresta desperte e defenda seus filhos contra aqueles que trazem destruição!\" O conjurador desperta a vegetação ao redor, fazendo raízes, cipós e galhos se moverem com vontade própria para aprisionar e atacar seus inimigos. Criaturas inimigas na área devem realizar uma salvaguarda de Reflexo. Em caso de falha, ficam Paralisadas pelas raízes que emergem do solo. Uma criatura imobilizada pode tentar escapar realizando um teste de Atletismo contra a CD do conjurador como ação padrão. Cada tentativa de fuga aumenta a CD em +2, até um máximo de +10. Além disso, uma vez por rodada, um galho ou raiz pode realizar um ataque contra uma criatura à escolha do conjurador dentro da área. O ataque utiliza a CD do conjurador para acertar e, em caso de sucesso, causa 2d6 de dano físico de Impacto."}, {"nome": "Cruciatus Mentis Suplício da Mente", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Infernal", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "\"Cruciatus! Que os sussurros do Inferno preencham sua mente e não deixem lugar para pensamentos.\". O conjurador realiza um ataque mágico que invade a mente do alvo com vozes e visões infernais. O alvo sofre 2d6 de dano Arcano e fica sob a condição Confuso enquanto durar o efeito. Caso falhe em um teste de Vontade contra a CD do conjurador, o alvo também fica Amedrontado pelo conjurador. Ao final de cada rodada, a criatura pode realizar um novo teste de Vontade para encerrar os efeitos da magia."}, {"nome": "Csillag Zápor Chuva de Estrelas Feéricas", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Feérico", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Zápor csillag! Que as estrelinha das fadas dancem sobre este campo e façam a alegria e a confusão reinarem!\". Uma chuva de minúsculas estrelas feéricas dança sobre uma área de 9 metros de raio. No turno em que a magia é lançada e no início de cada turno do conjurador, cada aliado dentro da área recupera 1d6 pontos de vida. Além disso, cada inimigo na área deve realizar um teste de Vontade contra a CD do conjurador. Em caso de falha, a criatura recebe a condição Confuso até o início do próximo turno do conjurador. As estrelas feéricas também revelam criaturas invisíveis dentro da área, anulando os efeitos de invisibilidade enquanto permanecerem sob a luz das estrelas."}, {"nome": "Dissolvere Magicam Dissipar a Magia", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Arcano e Primordial", "execucao": "Reação", "alcance": "Médio", "alvo": "Magia", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Dissolvere! Que minha vontade arcana supere a tua e desfaça o que teceste com tanto cuidado!\" O conjurador libera uma onda de ruptura arcana que dissipa todas as magias em um raio de 12 metros. Magias de nível Elite ou inferior são imediatamente anuladas. Para dissipar magias de nível superior, o conjurador deve gastar uma quantidade adicional de Mana igual ao custo da magia alvo +2. Magias de nível Divino ou Secreto não podem ser dissipadas por este efeito."}, {"nome": "Dŵr Drych Hudol Ilusão das Águas Espelhadas", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Silvestre", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "5 rodadas", "categoria": "Utilidade", "natureza": "Água", "descricao": "O conjurador envolve uma área com 24 metros de raio em uma poderosa magia ilusória, fazendo o ambiente parecer distorcido como reflexos sobre águas agitadas. Sons, imagens e formas falsas surgem constantemente, confundindo os sentidos das criaturas presentes. Criaturas dentro da área devem realizar uma salvaguarda de Vontade. Em falha, tornam-se vulneráveis às ilusões criadas pelo conjurador, que pode manifestar sons, imagens, duplicatas de criaturas, objetos e distorções do ambiente para distraí-las e enganá-las. Criaturas que obtiverem sucesso na salvaguarda conseguem perceber parcialmente a ilusão, mas ainda sofrem desvantagem em todas as salvaguardas e testes enquanto permanecerem dentro da área."}, {"nome": "Fulgor Divinus Fulgor Divino", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Celestial", "execucao": "Completo", "alcance": "Longo", "alvo": "Local", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Arcano", "descricao": "\"Fulgor divinus! Que a glória dos céus desça sobre este lugar e que todo mal seja consumido!\" O conjurador invoca a alma de um celestial ancestral, que manifesta um julgamento divino contra uma criatura alvo. O celestial realiza um ataque sagrado utilizando a CD do conjurador. Em sucesso, causa 3d10 de dano Sagrado. Contra criaturas do Elemento Negativo e Mortos-Vivos, a CD deste ataque recebe +10. Ao final da conjuração, o conjurador deve pagar uma quantidade de Mana igual ao seu valor de Presença. Caso não possua Mana suficiente, recebe a diferença restante diretamente como dano à Vida."}, {"nome": "Kra'ath Thul Chama do Primeiro Fogo", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Primordial", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Fogo", "descricao": "A sílaba que existia antes do sol — \"Kra'ath\" — é a palavra para o fogo que não precisa de combustível para existir. O conjurador invoca dois pequenos espíritos ancestrais, entidades flamejantes que existiam antes mesmo da criação do Sol, portando um fogo mais antigo e mais quente do que qualquer chama mortal. Os espíritos permanecem ao redor do conjurador e podem ser ativados com uma ação livre para investir contra uma criatura alvo. Cada espírito é considerado uma fonte de ataque distinta. O alvo deve realizar uma salvaguarda de Reflexo para cada espírito. Em falha, sofre 3d8 de dano de Fogo. As chamas ancestrais ignoram qualquer resistência ou imunidade a Fogo de origem não divina; criaturas com imunidade natural ainda sofrem dano normalmente, e apenas proteções concedidas por divindades ou planos superiores funcionam contra este efeito. Em sucesso na salvaguarda, o espírito retorna ao redor do conjurador sem causar dano. Ao causar dano, o espírito é consumido e destruído."}, {"nome": "Munthrek Persvek Sjach Chuva de Cinzas Ardentes", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Dracônico", "execucao": "Completo", "alcance": "Longo", "alvo": "Local", "duracao": "5 rodadas", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "\"Sjach munthrek! Que os céus chorem cinzas e o campo se converta em braseiro!\" O conjurador invoca uma tempestade de cinzas dracônicas sobre uma área de 9 metros de raio, cobrindo o campo com brasas sufocantes e resíduos incandescentes. Criaturas dentro da área sofrem 2d6 de dano de Fogo ao início de cada rodada e têm sua velocidade reduzida à metade devido às cinzas densas que dificultam o movimento. Criaturas afetadas podem realizar uma salvaguarda de Tenacidade para sofrer apenas metade do dano. A visibilidade dentro da área é drasticamente reduzida, impondo penalidade de –5 em ataques à distância realizados de dentro da tempestade ou contra alvos dentro dela."}, {"nome": "Nexus Magicae Nexo da Magia", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Arcano", "execucao": "Reação", "alcance": "Médio", "alvo": "Local", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Nexus arcanum! Que este ponto se torne cruzamento dos planos e amplifique todo poder que por ele fluir!\" O conjurador utiliza sua reação para distorcer o fluxo de uma magia direcionada, redirecionando seus efeitos para outra criatura alvo à sua escolha. A nova criatura deve realizar uma salvaguarda de Reflexo. Em falha, torna-se o novo alvo da magia e sofre normalmente seus efeitos e danos. Este redirecionamento só pode ser utilizado contra magias de nível Maior ou inferior."}, {"nome": "Nórui Mírë Névoa dos Tesouros do Verão", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Élfico", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "\"Que a névoa do eterno verão cubra este lugar, e que os olhos dos inimigos encontrem apenas beleza onde há perigo.\" Uma névoa dourada e prateada, formada por energia élfica, envolve uma área de até 6 metros de raio. Criaturas dentro da névoa sofrem visão reduzida, recebendo –5 em ataques à distância. Além disso, qualquer criatura inimiga que tente se mover dentro da área deve realizar um teste de Vontade contra a CD do conjurador. Em caso de falha, a criatura perde metade do seu movimento, distraída pelas ilusões luminosas da névoa. Para cada criatura que falhar no teste de resistência, o conjurador recupera 1d4 de mana."}, {"nome": "Purifica Animam Purificar a Alma", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Celestial", "execucao": "Padrão", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Arcano", "descricao": "\"Purifica! Que a luz celestial queime toda a impureza deste ser e o restaure à sua forma verdadeira.\" O conjurador invoca a alma de um celestial ancestral, que toca uma criatura aliada alvo com luz sagrada purificadora, removendo imediatamente qualquer condição negativa e maldição que a afete."}, {"nome": "Silmë Miruvórë Luz do Vinho Estelar", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Élfico", "execucao": "Padrão", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "\"Que a luz das estrelas eternas flua por estas mãos e leve cura aonde há sofrimento.\" Uma onda de pura luz élfica emana do toque do conjurador, restaurando 3d6 + 6 pontos de vida ao alvo e removendo um estado negativo à escolha do conjurador (Atordoado, Envenenado, Amedrontado, Paralizado ou Sangramento). Esta magia não afeta mortos-vivos. Além disso, metade da cura realizada, arredondada para baixo (mínimo de 1), é recuperada pelo conjurador na forma de mana."}, {"nome": "Vargach Aryte Thurkear Escudo de Escamas Mágicas", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Dracônico", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Pessoal", "duracao": "5 Rodadas", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "\"Aryte! Que as escamas dos dragões ancestrais se manifestem e protejam minha carne!\" O conjurador cria escamas revestidas por um elemento à sua escolha, exceto Sagrado ou Caótico. Enquanto o efeito estiver ativo, o alvo recebe resistência ao elemento escolhido e +2 de Defesa Base. Este efeito não é cumulativo com outras habilidades semelhantes. Caso o conjurador seja um Draconato, ele também recebe vantagem em ataques mágicos durante a duração da habilidade."}, {"nome": "Vel'morn Vaelthas Maré do Oceano Eterno", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Primordial", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "\"Vel'morn\" — o nome do oceano que existia antes que os continentes surgissem. Uma única sílaba para descrever tudo que sempre foi água. Conjurador realiza um ataque magico. Uma onda de água primordial, retirada dos oceanos antes que tivessem nome, varre a área. Criaturas em um cone de 12 metros sofrem 3d8 de dano de água, ficam jogadas ao chão, para não cair deve realizar uma salvaguarda em Reflexo. Criaturas que caem também ficam ensopadas e com a velocidade reduzida à metade por 2 rodadas. A água primordial apaga chamas mágicas automaticamente e desfaz ilusões elementais."}, {"nome": "Zan'kur Breath Sopro do Vento Antigo", "tipo": "Magias de Grimório", "custo": 6, "prereq": "Idioma Primordial", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Vento", "descricao": "\"Zan'kur\" — o vento que circulou pelo mundo vazio antes que qualquer criatura existisse para sentir sua passagem. O conjurador libera o vento que circulou pelo mundo antes mesmo do surgimento da primeira criatura viva. A rajada ancestral avança com força devastadora, arrastando tudo em seu caminho. Criaturas inimigas na área devem realizar uma salvaguarda de Tenacidade. Em caso de falha, são derrubadas ao chão e empurradas 6 metros para trás pela força do vendaval. Em caso de sucesso, evitam a queda e têm o empurrão reduzido para 3 metros. Aliados escolhidos pelo conjurador são envolvidos por correntes suaves do mesmo vento ancestral, podendo se mover até 9 metros adicionais como parte da execução desta magia, sem provocar reações de oportunidade."}, {"nome": "Abismo Aquático Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Água", "descricao": "O conjurador invoca uma prisão aquática massiva com 12 metros de área, aprisionando criaturas em uma esfera de água comprimida. Criaturas dentro da área devem realizar uma salvaguarda de Tenacidade para escapar. Em falha, sofrem 2d10 de dano de Água ao início de cada turno, ficam incapazes de realizar reações enquanto estiverem presas. Criaturas que não precisam respirar sofrem apenas metade do dano devido à pressão da água. Em sucesso, conseguem escapar da bolha."}, {"nome": "Apocalipse Elétrico Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "Os relâmpagos se tornam mais violentos e incessantes, transformando o campo de batalha em um verdadeiro inferno elétrico. Em uma área de 12 metros, criaturas inimigas sofrem 6d10 de dano de Trovão em caso de falha na salvaguarda de Reflexo, ou metade do dano em caso de sucesso. Em acertos críticos da magia, o alvo fica Paralisado."}, {"nome": "Asas do Vento Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Os ventos se tornam mais intensos e refinados, permitindo que os alvos atravessem o campo de batalha como rajadas impossíveis de alcançar. Os alvos recebem deslocamento de voo de 12 metros e +3 em Defesa contra ataques corpo a corpo. Sempre que desviarem de um ataque, podem se mover até 3 metros gratuitamente."}, {"nome": "Baptismo de Chamas Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "5 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "Encanta a criatura alvo com chamas intensas. Até o final do efeito, seus ataques mágicos são amplificados, recebendo +5 nas rolagens de ataque e causando 3d6 de dano adicional de Fogo. Ataques críticos realizados sob este efeito aplicam a condição Em Chamas ao alvo. Este efeito não é acumulativo com outras magias de amplificação similares."}, {"nome": "Chamado do Trovão Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O relâmpago explode com violência devastadora, espalhando energia elétrica ao redor do impacto. O conjurador realiza um ataque mágico. Em caso de sucesso, o alvo sofre 5d10 de dano de Trovão e fica Atordoado por 1 rodada. Além disso, criaturas adjacentes ao alvo sofrem 2d6 de dano de Trovão."}, {"nome": "Conjuração Dupla das Marés Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "1 criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Se o ataque for bem-sucedido, o alvo sofre 4d8 de dano mágico de Água e recebe a condição Lentidão. Em seguida, escolha uma criatura aliada em alcance curto. Ela recupera uma quantidade de Vida igual ao dano causado pela magia e recebe Vantagem no próximo ataque realizado até o fim do próximo turno. A cura e os efeitos adicionais somente ocorrem caso a magia cause dano ao alvo."}, {"nome": "Corrente Uivante Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Área", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Vento", "descricao": "Os ventos se tornam violentos e imprevisíveis, dificultando ainda mais ataques e concentração mágica. Em uma área de 12 metros de raio, ataques com projéteis sofrem –5 nas jogadas de ataque. Conjuradores dentro da área devem realizar uma salvaguarda de Vontade ou pagar +4 de Mana adicional ao conjurar magias. Além disso, criaturas de tamanho Pequeno ou menor que entrarem na área devem realizar uma salvaguarda de Tenacidade; em caso de falha, são arremessadas 3 metros em uma direção aleatória."}, {"nome": "Correntes do Trovão Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Conjurador", "duracao": "3 rodadas", "categoria": "Invocação", "natureza": "Trovão", "descricao": "As correntes elétricas se tornam mais violentas e instáveis, chicoteando o campo de batalha com descargas incessantes. Enquanto a magia estiver ativa, o conjurador pode realizar até três ataques por turno utilizando Destreza, com alcance de até 12 metros. Em caso de sucesso, cada ataque causa 3d8 de dano de Trovão. Em acertos críticos, o alvo fica Paralisado por 1 rodada e criaturas adjacentes sofrem 1d8 de dano de Trovão devido às descargas elétricas espalhadas pelas correntes. Além disso, o conjurador pode prender até duas criaturas simultaneamente com as correntes. Criaturas presas devem realizar uma salvaguarda de Atletismo contra a CD do conjurador no início de cada turno. Em caso de falha, permanecem Paralisadas e sofrem 3d8 de dano de Trovão por rodada enquanto continuarem envolvidas pelas correntes."}, {"nome": "Cura Pelas Águas Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Água", "descricao": "O conjurador expande o círculo mágico, invocando uma esfera de água sagrada intensamente luminosa. A água envolve o alvo e restaura 3d8 + Intelecto do conjurador em Vida, além de remover um efeito negativo simples à escolha do conjurador. Caso o alvo seja uma criatura do Elemento Negativo ou um Morto-Vivo, o conjurador realiza um ataque mágico. Em caso de acerto, a magia causa o mesmo valor em dano de Água."}, {"nome": "Despertar da Pedra Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador desperta a ira da terra sob uma criatura, fazendo rochas afiadas e fragmentos de pedra emergirem violentamente do solo para esmagar o alvo. O conjurador realiza um ataque mágico contra a criatura. Em caso de sucesso, além de sofrer 4d8 de dano de Terra, o alvo fica sob o efeito de Lentidão até o fim do próximo turno."}, {"nome": "Domínio Trovejante Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "A tempestade elétrica ao redor do conjurador se intensifica, fazendo o ar vibrar violentamente e dificultando qualquer ofensiva direta. Em uma área de 9 metros ao redor do conjurador, criaturas hostis que entrarem na área ou tentarem atacar o conjurador sofrem Desvantagem em seus ataques. Além disso, criaturas que errarem ataques contra o conjurador sofrem 2d6 de dano de Trovão devido às descargas elétricas liberadas pela tempestade."}, {"nome": "Fênix de Fogo Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Fogo", "descricao": "O conjurador invoca 2 fênix flamejantes que sobrevoam o campo de batalha, iluminando uma área de 9 metros cada. As fênix podem se mover livremente em um raio de até 18 metros do conjurador e atacam alvos conforme sua vontade. Cada fênix é considerada uma fonte mágica distinta. Ao atacar, o alvo deve realizar uma salvaguarda de Reflexo. Em falha, sofre 4d8 + Intelecto do conjurador em dano de Fogo e recebe a condição Em Chamas. Criaturas eliminadas por este dano são consumidas pelas chamas das fênix, dando origem a uma nova Fênix para cada alvo abatido."}, {"nome": "Guardião de Pedra Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador anima um golem de rocha e terra, dando forma a um guardião elemental que permanece protegendo uma posição designada. O guardião ocupa um espaço adjacente ao conjurador, possui 50 Pontos de Vida e Defesa 15. Enquanto estiver ativo, ataca automaticamente criaturas hostis adjacentes uma vez por rodada, utilizando a CD do conjurador. Em caso de falha na resistência, a criatura sofre 3d6 de dano de Terra. O guardião permanece até ser destruído, até o conjurador dissipá-lo."}, {"nome": "Ilusão Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Adicionalmente ao efeito base já existem, conjurador pode manter até duas miragens simultaneamente, cada uma com sons e efeitos visuais independentes. Além disso, a CD para identificar ou resistir às ilusões criadas por esta magia aumenta em +2."}, {"nome": "Maré Reversa Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Água", "descricao": "Ao utilizar a reação, o conjurador protege uma criatura alvo quando ela é atingida por um ataque mágico dos elementos Fogo ou Terra, invertendo parte da energia recebida em uma onda de água protetora. Reduz o dano recebido em 3d8 e concede Resistência 10 a Fogo e Terra até o início do próximo turno.  Devolve 1d8 de dano de Água ao atacante."}, {"nome": "Monólito Vivo Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Terra", "descricao": "O conjurador ergue do solo um imenso monólito de pedra viva, atravessado por veios de energia elemental pulsante. A presença da estrutura fortalece aqueles que lutam ao seu redor, envolvendo aliados em uma aura de proteção mineral. Até o final do efeito, todos os aliados em um raio de 12 metros do monólito recebem +3 em Defesas Básicas e Resistência a dano de Terra. O monólito permanece ativo até ser destruído, até que a conjuração seja interrompida ou até o término da duração da magia."}, {"nome": "Pétalas de Chamas Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "O conjurador cria uma aura de pétalas flamejantes que giram constantemente ao seu redor. Ataques corpo a corpo realizados pelo conjurador recebem +5 nas rolagens de ataque e +2 em Defesa Base. O conjurador recebe resistência ao elemento Fogo, sofrendo apenas metade do dano desse elemento. Ao sofrer dano letal que reduza sua Vida a 0, ficando com 1 de vida, o conjurador deixa para trás uma cópia ilusória formada por pétalas em chamas, que se dissipa violentamente em uma explosão de fogo em um raio de 6 metros, causando 3d8 de dano de Fogo. Habilidade não acumulativa."}, {"nome": "Proteção dos Relâmpagos Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "A energia elétrica ao redor do alvo se intensifica, descarregando correntes violentas a cada impacto recebido. Sempre que um dos alvos for atingido por um ataque corpo a corpo, o atacante sofre 2d8 de dano de Trovão e fica Atordoado até o fim do turno."}, {"nome": "Raio Solar Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador manifesta dois círculos arcanos do elemento Fogo e dispara um raio solar denso e destrutivo. O conjurador realiza um ataque mágico contra o alvo. Esta magia possui Penetração Mágica. Em acerto, causa 3d8 de dano de Fogo.Cada raio é considerada uma fonte mágica distinta."}, {"nome": "Teleporte Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Reação", "alcance": "Médio", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador distorce o tecido da realidade, permitindo atravessar grandes distâncias em um instante. O conjurador pode se teleportar para um local desocupado em até 18 metros ou levar junto uma criatura voluntária adjacente. Após o teleporte, recebe +2 em Defesa até o início do próximo turno devido às distorções espaciais residuais."}, {"nome": "Terremoto Controlado Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Área", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "O conjurador faz o solo estremecer violentamente, abrindo rachaduras e erguendo pilares de pedra sob os pés dos inimigos. Criaturas na área devem realizar uma salvaguarda de Reflexo. Em caso de falha, sofrem 3d8 de dano Terra e uma rachadura de até 6 metros se abre sob elas, fazendo-as cair em seu interior. Enquanto permanecerem dentro da rachadura, ficam com a condição de Vulnerável. Para sair, devem realizar um teste de Atletismo; em caso de falha, perdem metade do movimento e a ação padrão no turno."}, {"nome": "Titan de Pedra Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador ergue um massivo golem de pedra, formado por rochas compactadas e energia elemental da Terra. O golem obedece às ordens do conjurador e age em seu turno. Possui 20 de Defesa, causa 3d6 de dano físico de Impacto em seus ataques e tem Vida igual a 5 vezes o Intelecto do conjurador. Além de seus ataques físicos, o golem possui 2 ações de magia por cena de combate, capazes de provocar abalos sísmicos em uma área de 6 metros. Criaturas atingidas devem realizar uma salvaguarda de Atletismo. Em caso de falha, sofrem 4d6 de dano Terra e ficam Atordoadas por 1 rodada. Em caso de sucesso, recebem apenas metade do dano. Caso o conjurador fique inconsciente, o golem se desfaz imediatamente. Conjurar esta habilidade novamente enquanto o golem ainda existir restaura completamente sua Vida e reinicia a duração da magia."}, {"nome": "Tsunami Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador invoca uma onda devastadora que avança com força esmagadora, arrastando tudo em seu caminho e destruindo estruturas frágeis. A onda percorre uma linha de 24 metros de comprimento por 9 metros de largura. Criaturas na área devem superar uma salvaguarda de Tenacidade. Em falha, sofrem 6d8 de dano de Água, são arremessadas 12 metros para trás. Em sucesso, sofrem apenas metade do dano. O terreno afetado se transforma em um lamaçal difícil de atravessar. Criaturas aquáticas sofrem apenas metade do dano e ignoram o terreno difícil."}, {"nome": "Vácuo Silencioso Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Vento", "descricao": "O vazio se intensifica, esmagando pulmões e anulando qualquer tentativa de resistência. Em uma área de 9 metros, criaturas ficam automaticamente Paralisadas enquanto permanecerem dentro da área. Além disso, sofrem –2 em todos os testes baseados em Presença devido à pressão sufocante e à ausência total de som."}, {"nome": "Vôo Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Movimento", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Vento", "descricao": "As asas se tornam mais densas e poderosas, permitindo movimentos impossíveis durante o combate. O conjurador recebe deslocamento de voo de 18 metros e, uma vez por turno, pode utilizar as asas para ganhar uma reação adicional."}, {"nome": "Vulcão Maior", "tipo": "Magias Antigas", "custo": 8, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador abre uma enorme fissura vulcânica no solo, lançando violentos jatos de magma contra tudo ao redor. Criaturas em um raio de 9 metros devem realizar uma salvaguarda de Reflexo com CD +2. Em falha, sofrem 4d8 de dano de Fogo. Em sucesso, sofrem apenas metade do dano. O terreno atingido torna-se terreno difícil coberto por magma e rochas incandescentes. Criaturas que atravessarem a área ou iniciarem o turno dentro dela sofrem 2d8 de dano de Fogo."}, {"nome": "Chamas Negras", "tipo": "Magia Proibida", "custo": 10, "prereq": "Nível Avançado em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador escolhe um ponto em alcance médio e desencadeia uma erupção de fogo caótico que devora matéria, energia e magia em uma área de 9 metros de raio. Todas as criaturas na área devem realizar uma salvaguarda de Reflexos; em sucesso, movem-se imediatamente para a área adjacente mais próxima fora do alcance da magia. Em falha, sofrem 8d10 de dano de Fogo Caótico, recebem a condição Chamas Negras e têm todos os efeitos mágicos sustentados sobre si imediatamente dissipados. Criaturas afetadas pelas Chamas Negras sofrem 2d10 de dano adicional no início de cada turno, não podem recuperar Vida por meios naturais ou mágicos inferiores a magias Sagradas, e qualquer tentativa de conjuração exige uma salvaguarda de Foco; em falha, a magia é consumida sem produzir efeito, perdendo-se o custo de Mana normalmente. As chamas não podem ser apagadas por meios mundanos, água comum ou resistência elemental, consumindo continuamente até mesmo encantamentos, barreiras mágicas e invocações presentes na área. Apenas magias Sagradas ou superiores."}, {"nome": "Colapso Temporal", "tipo": "Magia Proibida", "custo": 10, "prereq": "Nível Avançado em conjuração", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Negativo", "descricao": "O conjurador força uma região a experimentar passado, presente e futuro simultaneamente, criando um caos temporal devastador. Área de 12 metros. Criaturas dentro existem em múltiplos pontos temporais: recebem –5 em todas as ações, não podem usar reações e no início de cada turno devem superar Vontade ou agir aleatoriamente (rolagem do mestre)."}, {"nome": "Flagelo da Terra", "tipo": "Magia Proibida", "custo": 10, "prereq": "Nível Avançado em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador desperta a ira mais profunda da terra, fazendo o solo ruir em um terremoto incessante capaz de destruir muralhas, partir fortalezas e engolir estruturas inteiras. A região se fragmenta em enormes fissuras enquanto ondas sísmicas devastam tudo ao redor. Estruturas dentro da área sofrem dano massivo, ficando severamente comprometidas ou completamente destruídas, a critério do mestre. Criaturas na área devem realizar uma salvaguarda de Atletismo ao início de cada rodada. Em caso de falha, caem em fissuras abertas pelo terremoto, sofrendo 10d10 de dano Terra e ficando Caídas. Em caso de sucesso, conseguem se manter de pé e recebem apenas metade do dano. Enquanto a magia permanecer ativa, toda a área é considerada terreno difícil. Após o fim da magia, o local permanece devastado e instável, mantendo a condição de terreno difícil por 1 semana."}, {"nome": "Negação da Magia", "tipo": "Magia Proibida", "custo": 10, "prereq": "Nível Avançado em conjuração", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "5 Rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador cria uma zona onde a magia simplesmente não funciona — nenhuma magia pode ser lançada, mantida ou ativada dentro da área. Área de 30 metros de raio. Nenhuma magia pode ser conjurada dentro. Efeitos mágicos ativos são suspendidos. Itens mágicos ficam não-funcionais. O próprio conjurador fica imune a magia dentro da área. A zona colapsa se o conjurador sofrer dano."}, {"nome": "Reescrever o Destino", "tipo": "Magia Proibida", "custo": 10, "prereq": "Nível Avançado em conjuração", "execucao": "Completa", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Negativo", "descricao": "O conjurador rompe os fios do próprio destino e reescreve sua trajetória de poder, alterando escolhas, habilidades e caminhos que já haviam sido definidos. A realidade se reorganiza ao redor da nova versão de sua existência, como se sua evolução sempre tivesse sido diferente. Ao conjurar esta magia, o jogador pode redistribuir até 1000 pontos já gastos em sua progressão, podendo reorganizá-los livremente em até 1500 pontos de evolução diferentes, respeitando apenas limitações definidas pelo mestre. Após a conjuração, a magia é imediatamente esquecida e apagada da existência do conjurador. Reescrever o Destino jamais pode ser aprendida novamente pelo mesmo personagem, mesmo através de meios mágicos, divinos ou artificiais."}, {"nome": "Abismo Aquático Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Água", "descricao": "O conjurador manifesta uma colossal esfera abissal com 18 metros de área, comprimindo violentamente todas as criaturas em seu interior. Criaturas aprisionadas devem realizar uma salvaguarda de Tenacidade para escapar. Em falha, sofrem 4d10 de dano de Água ao início de cada turno, ficam Silenciadas. Criaturas que não precisam respirar sofrem apenas metade do dano devido à pressão extrema da água. Em sucesso, conseguem escapar da bolha."}, {"nome": "Apocalipse Elétrico Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador desperta uma calamidade celestial, fazendo incontáveis relâmpagos rasgarem os céus e devastarem toda a região. Em uma área de 15 metros, criaturas inimigas sofrem 8d10 de dano de Trovão em caso de falha na salvaguarda de Reflexo, Em caso de sucesso, recebem apenas metade do dano e evitam as condições. Criaturas utilizando armaduras metálicas ou carregando grande quantidade de metal sofrem +2d10 de dano adicional de Trovão."}, {"nome": "Asas do Vento Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Defensiva", "natureza": "Vento", "descricao": "O conjurador invoca ventos ancestrais capazes de transformar aliados em vultos inalcançáveis nos céus da batalha. Os alvos recebem deslocamento de voo de 18 metros e +4 em Defesa contra ataques corpo a corpo. Sempre que desviarem de um ataque, podem se mover até 6 metros gratuitamente, sem provocar reações. Além disso, o atacante sofre 1d6 de dano de Vento causado pelas lâminas de ar deixadas pelo deslocamento dos alvos."}, {"nome": "Baptismo de Chamas Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "5 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "Encanta a criatura alvo com chamas arcanas intensas. Até o final do efeito, seus ataques mágicos e físicos são amplificados, recebendo +10 nas rolagens de ataque e causando 4d6 de dano adicional de Fogo. Ataques físicos realizados sob este efeito passam a ser considerados mágicos. Ataques críticos realizados sob este efeito aplicam a condição Em Chamas ao alvo. Este efeito não é acumulativo com outras magias de amplificação similares."}, {"nome": "Chamado do Trovão Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador invoca uma descarga celestial colossal, capaz de despedaçar o solo e paralisar qualquer criatura atingida. O conjurador realiza um ataque mágico. Em caso de sucesso, o alvo sofre 7d10 de dano de Trovão e fica Paralisado por 2 rodadas. Além disso, criaturas em um raio de 3 metros sofrem 3d8 de dano de Trovão e ficam Atordoadas por 1 rodada."}, {"nome": "Conjuração Dupla das Marés Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "1 criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Se o ataque for bem-sucedido, o alvo sofre 6d8 de dano mágico de Água e recebe a condição Lentidão. Caso o ataque resulte em um acerto crítico, o alvo também sofre Congelamento por 3 rodadas. Em seguida, escolha uma criatura aliada em alcance curto. Ela recupera uma quantidade de Vida igual ao dano causado pela magia, recebe Vantagem no próximo ataque realizado até o fim do próximo turno e aumenta sua Margem de Crítico em +1 pelo mesmo período. A cura e os efeitos adicionais somente ocorrem caso a magia cause dano ao alvo."}, {"nome": "Corrente Uivante Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Área", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Vento", "descricao": "O conjurador libera uma tempestade de ventos ancestrais capazes de distorcer trajetórias e romper o fluxo mágico ao redor. Em uma área de 15 metros de raio, ataques com projéteis sofrem –7 nas jogadas de ataque e falham automaticamente caso o atacante obtenha resultado 1 em 1d4, devido aos desvios causados pelos ventos violentos. Conjuradores dentro da área devem realizar uma salvaguarda de Vontade ou pagar +6 de Mana adicional ao conjurar magias. Além disso, criaturas Médias ou menores que entrarem ou iniciarem o turno na área devem realizar uma salvaguarda de Tenacidade; em caso de falha, são arremessadas 6 metros e ficam Atordoadas por 1 rodada."}, {"nome": "Correntes do Trovão Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Conjurador", "duracao": "4 rodadas", "categoria": "Invocação", "natureza": "Trovão", "descricao": "O conjurador invoca correntes colossais feitas de puro relâmpago condensado, capazes de atravessar o campo de batalha como serpentes elétricas vivas. Enquanto a magia estiver ativa, o conjurador pode realizar até quatro ataques por turno utilizando Destreza, com alcance de até 18 metros. Em caso de sucesso, cada ataque causa 5d8 de dano de Trovão. Em acertos críticos, o alvo fica Paralisado por 2 rodadas e criaturas em um raio de 3 metros sofrem 2d8 de dano de Trovão e ficam Atordoadas por 1 rodada. Além disso, o conjurador pode prender até quatro criaturas simultaneamente com as correntes. Criaturas presas devem realizar uma salvaguarda de Atletismo contra a CD do conjurador no início de cada turno. Em caso de falha, permanecem Paralisadas, sofrem 5d8 de dano de Trovão por rodada e recebem –2 em Defesa enquanto estiverem envolvidas pelas correntes elétricas."}, {"nome": "Cura Pelas Águas Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Água", "descricao": "O conjurador manifesta um grande círculo arcano que convoca águas primordiais de pura criação, criando uma chuva sagrada em um raio de 9 metros. Criaturas aliadas dentro da área restauram 4d8 + Intelecto do conjurador em Vida e têm todos os efeitos negativos removidos. Criaturas do Elemento Negativo e Mortos-Vivos dentro da área sofrem dano de Água equivalente ao valor da cura. Essas criaturas devem realizar uma salvaguarda de Tenacidade para sofrer apenas metade do dano."}, {"nome": "Despertar da Pedra Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador desperta a ira da terra sob uma criatura, fazendo rochas afiadas e fragmentos de pedra emergirem violentamente do solo para esmagar o alvo. O conjurador realiza um ataque mágico contra a criatura. Em caso de sucesso, o alvo sofre 6d8 de dano de Terra e fica sob o efeito de Lentidão até o fim da cena."}, {"nome": "Domínio Trovejante Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "O conjurador se torna o centro de uma tempestade viva, cercado por relâmpagos incessantes e explosões elétricas violentas. Em uma área de 12 metros ao redor do conjurador, criaturas hostis que entrarem na área ou realizarem ataques contra ele sofrem Desvantagem em seus ataques. Além disso, sempre que uma criatura errar um ataque contra o conjurador, sofre 4d6 de dano de Trovão e deve realizar uma salvaguarda de Tenacidade. Em caso de falha, fica Atordoada até o fim do próximo turno."}, {"nome": "Fênix de Fogo Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Fogo", "descricao": "O conjurador invoca 3 majestosas fênix envoltas em fogo dourado, que sobrevoam o campo iluminando uma área de 9 metros cada. As fênix podem se mover livremente em um raio de até 30 metros do conjurador e atacam alvos conforme sua vontade. Cada fênix é considerada uma fonte mágica distinta. Ao atacar, os alvos devem realizar uma salvaguarda de Reflexo com CD +5. Em falha, sofrem 6d8 + Intelecto do conjurador em dano de Fogo e recebem a condição Em Chamas. Criaturas eliminadas por este dano são completamente consumidas pelas chamas solares das fênix, originando uma nova Fênix para cada alvo abatido."}, {"nome": "Guardião de Pedra Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador anima um golem de rocha e terra, dando forma a um guardião elemental que permanece protegendo uma posição designada. O guardião ocupa um espaço adjacente ao conjurador, possui 100 Pontos de Vida e Defesa 18. Enquanto estiver ativo, ataca automaticamente criaturas hostis adjacentes uma vez por rodada, utilizando a CD do conjurador. Em caso de falha na resistência, a criatura sofre 4d6 de dano de Terra. O guardião permanece até ser destruído, até o conjurador dissipá-lo."}, {"nome": "Ilusão Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Adicionalmente ao efeito base já existem, pode manter até três miragens simultaneamente. Além disso, a CD para identificar ou resistir às ilusões criadas por esta magia aumenta em +5."}, {"nome": "Maré Reversa Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Água", "descricao": "Ao utilizar a reação, o conjurador protege uma criatura alvo quando ela é atingida por um ataque mágico dos elementos Fogo ou Terra, invertendo parte da energia recebida em uma onda de água protetora. Reduz o dano recebido em 5d8 e concede Resistência 15 a Fogo e Terra até o início do próximo turno. Devolve 2d8 de dano de Água ao atacante e nega a condição Em Chamas se aplicável."}, {"nome": "Monólito Vivo Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Terra", "descricao": "O conjurador ergue do solo um imenso monólito de pedra viva, atravessado por veios de energia elemental pulsante. A presença da estrutura fortalece aqueles que lutam ao seu redor, envolvendo aliados em uma aura de proteção mineral. Até o final do efeito, todos os aliados em um raio de 18 metros do monólito recebem +4 em Defesas Básicas e Resistência a dano de Terra. O monólito permanece ativo até ser destruído, até que a conjuração seja interrompida ou até o término da duração da magia."}, {"nome": "Pétalas de Chamas Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "5 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "O conjurador é envolvido por uma tempestade de pétalas incendiárias que queimam continuamente ao seu redor. Ataques corpo a corpo realizados pelo conjurador recebem +10 nas rolagens de ataque, e +2 em Defesa Base. Ataques críticos aplicam a condição Em Chamas. O conjurador recebe resistência ao elemento Fogo, sofrendo apenas metade do dano desse elemento. Sempre que o conjurador sofrer dano, uma explosão de pétalas flamejantes é liberada em um raio de 6 metros ao seu redor, causando 4d8 de dano de Fogo em criaturas próximas. Caso o dano recebido seja letal e reduza sua Vida a 0, ficando com 1 de vida, a explosão ocorre imediatamente com intensidade máxima. Habilidade não acumulativa."}, {"nome": "Proteção dos Relâmpagos Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "O alvo se torna uma verdadeira tempestade viva, cercado por relâmpagos que explodem ao menor contato. Sempre que um dos alvos for atingido por um ataque corpo a corpo, o atacante sofre 3d8 de dano de Trovão, fica Atordoado por 1 rodada e deve realizar uma salvaguarda de Tenacidade. Em caso de falha, solta imediatamente a arma ou objeto que estiver segurando."}, {"nome": "Raio Solar Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador manifesta três círculos arcanos do elemento Fogo, concentrando um feixe solar extremamente denso e devastador. O conjurador realiza um ataque mágico contra o alvo. Esta magia possui Penetração Mágica e os alvos não podem realizar reações contra esta magia. Em acerto, causa 5d8 de dano de Fogo e aplica a condição Em Chamas. Cada raio é considerada uma fonte mágica distinta."}, {"nome": "Teleporte Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Reação", "alcance": "Longo", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador rompe completamente as barreiras do espaço, desaparecendo como um fragmento de realidade rasgado do mundo. O conjurador pode se teleportar para qualquer ponto visível em até 32 metros, podendo levar até 4 criaturas voluntárias adjacentes. Após o teleporte, cria uma distorção espacial no ponto de origem; criaturas adjacentes ao local devem realizar uma salvaguarda de Reflexo ou ficam Desorientadas."}, {"nome": "Terremoto Controlado Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Área", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "O conjurador faz o solo estremecer violentamente, abrindo rachaduras e erguendo pilares de pedra sob os pés dos inimigos. Criaturas na área devem realizar uma salvaguarda de Reflexo. Em caso de falha, sofrem 4d8 de dano Terra e uma rachadura de até 9 metros se abre sob elas, fazendo-as cair em seu interior. Enquanto permanecerem dentro da rachadura, ficam com a condição de Vulnerável. Para sair, devem realizar um teste de Atletismo com aumento da CD em +2; em caso de falha, perdem metade do movimento e a ação padrão no turno."}, {"nome": "Titan de Pedra Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador invoca um colosso ancestral de pedra, uma manifestação gigantesca da fúria elemental da Terra. O golem obedece plenamente às ordens do conjurador e age em seu turno, imediatamente após sua conjuração. Possui 25 de Defesa, causa 5d6 de dano físico de Impacto em seus ataques e tem Vida igual a 10 vezes o Intelecto do conjurador. O colosso possui 3 ações de magia por cena de combate, capazes de desencadear terremotos e explosões rochosas em uma área de 9 metros. Criaturas atingidas devem realizar uma salvaguarda de Atletismo. Em caso de falha, sofrem 6d6 de dano Terra, ficam Atordoadas por 1 rodada e Caídas ao chão. Em caso de sucesso, recebem apenas metade do dano e evitam as condições. Sempre que uma criatura falhar na salvaguarda contra uma das magias do colosso, o terreno ao redor se torna difícil até o início do próximo turno do conjurador. Caso o conjurador fique inconsciente, o colosso se desfaz imediatamente. Conjurar esta habilidade novamente enquanto o colosso ainda existir restaura completamente sua Vida e reinicia a duração da magia."}, {"nome": "Tsunami Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador libera uma maré catastrófica capaz de devastar o campo de batalha, arrastando criaturas e destruindo estruturas frágeis em seu caminho. A onda avança em uma linha de 30 metros de comprimento por 12 metros de largura. Criaturas na área devem superar uma salvaguarda de Tenacidade. Em falha, sofrem 8d8 de dano de Água, são arremessadas 15 metros para trás, ficam Paralisadas por 1 rodada. Em sucesso, sofrem apenas metade do dano. O local atingido se torna um terreno difícil coberto por lamaçal. Criaturas aquáticas sofrem apenas metade do dano e ignoram os efeitos do terreno difícil."}, {"nome": "Vácuo Silencioso Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Vento", "descricao": "O conjurador cria uma região de absoluto vazio atmosférico, onde até mesmo a consciência começa a falhar. Em uma área de 12 metros, criaturas ficam Paralisadas enquanto permanecerem dentro da área. Além disso, criaturas que falharem em uma salvaguarda de Tenacidade por 2 rodadas consecutivas caem Inconscientes por 1d4 rodadas."}, {"nome": "Vôo Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Movimento", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Vento", "descricao": "O conjurador assume a forma de um verdadeiro soberano dos céus, envolto por ventos ancestrais. Seu deslocamento de voo aumenta para 32 metros e ele desenvolve afinidade com o elemento Vento, recebendo apenas metade do dano causado por esse elemento. Além disso, uma vez por turno, pode utilizar as asas para receber uma reação adicional."}, {"nome": "Vulcão Avançado", "tipo": "Magias Antigas", "custo": 10, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador rompe o solo com uma colossal fissura vulcânica, liberando explosões contínuas de magma e calor extremo. Criaturas em um raio de 12 metros devem realizar uma salvaguarda de Reflexo com CD +5. Em falha, sofrem 6d8 de dano de Fogo. Em sucesso, sofrem apenas metade do dano. O terreno atingido torna-se terreno difícil coberto por magma fervente e rochas derretidas. Criaturas que atravessarem a área ou iniciarem o turno dentro dela sofrem 2d8 de dano de Fogo."}, {"nome": "Bandeira da Entidade", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Equipamento do Patrono", "execucao": "Padrão", "alcance": "Curto", "alvo": "Pessoal", "duracao": "Instantânea", "categoria": "", "natureza": "Caótico", "descricao": "Conjura a manifestação máxima do patrono. Enquanto ativa, remove as penalidades do Equipamento do Patrono e fortalece seus efeitos. Melhorias Espelho Dourado: CD aumenta para +4. Dama dos Desejos: dano adicional aumenta para +2d6. Mestre do Banquete: Defesa aumenta para +4. Ruivo: bônus de ataque aumenta para +4. Colecionador: bônus dobra. Sonolento: recebe +3 metros de deslocamento. Mil Olhos: redução aumenta para –4 Mana."}, {"nome": "Expansão de Domínio", "tipo": "Magias de Pacto", "custo": 10, "prereq": "Visitar ao Domínio", "execucao": "Completa", "alcance": "Curto", "alvo": "Área", "duracao": "1 rodad

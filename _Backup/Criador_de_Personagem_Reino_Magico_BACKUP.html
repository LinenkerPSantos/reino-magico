<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔ Reino Mágico — Criador de Personagem</title>
<style>
:root{--bg:#0f0c0a;--bg2:#1a1510;--bg3:#241d14;--border:#4a3820;--gold:#c9a227;--gold-dim:#8a6d1a;--text:#e8d9b8;--text-dim:#9a8870;--card-bg:#1e1710;--card-border:#3a2e1e;--sel:#2a2008;--green:#4a9a5a;--red:#c44;--blue:#4a7fc4;--purple:#8a4ac4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:Georgia,'Times New Roman',serif;min-height:100vh;background-image:radial-gradient(ellipse at center,#1a130a 0%,#080503 100%);}
#app{max-width:1100px;margin:0 auto;padding:16px;}
header{text-align:center;padding:16px 0 8px;font-size:1.6em;letter-spacing:3px;color:var(--gold);text-shadow:0 0 20px rgba(201,162,39,.4);border-bottom:2px solid var(--border);margin-bottom:16px;}
.steps-bar{display:flex;justify-content:center;gap:6px;margin-bottom:18px;flex-wrap:wrap;}
.sp{padding:5px 12px;border-radius:16px;border:1px solid var(--border);font-size:.75em;color:var(--text-dim);background:var(--bg2);}
.sp.active{border-color:var(--gold);color:var(--gold);background:var(--sel);}
.sp.done{border-color:var(--green);color:var(--green);}
h2{font-size:1.2em;color:var(--gold);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:14px;letter-spacing:1px;}
h3{font-size:.95em;color:var(--gold);margin-bottom:6px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px;}
.card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:12px;cursor:pointer;transition:all .2s;}
.card:hover{border-color:var(--gold-dim);background:#221c12;}
.card.selected{border-color:var(--gold);background:var(--sel);box-shadow:0 0 12px rgba(201,162,39,.2);}
.card-title{font-size:.95em;font-weight:bold;color:var(--gold);margin-bottom:4px;}
.card-sub{font-size:.75em;color:var(--text-dim);margin-bottom:6px;}
.card-body{font-size:.78em;color:var(--text);line-height:1.4;}
.card-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px;}
.tag{font-size:.68em;padding:2px 6px;border-radius:8px;background:var(--bg3);border:1px solid var(--border);color:var(--text-dim);}
.nav-buttons{display:flex;justify-content:space-between;margin-top:20px;padding-top:14px;border-top:1px solid var(--border);}
.btn{padding:9px 20px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-family:inherit;font-size:.88em;transition:all .2s;}
.btn:hover{border-color:var(--gold);color:var(--gold);}
.btn.primary{background:var(--gold-dim);border-color:var(--gold);color:#1a1000;font-weight:bold;}
.btn.primary:hover{background:var(--gold);}
.btn:disabled{opacity:.4;cursor:default;}
.attrs-wrap{display:flex;gap:12px;flex-wrap:wrap;margin:14px 0;justify-content:center;}
.attr-box{background:var(--card-bg);border:1px solid var(--card-border);border-radius:8px;padding:12px 16px;text-align:center;min-width:100px;}
.attr-box.key-attr{border-color:var(--gold);}
.attr-name{font-size:.78em;color:var(--text-dim);margin-bottom:2px;}
.attr-abbr{font-size:.68em;color:var(--gold-dim);}
.attr-ctrl{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:6px;}
.attr-btn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--bg2);color:var(--text);cursor:pointer;font-size:1em;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.attr-btn:hover{border-color:var(--gold);color:var(--gold);}
.attr-val{font-size:1.5em;color:var(--gold);min-width:28px;}
.pts-box{text-align:center;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;font-size:.88em;}
.pts-box b{color:var(--gold);font-size:1.2em;}
.stats-mini{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
.stat-chip{padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:.8em;}
.stat-chip span{color:var(--gold);font-weight:bold;}
.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;align-items:center;}
.fl{font-size:.75em;color:var(--text-dim);white-space:nowrap;}
.fbtn{padding:3px 9px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);cursor:pointer;font-size:.72em;transition:all .2s;}
.fbtn:hover{border-color:var(--gold-dim);}
.fbtn.on{border-color:var(--gold);color:var(--gold);background:var(--sel);}
.search{padding:5px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:inherit;font-size:.82em;width:180px;}
.search:focus{outline:none;border-color:var(--gold);}
.counter{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.cnt-badge{padding:4px 10px;border-radius:10px;border:1px solid var(--border);font-size:.8em;color:var(--text-dim);}
.cnt-badge.full{border-color:var(--gold);color:var(--gold);}
.cnt-badge.extra{border-color:var(--purple);color:var(--purple);}
.spells-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;max-height:480px;overflow-y:auto;padding:4px;}
.sc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:7px;padding:10px;cursor:pointer;transition:all .2s;}
.sc:hover{border-color:var(--gold-dim);background:#221c12;}
.sc.selected{border-color:var(--gold);background:var(--sel);}
.sc.extra-selected{border-color:var(--purple);background:#1a1025;}
.sc-name{font-weight:bold;color:var(--gold);font-size:.9em;margin-bottom:4px;}
.sc-meta{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px;}
.sc-desc{font-size:.72em;color:var(--text);line-height:1.35;max-height:70px;overflow:hidden;position:relative;}
.sc-desc::after{content:'';position:absolute;bottom:0;left:0;right:0;height:18px;background:linear-gradient(transparent,var(--card-bg));}
.sc.selected .sc-desc::after{background:linear-gradient(transparent,var(--sel));}
.sc.extra-selected .sc-desc::after{background:linear-gradient(transparent,#1a1025);}
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:14px;}
.skill-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:4px;background:var(--card-bg);border:1px solid var(--card-border);font-size:.82em;}
.skill-name{flex:1;}
.skill-lv{display:flex;gap:3px;}
.lbtn{padding:2px 5px;border-radius:3px;border:1px solid var(--border);background:var(--bg3);color:var(--text-dim);cursor:pointer;font-size:.68em;transition:all .2s;}
.lbtn:hover{border-color:var(--gold-dim);}
.lbtn.on{border-color:var(--gold);color:var(--gold);background:var(--sel);}
.lbtn.cls{border-color:var(--green);color:var(--green);}
.skill-sv{width:28px;text-align:right;font-size:.82em;color:var(--gold);}
.fg{margin-bottom:12px;}
.fl2{display:block;font-size:.82em;color:var(--text-dim);margin-bottom:4px;}
.finput{width:100%;padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:inherit;font-size:.88em;}
.finput:focus{outline:none;border-color:var(--gold);}
textarea.finput{min-height:70px;resize:vertical;}
select.finput option{background:var(--bg2);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:8px;max-height:480px;overflow-y:auto;padding:4px;}
.tc{background:var(--card-bg);border:1px solid var(--card-border);border-radius:7px;padding:10px;cursor:pointer;transition:all .2s;}
.tc:hover{border-color:var(--gold-dim);background:#221c12;}
.tc.selected{border-color:var(--gold);background:var(--sel);}
.tc-name{font-weight:bold;color:var(--gold);font-size:.88em;margin-bottom:4px;}
.tc-desc{font-size:.75em;color:var(--text);line-height:1.35;}
.tc-bonus{font-size:.72em;color:#7ad07a;margin-top:3px;font-style:italic;}
.sheet{background:var(--bg2);border:2px solid var(--border);border-radius:10px;padding:20px;}
.sheet-head{text-align:center;margin-bottom:16px;padding-bottom:14px;border-bottom:2px solid var(--border);}
.sh-name{font-size:1.6em;color:var(--gold);}
.sh-sub{color:var(--text-dim);font-size:.9em;margin-top:3px;}
.sh-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.sh-sec{margin-bottom:12px;border:1px solid var(--border);border-radius:5px;overflow:hidden;}
.sh-stitle{background:var(--bg3);padding:5px 10px;font-size:.8em;color:var(--gold);border-bottom:1px solid var(--border);letter-spacing:1px;}
.sh-sbody{padding:8px 10px;}
.ab{margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--bg3);}
.ab:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.ab-name{font-size:.88em;color:var(--gold);font-weight:bold;}
.ab-desc{font-size:.76em;color:var(--text);line-height:1.4;margin-top:2px;}
.sh-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--bg3);font-size:.82em;}
.sh-row:last-child{border-bottom:none;}
.sh-lbl{color:var(--text-dim);}
.sh-val{color:var(--gold);font-weight:bold;}
.sh-bonus{font-size:.72em;color:#7ad07a;margin-left:4px;}
.spell-pill{display:inline-block;margin:2px;padding:3px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;font-size:.75em;color:var(--text);}
.print-btn{position:fixed;bottom:16px;right:16px;padding:10px 20px;background:var(--gold-dim);border:1px solid var(--gold);border-radius:7px;color:#1a1000;cursor:pointer;font-weight:bold;font-size:.88em;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,.6);}
.print-btn:hover{background:var(--gold);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim);}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.info-box{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:12px;margin-bottom:12px;font-size:.82em;line-height:1.6;}
.info-box b{color:var(--gold);}
.err{color:var(--red);font-size:.82em;margin-top:6px;}
/* Racial trait picker */
.trait-picker{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:10px;}
.trait-picker h3{margin-bottom:8px;}
.race-group{margin-bottom:10px;}
.race-group-title{font-size:.82em;color:var(--gold-dim);margin-bottom:4px;padding:4px 8px;background:var(--bg2);border-radius:4px;}
.trait-opt{display:flex;align-items:flex-start;gap:8px;padding:5px 8px;border-radius:5px;border:1px solid var(--card-border);background:var(--card-bg);margin-bottom:4px;cursor:pointer;transition:all .2s;font-size:.8em;}
.trait-opt:hover{border-color:var(--gold-dim);}
.trait-opt.selected{border-color:var(--gold);background:var(--sel);}
.trait-opt.disabled{opacity:.4;cursor:default;}
.trait-opt-name{font-weight:bold;color:var(--gold);white-space:nowrap;}
.trait-opt-desc{color:var(--text);line-height:1.3;font-size:.95em;}
.bonus-tag{font-size:.7em;padding:1px 5px;border-radius:6px;border:1px solid var(--green);color:var(--green);white-space:nowrap;}
@media print{body{background:white!important;color:black!important;}.nav-buttons,.steps-bar,.print-btn{display:none!important;}}
</style>
</head>
<body>
<div id="app">
  <header>⚔ REINO MÁGICO — Criador de Personagem ⚔</header>
  <div class="steps-bar" id="stepsBar"></div>
  <div id="content"></div>
  <div class="nav-buttons">
    <button class="btn" id="btnPrev" onclick="go(-1)">← Anterior</button>
    <button class="btn primary" id="btnNext" onclick="go(1)">Próximo →</button>
  </div>
</div>
<script>
// ═══════════════════════════════════════════════════════
//  GAME DATA
// ═══════════════════════════════════════════════════════
const SPELLS  = [{"nome": "Chamas Escarlate", "tipo": "Truque", "custo": 0, "prereq": "Armas Corpo a Corpo", "execucao": "Reação", "alcance": "Toque", "alvo": "Objeto", "duracao": "Instantânea", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "O conjurador envolve a arma em chamas mágicas no instante do ataque. Até o final da ação, os ataques realizados com a arma são considerados mágicos e causam 2d6 de dano adicional de Fogo em acertos bem-sucedidos. A habilidade pode ser ativada como uma reação durante um ataque. Ao atingir o alvo, as chamas também podem se espalhar para uma criatura adjacente ao alvo original, causando o mesmo dano de Fogo adicional. Os efeitos desta habilidade não são cumulativos."}, {"nome": "Choque", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Em caso de acerto, o alvo sofre 1d6 + Intelecto do conjurador em dano de Trovão."}, {"nome": "Clarão Trovejante", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Trovão", "descricao": "O conjurador libera um clarão elétrico intenso em uma área de 9 metros. Todas as criaturas na área devem realizar uma salvaguarda de Sobrevivência. Em caso de falha, a criatura fica Cega até o início do próximo turno do conjurador. Em caso de sucesso, a criatura resiste ao efeito e se torna imune a esta magia até o fim da cena."}, {"nome": "Detectar Mana", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador aguça sua percepção para sentir fluxos arcanos ao redor. Enquanto a magia estiver ativa, ele pode detectar a presença de magias em atividade, objetos encantados e fontes mágicas simples em um raio de até 9 metros."}, {"nome": "Encantar com Chamas", "tipo": "Truque", "custo": 0, "prereq": "Armas Corpo a Corpo", "execucao": "Padrão", "alcance": "Toque", "alvo": "Objeto", "duracao": "3 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "O conjurador envolve uma arma corpo a corpo em chamas mágicas intensas. Enquanto esta magia permanecer ativa, a arma é considerada mágica e emite luz equivalente à de uma tocha. Além do dano normal, ataques bem-sucedidos com a arma causam 1d8 de dano adicional de Fogo. Os efeitos desta habilidade não podem ser acumulados com outras fontes iguais."}, {"nome": "Faísca", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Fogo", "descricao": "Você cria uma pequena faísca mágica em um ponto dentro do alcance. A faísca pode ser usada para acender tochas, fogueiras, lareiras, pavios, velas ou iniciar pequenos focos de incêndio em materiais inflamáveis. Acende materiais inflamáveis simples em até 9 metros. A faísca não possui força suficiente para causar dano direto."}, {"nome": "Gota Viva", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Curto", "alvo": "Objeto", "duracao": "Sustentada", "categoria": "Utilidade", "natureza": "Água", "descricao": "Você manipula pequenas quantidades de água, movendo, reunindo ou moldando líquidos simples. Manipula pequenos volumes de água (até um litro). Pode limpar superfícies ou condensar gotas no ar."}, {"nome": "Leitura Arcana", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Toque", "alvo": "Objeto", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador expande sua percepção mágica, analisando o fluxo arcano dentro do alcance de sua visão. Identifica informações básicas sobre um efeito mágico visível: natureza mágica, elemento predominante, categoria, função ou efeito geral e nível aproximado de poder."}, {"nome": "Luz Arcana", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Toque", "alvo": "Objeto", "duracao": "Cena", "categoria": "Encantamento", "natureza": "Arcano", "descricao": "Encanta um objeto tocado fazendo-o emitir luz mágica ao redor. A luz ilumina um raio de 9 metros."}, {"nome": "Mãos Arcanas", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Objeto", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Arcano", "descricao": "Cria uma mão mágica flutuante capaz de mover pequenos objetos, abrir portas destrancadas, puxar itens leves ou interagir com objetos simples à distância. O alcance é Curto (até 9 metros)."}, {"nome": "Mãos do Vento", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Toque", "alvo": "Objeto", "duracao": "Cena", "categoria": "Utilidade", "natureza": "Vento", "descricao": "O conjurador manipula pequenas correntes de ar para mover objetos leves à distância, interferir discretamente em mecanismos simples e auxiliar em furtos ou prestidigitações. O vento pode percorrer mecanismos internos, revelando pistas sobre fechaduras ou dispositivos mecânicos não mágicos. Concede +2 em testes de Prestidigitação, Furto e Ladinagem envolvendo objetos pequenos."}, {"nome": "Miragem", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Quando o conjurador é alvo de um ataque, pode usar sua reação para criar uma miragem distorcida de si mesmo. Até a resolução do ataque, recebe +1 de Defesa. Se o ataque errar, o conjurador pode se reposicionar para uma casa adjacente desocupada, sem provocar ataques de oportunidade."}, {"nome": "Mover Terra", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Terra", "descricao": "O conjurador manipula terra, areia ou pedra natural, abrindo buracos, trincheiras ou depressões. A terra removida é deslocada para um espaço adjacente. Não funciona em estruturas mágicas, metais ou superfícies completamente artificiais. O terreno afetado torna-se difícil. Manipula até 9 metros cúbicos de terra."}, {"nome": "Névoa Fria", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Água", "descricao": "Conjura uma névoa gélida que encobre uma pequena área em um raio de 12 metros, reduzindo a visibilidade e abafando movimentos. Criaturas dentro da névoa recebem +2 em testes de Furtividade. Área de 12 metros de raio."}, {"nome": "Rajada Arcana", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "Dispara uma pequena rajada de energia arcana contra uma criatura. O conjurador realiza um ataque mágico contra uma criatura. Em caso de acerto, o alvo sofre 1d6 + Intelecto do conjurador em de dano de Arcano."}, {"nome": "Voz Trovejante", "tipo": "Truque", "custo": 0, "prereq": "", "execucao": "Livre", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Cena", "categoria": "Utilidade", "natureza": "Trovão", "descricao": "O conjurador envolve sua voz com energia trovejante. Enquanto ativa, a voz ressoa como um estrondo e pode ser ouvida claramente mesmo em ambientes barulhentos. Recebe +2 em testes de Intimidação."}, {"nome": "Alarme Mágico", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "Permanente", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador cria um selo arcano invisível que funciona como um alarme mágico dentro da área escolhida. Sempre que uma criatura indesejada atravessar a região protegida, o alarme é ativado. A armadilha pode ser identificada e desativada através de uma salvaguarda de Prestidigitação. A CD para detectar ou desarmar o alarme é igual à CD de magia do conjurador. A área protegida possui raio de 18 metros."}, {"nome": "Anular Magia", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Magia", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Arcano", "descricao": "Anula magias de nível Menor ou inferior automaticamente. Para magias de níveis superiores, o conjurador deve realizar um teste da perícia Foco para tentar anulá-las; a CD do teste aumenta em +5 para cada nível acima. Magias de niveis Lendário ou superiores não podem ser anuladas por esta habilidade."}, {"nome": "Área Silenciada", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Vento", "descricao": "Você cria uma zona de silêncio absoluto dentro da área. Nenhuma criatura dentro consegue falar, ouvir ou conjurar magias que exijam componentes verbais. Raio de 9 metros."}, {"nome": "Armadilha de Gelo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "5 rodadas", "categoria": "Invocação", "natureza": "Água", "descricao": "O conjurador cria um círculo mágico congelante oculto em uma área. Quando a armadilha é ativada, a criatura deve realizar uma salvaguarda de Reflexos. Falha: sofre 2d8 de dano de Água e recebe a condição Congelado até o início do próximo turno do conjurador.\nSucesso: evita os efeitos da armadilha. Após ser ativada, a armadilha se desfaz imediatamente."}, {"nome": "Armadura de Chamas", "tipo": "Magias Iniciais", "custo": 2, "prereq": "Armaduras Leve ou Pesadas", "execucao": "Padrão", "alcance": "Toque", "alvo": "Objeto", "duracao": "3 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "Você envolve uma armadura em chamas mágicas controladas, fazendo com que ela irradie um calor intenso sem causar dano ao usuário. Enquanto a habilidade estiver ativa, criaturas adjacentes ao portador sofrem 1d8 de dano de Fogo no início de seus turnos caso permaneçam próximas. Além disso, a criatura encantada recebe resistência ao elemento Fogo, reduzindo pela metade todo dano de Fogo recebido."}, {"nome": "Armadura de Pedra", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Sustentada", "categoria": "Defensiva", "natureza": "Terra", "descricao": "O conjurador envolve uma criatura em camadas de rocha sólida, tornando seu corpo extremamente resistente. Enquanto a magia estiver ativa, o alvo recebe +2 de Defesa Base, sofre apenas metade do dano recebido e tem seu deslocamento reduzido pela metade."}, {"nome": "Barreira Congelante", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Invocação", "natureza": "Água", "descricao": "O conjurador ergue uma parede de gelo cristalino com até 3 metros de largura e 9 metros de altura. A barreira bloqueia passagem, linha de efeito e projéteis não mágicos. Criaturas atrás dela recebem redução de dano igual aos Pontos de Vida restantes da barreira. A barreira possui 10 Pontos de Vida."}, {"nome": "Barreira de Fogo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Fogo", "descricao": "O conjurador ergue uma barreira de fogo com espaço equivalente ao de uma criatura e altura de até 9 metros. Criaturas que atravessarem a barreira sofrem 2d10 de dano de Fogo. Criaturas que estiverem no local onde a barreira for criada devem realizar uma salvaguarda de Reflexos. Em caso de sucesso, a criatura pode se mover para uma área adjacente válida sem provocar ataques de oportunidade. Em caso de falha, permanece na área da barreira e sofre o dano normalmente."}, {"nome": "Barreira de Vento", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Vento", "descricao": "O conjurador utiliza sua reação para lançar uma magia que envolve a criatura alvo em uma corrente de vento concentrado, intensificando-se no instante do impacto para desviar projéteis e amortecer ataques recebidos. Enquanto esta habilidade estiver ativa, o alvo recebe +2 na Defesa Base. Além disso, danos físicos e danos do elemento Vento são reduzidos à metade."}, {"nome": "Barreira Mágica", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "O conjurador utiliza sua reação para criar uma barreira mágica capaz de bloquear ataques arcanos. A Defesa da barreira é igual a 10 + Intelecto + Foco. Quando o conjurador for alvo de um ataque mágico, compare o resultado do ataque com a Defesa da barreira: caso o ataque não a supere, o dano é completamente mitigado; caso supere, o conjurador recebe apenas metade do dano. Esta reação só pode ser utilizada para defender contra uma única fonte de ataque mágico."}, {"nome": "Bolas de Fogo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "Você conjura um círculo arcano que projeta uma esfera de fogo concentrado contra o alvo. Realize um ataque mágico contra a Defesa da criatura. Em caso de acerto, o alvo sofre 2d8 de dano de Fogo."}, {"nome": "Campo Magnético", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Trovão", "descricao": "O conjurador cria um campo magnético instável. Criaturas com armaduras pesadas metálicas ou carregando grandes objetos metálicos têm o deslocamento reduzido pela metade dentro da área. Além disso, ataques realizados por criaturas afetadas sofrem –5 nas rolagens enquanto dentro do campo. Área de 6 metros de raio."}, {"nome": "Chama Reveladora", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Fogo", "descricao": "Você envolve seu corpo com uma chama viva. Criaturas adjacentes sofrem dano de Fogo ao início de seus turnos. Além disso, criaturas invisíveis, furtivas ou ocultas que entrarem na área são imediatamente reveladas. Chama de 3 metros de raio. Criaturas adjacentes sofrem 1d6 de dano de Fogo ao início de seus turnos."}, {"nome": "Círculo de Chamas", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador cria um círculo de fogo intenso em uma área designada e realiza um ataque mágico contra todas as criaturas dentro dela. As criaturas atingidas sofrem 2d6 de dano de Fogo. Em caso de acerto crítico, as criaturas afetadas também recebem a condição Em Chamas. O círculo flamejante se espalha em um raio de até 3 metros, consumindo tudo ao redor com calor abrasador."}, {"nome": "Clones de Gelo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Sustentada", "categoria": "Defensiva", "natureza": "Água", "descricao": "Você cria clones feitos de gelo e mana ao seu redor. Enquanto ao menos um clone existir, você recebe +2 de Defesa Base. Sempre que um ataque contra você for bem-sucedido, role 1d4: 1–3, o ataque atinge um clone e o destrói; 4, o ataque acerta você normalmente. Ataques em área e efeitos sem ataque direto ignoram os clones. Cria 2 clones de gelo."}, {"nome": "Colapso Oceânico", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "Você comprime a umidade do ambiente em uma massa de água de alta pressão e a libera em uma explosão hidráulica devastadora. Criaturas em uma área de 9 metros devem realizar salvaguarda de Tenacidade. Falha: sofrem 2d6 de dano de Água e são arremessadas 9 metros para trás. Sucesso: recebem metade do dano e não são empurradas."}, {"nome": "Deformar Terreno", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "O conjurador distorce e fragmenta o solo em uma área, tornando o terreno instável e difícil de atravessar. Todas as criaturas dentro da área têm sua velocidade de movimento reduzida pela metade durante a duração. Área de 9 metros de raio."}, {"nome": "Esferas Trovejantes", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "5 rodadas", "categoria": "Invocação", "natureza": "Trovão", "descricao": "O conjurador cria 3 esferas de trovão que permanecem orbitando ao seu redor. Sempre que realizar uma magia, ele pode consumir uma das esferas para canalizar seu poder elétrico, escolhendo um dos seguintes efeitos: receber +2 na rolagem de Ataque Mágico, aumentar a CD da magia em +2, ou causar 1d8 de dano adicional de Trovão."}, {"nome": "Explosão Arcana", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "O conjurador cria uma esfera de energia arcana e realiza um ataque mágico contra uma criatura. Em caso de sucesso, a esfera explode no impacto, causando 2d6 de dano Arcano ao alvo. Criaturas adjacentes devem realizar uma salvaguarda de Reflexos; em caso de falha, recebem o dano completo da explosão, e em caso de sucesso, recebem apenas metade do dano."}, {"nome": "Fúria da Terra", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador seleciona uma área dentro do alcance em um raio de 9 metros. Todas as criaturas na área devem realizar uma salvaguarda de Reflexos. Em caso de sucesso, devem se mover para uma casa adjacente fora da área da magia. Em caso de falha, a terra se fecha em um círculo esmagador sob seus pés, causando 2d8 de dano de Terra. Após a conjuração, a área afetada torna-se terreno difícil. Enquanto o efeito permanecer ativo, a área torna-se um terreno mágico selado, não podendo ser alvo de magias."}, {"nome": "Grilhões de Mana", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador escolhe uma criatura que possa ver. O alvo deve realizar um teste de Foco; em caso de falha, seu deslocamento é reduzido pela metade e ele não pode realizar investidas. Além disso, ataques físicos e mágicos realizados contra o conjurador passam a ser feitos com desvantagem enquanto o efeito permanecer ativo."}, {"nome": "Impulso de Reação", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "1 Rodada", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "O conjurador envolve a criatura com o poder do trovão, acelerando seus reflexos e impulsos nervosos. Enquanto o efeito estiver ativo, a criatura recebe uma reação adicional por rodada. Este efeito não pode ser acumulado."}, {"nome": "Labirinto de Névoa", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Arcano", "descricao": "O conjurador invoca um campo de névoa arcana translúcida que distorce a percepção espacial dentro da área. Criaturas dentro da névoa enxergam caminhos que não existem e perdem a noção de direção. Cria uma névoa arcana em uma área de 9 metros de raio. Criaturas dentro da névoa ficam Confusas e têm seu deslocamento reduzido à metade. O conjurador e aliados designados no momento do conjuro são imunes ao efeito."}, {"nome": "Lâmina de Mana", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "Você cria uma lâmina feita de energia arcana pura e realiza um corte mágico contra o alvo. Realize um ataque mágico contra a Defesa da criatura. Em caso de acerto, causa 2d8 de dano Arcano."}, {"nome": "Lâmina de Vento", "tipo": "Magias Iniciais", "custo": 2, "prereq": "Armas do Tipo Cortante", "execucao": "Padrão", "alcance": "Médio", "alvo": "Objeto", "duracao": "Instantânea", "categoria": "Encantamento", "natureza": "Vento", "descricao": "O conjurador envolve as lâminas da arma com o elemento Vento, tornando seus ataques mágicos. Sempre que a arma causar dano, ela também causa 1d6 de dano adicional de Vento. Em caso de acerto crítico, uma segunda lâmina de vento é projetada contra outra criatura a até 3 metros do alvo original, utilizando o mesmo valor de ataque. Caso o ataque supere a Defesa do novo alvo, a criatura sofre 2d8 de dano mágico de Vento."}, {"nome": "Lança de Fogo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador cria um círculo mágico próximo ao próprio corpo, canalizando o poder das chamas para formar uma lança de fogo que é disparada contra o alvo. Realize um ataque mágico; em caso de sucesso, o alvo sofre 2d6 de dano de Fogo. Em caso de acerto crítico, as chamas se espalham violentamente pelo corpo da vítima, aplicando a condição Em Chamas por 3 rodadas."}, {"nome": "Lança de Gelo", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador cria um círculo mágico próximo ao próprio corpo, canalizando energia gélida para formar uma lança de gelo cristalino disparada contra o alvo. Realize um ataque mágico; em caso de sucesso, o alvo sofre 2d8 de dano de Água. Em caso de acerto crítico, o impacto congela parcialmente o alvo, aplicando a condição Congelado por 1 rodada."}, {"nome": "Lança Trovejante", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador dispara uma lança de energia elétrica condensada contra o alvo. Realize um ataque mágico; em caso de sucesso, o alvo sofre 2d6 de dano de Trovão. Em caso de acerto crítico, o impacto eletrocuta o corpo do alvo, aplicando a condição Paralisado até o início do próximo turno do conjurador."}, {"nome": "Manto Arcano", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "1 Rodada", "categoria": "Defensiva", "natureza": "Arcano", "descricao": "Você envolve seu corpo com uma camada condensada de energia arcana instável, criando um escudo temporário que absorve parte do dano recebido. Este efeito não é acumulativo com outros efeitos de absorção de dano. O Manto absorve até 10 pontos de dano mágico antes de ser rompido. Se o escudo não for totalmente consumido no início do turno, o conjurador recupera 1d4 de Mana."}, {"nome": "Orbe de Vento", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Vento", "descricao": "Você cria um pequeno orbe instável de vento e o lança em um ponto dentro do alcance, causando uma explosão de ar comprimido. Criaturas em um raio de 3 metros devem realizar salvaguarda de Reflexo. Falha: sofrem 2d10 de dano de Vento; Sucesso: metade do dano."}, {"nome": "Palmas da Terra", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "Duas enormes mãos de pedra emergem do solo e se fecham sobre a criatura alvo. O conjurador realiza um ataque mágico; o resultado define a CD da salvaguarda de Reflexo do alvo. Se falhar, a criatura sofre dano e fica Atordoada até o início do próximo turno. Em sucesso, evita completamente o efeito. Em caso de falha na salvaguarda de Reflexo, a criatura sofre 2d6 de dano de impacto e fica Atordoada."}, {"nome": "Pântano dos Mortos", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "Você transforma o solo em um pântano onde mãos espectrais emergem do chão. Criaturas na área devem realizar salvaguarda de Atletismo contra a CD de magia: em falha, ficam Imobilizadas e podem repetir o teste no início de cada turno para escapar. O terreno é considerado difícil. Área de 9 metros de raio. CD de Atletismo igual à CD de magia do conjurador."}, {"nome": "Passos de Vento", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Movimento", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "1 Rodada", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Você envolve seu corpo com correntes de ar acelerado, aumentando drasticamente sua velocidade ao usar sua ação de movimento. Seu deslocamento aumenta em +9 metros neste turno."}, {"nome": "Percepção dos Ventos", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Vento", "descricao": "O conjurador expande sua percepção através do fluxo do ar, detectando deslocamentos e alterações sutis. Detecta presença, direção e movimentação aproximada de criaturas (incluindo invisíveis) pelas perturbações no vento. Ambientes sem circulação de ar podem reduzir os efeitos. Detecta movimentação de criaturas em até 18 metros ao redor."}, {"nome": "Petrificar", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Terra", "descricao": "Você atinge uma criatura com energia pétrea. Realize um ataque mágico contra a Defesa do alvo. Em caso de sucesso, a criatura é parcialmente petrificada. O alvo tem o movimento reduzido pela metade e sofre penalidade de –2 em ataques físicos."}, {"nome": "Prisão da Terra", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Terra", "descricao": "Correntes metálicas emergem do solo ao redor de uma criatura. O alvo deve realizar uma salvaguarda de Reflexos; em caso de falha, fica paralisado e incapaz de se mover. A habilidade é sustentada a cada rodada, permitindo que o alvo realize um novo teste de salvaguarda com vantagem para tentar romper as correntes."}, {"nome": "Prisão de Água", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Água", "descricao": "O conjurador cria uma esfera de água ao redor da criatura alvo. Realize um ataque mágico; em caso de sucesso, o alvo fica aprisionado e deve realizar uma salvaguarda de Luta para escapar. Enquanto estiver aprisionado, a criatura não consegue respirar e sofre 1d10 de dano direto por sufocamento ao final de cada turno (este dano ignora redução de dano). Criaturas que não necessitam respirar ou que possuem respiração aquática são imunes ao efeito de sufocamento. No início do turno do conjurador, é necessária manutenção da magia com custo de Mana igual ao gasto na conjuração; caso não seja mantida, a magia é dissipada."}, {"nome": "Projétil de Pedra", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador cria um projétil compacto de pedra e o arremessa contra o alvo. Este ataque possui propriedades penetrantes. Realize um ataque mágico; em caso de sucesso, o alvo sofre 2d8 de dano de Terra. Em caso de acerto crítico, o impacto abre uma ferida profunda, aplicando a condição Sangramento."}, {"nome": "Rajada Congelante", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador realiza um ataque mágico e libera uma rajada congelante em linha reta de até 9 metros. Criaturas atingidas na área sofrem 2d10 de dano de Água. Em caso de acerto crítico, o frio extremo as envolve completamente, aplicando a condição Congelado por 1 rodada."}, {"nome": "Rajadas Arcanas Sequenciais", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Arcano", "descricao": "O conjurador cria três círculos arcanos ao seu redor e dispara rajadas arcanas contra uma criatura alvo. Cada rajada é tratada como uma fonte individual de ataque mágico, utilizando o mesmo valor de Ataque Mágico do conjurador. Para cada rajada que atingir o alvo com sucesso, a criatura sofre 1d6 + Intelecto de dano Arcano."}, {"nome": "Relâmpago", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador invoca um poderoso relâmpago contra a criatura alvo. Realize um ataque mágico; em caso de sucesso, o alvo sofre 2d6 de dano de Trovão. Em caso de acerto crítico, além do dano, a criatura fica Atordoada por 2 rodadas."}, {"nome": "Tornado de Vento", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Vento", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Em caso de sucesso, a força do impacto a arremessa para trás até 9 metros, causando 2d6 de dano de Vento. Caso a criatura colida com algum obstáculo durante o deslocamento, ela fica Atordoada por 1 rodada."}, {"nome": "Transferência de Mana", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador transfere parte de sua própria energia mágica para uma criatura aliada. O alvo recupera Mana igual ao Intelecto do conjurador. O conjurador perde a mesma quantidade de Mana transferida. Esta magia não pode aumentar a Mana do alvo acima do máximo. O alvo recupera Mana igual ao Intelecto do conjurador."}, {"nome": "Véu de Bruma", "tipo": "Magias Iniciais", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Água", "descricao": "Quando o conjurador é alvo de um ataque, ele se dissolve parcialmente em bruma antes do impacto. O ataque sofre Desvantagem. Se o ataque errar, o conjurador pode teleportar até 3 metros para qualquer espaço visível como parte da reação, emergindo da névoa. Se o ataque acertar, apenas metade do dano é sofrida."}, {"nome": "Acelerar", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "1 Rodada", "categoria": "Encantamento", "natureza": "Sagrada", "descricao": "O conjurador escolhe uma criatura e concede a Benção do Acelerar. A criatura encantada pode escolher, durante seu turno, ganhar um movimento adicional ou uma reação adicional. Esta habilidade não pode ser acumulada."}, {"nome": "Amanhecer Eterno", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Local", "duracao": "Sustentada", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador cria uma área de luz semelhante ao amanhecer em um raio de 9 metros. Aliados dentro da área recuperam 1d4 + Presença em vida. Criaturas do Elemento Negativo e mortos-vivos, em vez de serem curados, sofrem dano equivalente; essas criaturas podem realizar uma salvaguarda de Reflexos para se deslocarem para um espaço adjacente fora do raio da magia."}, {"nome": "Aurora Restauradora", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "A criatura alvo recupera 2d4 + Presença em vida. Caso o alvo seja uma criatura do Elemento Negativo ou um morto-vivo, o conjurador deve realizar um ataque mágico contra ela; em caso de sucesso, a criatura sofre dano equivalente ao valor da cura."}, {"nome": "Balança da Justiça", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Sagrada", "descricao": "O conjurador invoca uma balança espectral acima do alvo, pesando suas intenções, culpa e convicções diante de uma justiça divina invisível. Escolha uma criatura dentro do alcance; uma balança mágica permanece sobre ela durante a duração da magia. O conjurador e seus aliados recebem +2 no primeiro teste ou salvaguarda baseada em Presença realizado contra o alvo. A primeira vez que o alvo mentir ou tentar enganar alguém durante a duração da magia, deve realizar uma salvaguarda de Vontade. Em caso de falha, fica Abalado por 1 rodada."}, {"nome": "Biblioteca Perdida", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Cena", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador acessa fragmentos de uma biblioteca espiritual esquecida entre planos antigos, trazendo à mente conhecimentos mágicos há muito perdidos. O conjurador aprende temporariamente uma magia do tipo Inicial, Grimório ou Antiga que já tenha presenciado anteriormente. A magia não pode pertencer ao elemento Caótico nem ter efeitos de Entidade ou Elemento Negativo; deve ter custo de mana igual ou inferior ao que o conjurador pode normalmente utilizar. O conjurador pode lançá-la normalmente pagando seu custo de Mana. Após usá-la, o conhecimento desaparece imediatamente."}, {"nome": "Caminho Final", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Sagrada", "descricao": "O conjurador cria um círculo sagrado com raio de 9 metros, preenchendo a área com energia divina purificadora. Criaturas do Elemento Negativo, mortos-vivos e invocações que entrarem na área ou iniciarem seu turno dentro dela devem realizar uma salvaguarda de Tenacidade. Em caso de falha, sofrem 2d8 + Presença de dano Sagrado; em caso de sucesso, sofrem apenas metade do dano. Criaturas destruídas por este efeito são desintegradas em cinzas espirituais, impedindo reanimação simples ou retorno à vida por meios comuns. Outras criaturas hostis dentro da área sofrem 1d6 + Presença de dano Sagrado ao iniciarem seus turnos, recebendo apenas metade do dano em caso de sucesso na salvaguarda. Aliados que estiverem Morrendo dentro do círculo tornam-se automaticamente estáveis e retornam com 1 ponto de Vida."}, {"nome": "Chama da Persistência", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador pode utilizar sua reação para reanimar um aliado abatido que esteja com 0 pontos de Vida, fazendo-o retornar à vida com uma quantidade de Vida igual ao valor de Presença do conjurador."}, {"nome": "Colapso Conceitual", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Magia", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Sagrada", "descricao": "O conjurador interfere na estrutura conceitual de uma magia, desfazendo sua lógica arcana antes que ela consiga se estabilizar completamente na realidade. Quando uma criatura dentro do alcance conjurar uma magia sustentada ou com duração de até 3 rodadas, o conjurador pode usar sua reação para provocar um colapso mágico. A magia alvo realiza teste de salvaguarda em Foco contra a CD do conjurador. Falha: a magia é imediatamente dissipada. Sucesso: a magia permanece ativa, mas sua duração é reduzida em 1 rodada (mínimo 1)."}, {"nome": "Descanso Misericordioso", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Sagrada", "descricao": "O conjurador invoca uma serenidade sobrenatural que acalma a mente e conduz o alvo a um sono profundo e pacífico. Escolha uma criatura dentro do alcance. O alvo deve realizar uma salvaguarda de Vontade. Sucesso: a criatura resiste ao efeito e fica imune a esta magia por 24 horas. Falha: a criatura fica Adormecida por até 3 rodadas • Inconsciente, Caída e incapaz de ações ou reações. Desperta imediatamente se sofrer dano, for movida à força ou outra criatura usar uma ação para despertá-la. Criaturas imunes a sono ou sem mente são imunes a esta magia."}, {"nome": "Eco Temporal", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador força o tempo a reverberar por um breve instante, criando um eco imperfeito de uma ação recém-realizada. Escolha uma criatura dentro do alcance. O alvo repete imediatamente a última ação realizada neste turno (ação de movimento, padrão ou reação). Ataques realizados sofrem desvantagem; salvaguardas contra magias repetidas recebem desvantagem; efeitos variáveis utilizam novos dados. A repetição não consome nova ação do alvo, mas não pode repetir habilidades lendárias, efeitos únicos por cena, magias de concentração já encerradas ou efeitos caóticos absolutos."}, {"nome": "Fio Compartilhado", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "1 Rodada", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador conecta duas almas através de um fio espiritual invisível. Dor, impacto e sofrimento passam a ecoar entre ambas como reflexos inevitáveis. Escolha duas criaturas dentro do alcance. Enquanto a magia durar, sempre que uma das criaturas sofrer dano, a outra recebe dano Sagrado equivalente à metade do valor recebido. O dano transferido ignora cobertura física, mas pode ser reduzido por resistências apropriadas. Sempre que o vínculo transferir dano, ambas podem realizar salvaguarda de Tenacidade: Sucesso: o vínculo se rompe após a transferência atual. Falha: o efeito permanece ativo até o final da duração."}, {"nome": "Horizonte Dourado", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Invocação", "natureza": "Sagrada", "descricao": "Uma luz dourada semelhante ao nascer do primeiro sol cobre o campo de batalha, afastando sombras e envolvendo aliados com coragem e esperança impossíveis de ignorar. Escolha um ponto dentro do alcance. Um círculo mágico de 6 metros de raio surge durante a duração. Enquanto permanecerem dentro da área: Aliados realizam testes, ataques e salvaguardas com Vantagem. Criaturas hostis realizam testes, ataques e salvaguardas com Desvantagem. A área é considerada terreno sagrado iluminado magicamente."}, {"nome": "Ideia Materializada", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Toque", "alvo": "Criatura", "duracao": "3 Usos", "categoria": "Invocação", "natureza": "Sagrada", "descricao": "O conjurador transforma fé e imaginação em matéria sagrada, criando pequenos talismãs, anéis, pingentes ou relíquias efêmeras carregadas de proteção divina. O conjurador cria um pequeno acessório sagrado equipável por si mesmo ou por uma criatura tocada. Enquanto equipado, o acessório concede Barreira Arcana, absorvendo até 5 pontos de dano mágico por ataque ou efeito. A barreira possui 3 usos. Após absorver dano pela terceira vez, o acessório se desfaz em partículas de luz. Apenas um efeito de Ideia Materializada pode estar ativo por criatura ao mesmo tempo."}, {"nome": "Julgamento da Aurora", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Sagrada", "descricao": "Uma explosão de luz dourada semelhante ao nascer do primeiro sol atravessa o campo de batalha, queimando criaturas corrompidas pela morte e pela energia negativa. Escolha um ponto dentro do alcance. Criaturas em um raio de 6 metros sofrem o efeito da magia. Mortos-vivos e criaturas de energia negativa recebem 1d6 + Presença do conjurador em dano Sagrado. As criaturas afetadas devem realizar uma salvaguarda de Tenacidade para reduzir o dano à metade. Criaturas puramente sagradas ou vivas comuns não sofrem dano desta magia."}, {"nome": "Lanterna dos Mortos", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Sagrada", "descricao": "O conjurador invoca espíritos silenciosos que vagam entre o mundo dos vivos e dos mortos, revelando presenças escondidas à luz espectral de lanternas etéreas. O conjurador cria um círculo mágico com raio de 12 metros. Dois espíritos spectrais emergem e vasculham a área. Criaturas invisíveis, ocultas ou utilizando furtividade devem realizar salvaguarda de Furtividade contra a CD mágica do conjurador. Falha: são reveladas até o final do próximo turno e ficam Amedrontadas por 1 rodada. Sucesso: permanecem ocultas, mas os espíritos revelam ao conjurador a direção geral delas."}, {"nome": "Nó do Destino", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador entrelaça fios invisíveis do destino ao redor de uma região, aprisionando criaturas em uma malha espiritual impossível de atravessar facilmente. O conjurador cria um círculo mágico com raio de 12 metros. Enquanto permanecerem na área: criaturas não podem usar habilidades de teleporte, salto dimensional ou deslocamento mágico similar; para sair fisicamente do círculo, uma criatura deve realizar salvaguarda de Atletismo ou Tenacidade contra a CD mágica do conjurador. Sucesso: sai normalmente. Falha: permanece presa no limite do círculo e perde parte do deslocamento restante."}, {"nome": "Presságio", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Local", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Sagrada", "descricao": "O conjurador observa breves fragmentos de futuros possíveis, percebendo perigos prestes a acontecer antes que eles se manifestem completamente. Escolha um ponto dentro do alcance. O conjurador recebe um vislumbre parcial de ameaças em uma área de até 18 metros ao redor do ponto. O mestre deve revelar informações vagas sobre perigos imediatos: criaturas escondidas, emboscadas, armadilhas, magia hostil ativa ou efeitos prestes a serem ativados. A magia não revela detalhes completos, apenas sinais intuitivos, sensações ou imagens fragmentadas do perigo."}, {"nome": "Rascunho da Realidade", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O Arquiteto desenha imperfeições temporárias na estrutura da existência. Dentro da área afetada, as leis naturais tornam-se inconsistentes e a magia perde estabilidade. O conjurador cria um círculo mágico com raio de 6 metros. Dentro da área, criaturas que conjurarem magias sofrem instabilidade arcana: o custo de Mana das magias aumenta em valor igual à Presença do conjurador; ataques mágicos sofrem desvantagem; criaturas devem realizar teste de Foco para manter magias sustentadas ao iniciar o turno dentro do círculo. Efeitos puramente físicos não são afetados."}, {"nome": "Reescrever Estrutura", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Magia", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Sagrada", "descricao": "O conjurador interfere diretamente na essência de uma magia, reescrevendo suas propriedades elementais através de padrões sagrados invisíveis. Quando uma criatura dentro do alcance for alvo de uma magia elemental, o conjurador pode usar sua reação para alterar seu elemento (fogo, água, vento, terra ou trovão). Caso a magia possua Presença igual ou menor à do conjurador, o elemento é alterado até o final da execução. Se a magia for hostil: o dano é reduzido à metade; a criatura afetada recebe resistência ao novo elemento até o início do próximo turno."}, {"nome": "Relógio Quebrado", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador fragmenta o fluxo temporal em uma região limitada. Dentro da área, movimentos acontecem cedo demais, tarde demais ou simplesmente fora de ritmo. O conjurador cria um círculo mágico com raio de 6 metros. Enquanto permanecerem na área, criaturas sofrem distorções temporais: recebem –1 em Defesa; não podem realizar reações. Criaturas que entrarem pela primeira vez devem realizar salvaguarda de Reflexo: Falha: deslocamento reduzido em 3 metros até o início do próximo turno."}, {"nome": "Romper Fio", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Sagrada", "descricao": "O conjurador corta temporariamente parte do fio espiritual que sustenta o destino de uma criatura, fazendo sua força vacilar diante de um futuro fragmentado. Escolha uma criatura dentro do alcance. O alvo deve realizar salvaguarda de Tenacidade. Falha: sofre 2d8 + Presença de dano Sagrado e fica Enfraquecida até o final do próximo turno. Sucesso: sofre metade do dano e ignora o enfraquecimento."}, {"nome": "Segundo Roubado", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador rouba um fragmento do tempo de duas criaturas, trocando brevemente seus momentos na linha temporal e causando desorientação imediata. Escolha duas criaturas dentro do alcance. O conjurador escolhe: trocar as posições no campo de batalha; ou trocar temporariamente suas posições na ordem de iniciativa até o final da rodada. Criaturas involuntárias devem realizar salvaguarda de Reflexo: Sucesso: resistem à troca física. Falha: a troca ocorre normalmente. Após o efeito, ambas sofrem desvantagem na próxima rolagem de ataque ou precisão até o final do próximo turno."}, {"nome": "Tapeçaria Infinita", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "1 Rodada", "categoria": "Defensiva", "natureza": "Sagrada", "descricao": "Milhares de fios dourados se espalham pelo campo de batalha conectando possibilidades, destinos e eventos improváveis. Dentro da área protegida, ataques parecem errar por coincidência impossível e a realidade favorece os aliados. O conjurador cria um círculo mágico com raio de 3 metros. Enquanto permanecerem dentro da área, aliados recebem proteção parcial do destino: não podem ser alvo direto de magias ou habilidades hostis; recebem resistência a dano físico e mágico; ataques contra eles sofrem desvantagem. A proteção não impede: deslocamento forçado físico, empurrões, agarrões, desabamentos ou fenômenos puramente físicos."}, {"nome": "Teia Invisível", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Ilimitado", "alvo": "Criatura", "duracao": "24 Horas", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador conecta discretamente o destino da criatura alvo à sua própria percepção espiritual, criando um fio invisível impossível de notar para olhos comuns. Escolha uma criatura que possa ver. O alvo deve realizar salvaguarda de Vontade. Falha: fica marcado por um fio espiritual invisível durante 1 dia. Enquanto o vínculo existir, o conjurador percebe: direção aproximada do alvo; estado físico básico (saudável, ferido, inconsciente ou morto); movimentações gerais e mudanças bruscas de posição. Sucesso: a criatura percebe uma leve sensação estranha, mas resiste ao vínculo. A conexão funciona independentemente da distância no mesmo plano."}, {"nome": "Toque do Silêncio", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador invoca um selo sagrado de quietude que absorve sons e perturba a emissão de palavras, cânticos e vibrações mágicas. O conjurador cria um círculo mágico em um espaço dentro do alcance com diâmetro equivalente ao espaço de uma criatura. A criatura dentro da área deve realizar uma salvaguarda de Reflexo. Sucesso: a criatura pode se mover para um espaço adjacente livre fora da área. Falha: a criatura fica Silenciada até o início do próximo turno do conjurador • não pode falar, produzir sons audíveis ou conjurar magias que dependam de componentes verbais."}, {"nome": "Traço Arcano", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Magia", "duracao": "Cena", "categoria": "Controle", "natureza": "Sagrada", "descricao": "O conjurador desenha símbolos luminosos no ar, suspendendo uma magia incompleta entre realidade e intenção até o momento ideal para liberá-la. O conjurador escolhe uma magia conhecida com tempo de execução Padrão e a prepara em suspensão arcana. A magia fica armazenada sem produzir efeitos, sem exigir concentração e permanecendo visível como runas flutuantes. Uma vez por cena, o conjurador pode liberar a magia armazenada, pagando normalmente seu custo de Mana no momento da ativação."}, {"nome": "Última Badalada", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Pessoal", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Sagrada", "descricao": "O conjurador invoca a badalada final de um relógio divino. O tempo desacelera ao redor dele enquanto inimigos sentem o peso inevitável do envelhecimento, decadência e morte. O conjurador cria uma onda temporal sagrada em um raio de 6 metros. Criaturas hostis dentro da área devem realizar salvaguarda de Tenacidade. Falha: sofrem 1d6 + Presença de dano Sagrado, recebem –1 em Defesa e não podem realizar reações até o início do próximo turno do conjurador. Sucesso: sofrem metade do dano e ignoram os efeitos secundários."}, {"nome": "Último Amanhecer", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Completa", "alcance": "Toque", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Sagrada", "descricao": "A luz do Primeiro Amanhecer envolve o corpo da criatura caída, restaurando parte de sua essência e trazendo-a de volta do limiar da morte. Uma criatura que tenha morrido há até 1 rodada retorna à vida com Pontos de Vida iguais ao valor de Presença do conjurador."}, {"nome": "Último Suspiro", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Sagrada", "descricao": "O conjurador invoca um julgamento sagrado sobre aqueles que já se encontram à beira da morte, encerrando seu sofrimento com um toque divino inevitável. Escolha uma criatura dentro do alcance. O alvo deve realizar uma salvaguarda de Tenacidade. Se a criatura estiver com 5% ou menos de Vida máxima, é imediatamente executada em caso de falha. Se estiver acima desse valor, sofre 2d8 + Presença de dano Sagrado e fica Enfraquecida por 1 rodada em caso de falha. Em sucesso, sofre apenas metade do dano e evita a condição. Criaturas imunes a efeitos de morte não podem ser executadas."}, {"nome": "Vislumbre do Futuro", "tipo": "Magias Sagradas", "custo": 2, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Controle", "natureza": "Sagrada", "descricao": "Por um breve instante, o conjurador observa possibilidades futuras e interfere no fluxo do destino, permitindo que um erro seja corrigido antes de se concretizar completamente. Quando uma criatura dentro do alcance falhar em um teste, ataque ou salvaguarda, o conjurador pode usar sua reação. A criatura pode repetir imediatamente a rolagem, devendo utilizar o novo resultado. Uma mesma criatura só pode ser afetada por Vislumbre do Futuro uma vez por cena."}, {"nome": "Abismo Aquático Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Controle", "natureza": "Água", "descricao": "O conjurador cria uma esfera aquática com 9 metros de área, aprisionando todas as criaturas dentro de uma gigantesca bolha de água. Criaturas presas devem realizar uma salvaguarda de Tenacidade para escapar da bolha. Em falha, sofrem 1d10 de dano de Água ao início de cada turno enquanto permanecerem presas. Criaturas que não precisam respirar sofrem apenas metade do dano devido à intensa pressão da água. Em sucesso, a criatura consegue escapar da bolha."}, {"nome": "Apocalipse Elétrico Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Longo", "alvo": "Área", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador invoca uma tempestade de relâmpagos que desce indiscriminadamente sobre a área, aterrorizando e destruindo tudo sob os céus enfurecidos. Em uma área de 9 metros, todas as criaturas inimigas devem realizar uma salvaguarda de Reflexo. Em caso de falha, sofrem 4d10 de dano de Trovão. Em caso de sucesso, recebem apenas metade do dano."}, {"nome": "Asas do Vento Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 rodadas", "categoria": "Defensiva", "natureza": "Vento", "descricao": "O conjurador envolve um aliado em correntes de vento que aumentam drasticamente sua mobilidade e agilidade em combate. O alvo recebe deslocamento de voo de 9 metros e +2 em Defesa contra ataques corpo a corpo."}, {"nome": "Baptismo de Chamas Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "5 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "Encanta a criatura alvo com chamas intensas. Até o final do efeito, seus ataques mágicos são amplificados, recebendo +2 nas rolagens de ataque e causando 2d6 de dano adicional de Fogo. Este efeito não é acumulativo com outras magias de amplificação similares."}, {"nome": "Chamado do Trovão Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Longo", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Trovão", "descricao": "O conjurador chama um raio dos céus que desce em velocidade impossível sobre o alvo designado. O conjurador realiza um ataque mágico. Em caso de sucesso, o alvo sofre 3d10 de dano de Trovão. Em um acerto crítico, o alvo fica Paralisado por 1 rodada."}, {"nome": "Conjuração Dupla das Marés Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "1 criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Água", "descricao": "O conjurador realiza um ataque mágico contra uma criatura. Se o ataque for bem-sucedido, o alvo sofre 2d8 de dano mágico de Água. Em seguida, escolha uma criatura aliada em alcance curto. Ela recupera uma quantidade de Vida igual ao dano causado pela magia. A cura somente ocorre caso a magia cause dano ao alvo."}, {"nome": "Corrente Uivante Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Área", "duracao": "1 Rodada", "categoria": "Controle", "natureza": "Vento", "descricao": "O conjurador invoca correntes de vento uivante que desviam projéteis e desestabilizam conjurações dentro da área. Em uma área de 9 metros de raio, ataques com projéteis realizados através ou dentro da área sofrem –2 nas jogadas de ataque. Além disso, conjuradores dentro da área devem realizar uma salvaguarda de Vontade contra a CD do conjurador; em caso de falha, suas magias custam +2 de Mana adicional para serem conjuradas."}, {"nome": "Correntes do Trovão Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Conjurador", "duracao": "3 rodadas", "categoria": "Invocação", "natureza": "Trovão", "descricao": "O conjurador invoca duas correntes envoltas em eletricidade pulsante, uma em cada mão, capazes de atingir inimigos à distância com velocidade devastadora. Enquanto a magia estiver ativa, o conjurador pode realizar ataques físicos utilizando Destreza com alcance de até 9 metros. O conjurador pode realizar dois ataques por turno com as correntes. Em caso de sucesso, cada ataque causa 2d8 de dano de Trovão. Em acertos críticos, o alvo fica Paralisado por 1 rodada. Além disso, o conjurador pode envolver uma criatura atingida com uma das correntes elétricas. Enquanto estiver presa pela corrente, a criatura deve realizar uma salvaguarda de Atletismo contra a CD do conjurador no início de cada turno. Em caso de falha, permanece Paralisada e sofre novamente o mesmo dano do ataque a cada rodada."}, {"nome": "Cura Pelas Águas Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Água", "descricao": "O conjurador cria um círculo mágico que invoca um globo de água pura e revitalizante. A água envolve a criatura alvo, restaurando 1d8 + Intelecto do conjurador em Vida. Caso o alvo seja uma criatura do Elemento Negativo ou um Morto-Vivo, o conjurador deve realizar um ataque mágico. Em caso de acerto, a magia causa o mesmo valor como dano de Água ao invés de cura."}, {"nome": "Despertar da Pedra Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Terra", "descricao": "O conjurador desperta a ira da terra sob uma criatura, fazendo rochas afiadas e fragmentos de pedra emergirem violentamente do solo para esmagar o alvo. O conjurador realiza um ataque mágico contra a criatura. Em caso de sucesso, o alvo sofre 2d8 de dano de Terra."}, {"nome": "Domínio Trovejante Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Conjurador", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "O conjurador cria uma zona de eletricidade pulsante ao seu redor, onde relâmpagos estalam constantemente e tornam qualquer aproximação extremamente perigosa. Em uma área de 6 metros ao redor do conjurador, criaturas hostis que entrarem na área ou realizarem ataques contra o conjurador sofrem Desvantagem em seus ataques até o fim do turno."}, {"nome": "Fênix de Fogo Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Invocação", "natureza": "Fogo", "descricao": "O conjurador invoca 2 pequenas fênix flamejantes que sobrevoam ao seu redor, iluminando uma área de 9 metros cada. As fênix podem se mover livremente em um raio de até 18 metros do conjurador e atacam alvos conforme sua vontade. Cada fênix é considerada uma fonte mágica distinta. Ao atacar, o alvo deve realizar uma salvaguarda de Reflexo. Em falha, sofre 2d8 + Intelecto do conjurador em dano de Fogo. Criaturas eliminadas por este dano são consumidas pelas chamas das fênix, dando origem a uma nova Fênix de Fogo Menor para cada alvo abatido."}, {"nome": "Guardião de Pedra Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Curto", "alvo": "Local", "duracao": "Sustentada", "categoria": "Invocação", "natureza": "Terra", "descricao": "O conjurador anima um golem de rocha e terra, dando forma a um guardião elemental que permanece protegendo uma posição designada. O guardião ocupa um espaço adjacente ao conjurador, possui 20 Pontos de Vida e Defesa 12. Enquanto estiver ativo, ataca automaticamente criaturas hostis adjacentes uma vez por rodada, utilizando a CD do conjurador. Em caso de falha na resistência, a criatura sofre 2d6 de dano de Terra. O guardião permanece até ser destruído, até o conjurador dissipá-lo."}, {"nome": "Ilusão Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "Sustentada", "categoria": "Defensiva", "natureza": "Vento", "descricao": "Você cria uma pequena miragem visual em um ponto dentro do alcance que possa ver. A ilusão pode assumir a forma de uma criatura, objeto, sombra, fenômeno simples ou distorção visual. Além da imagem, a magia pode produzir sons discretos e efeitos visuais mágicos compatíveis com a ilusão criada, como brilhos, fumaça ilusória, faíscas, distorções de luz ou ecos. Esses efeitos são apenas sensoriais e não possuem propriedades físicas ou mágicas reais, não causando dano, condições ou efeitos mecânicos. A ilusão permanece enquanto o conjurador mantiver concentração. Caso uma criatura interaja fisicamente com a miragem, observe inconsistências óbvias ou suspeite da falsidade, ela pode realizar um teste apropriado contra a CD da magia para identificar a ilusão. O mestre pode conceder vantagem ou desvantagem nesse teste dependendo da complexidade da ilusão, da distância, da visibilidade e da familiaridade da criatura com o objeto ou efeito imitado."}, {"nome": "Maré Reversa Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Defensiva", "natureza": "Água", "descricao": "Ao utilizar a reação, o conjurador protege uma criatura alvo quando ela é atingida por um ataque mágico dos elementos Fogo ou Terra, invertendo parte da energia recebida em uma onda de água protetora. Reduz o dano recebido em 2d8 e concede Resistência 5 a Fogo e Terra até o início do próximo turno."}, {"nome": "Monólito Vivo Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Terra", "descricao": "O conjurador ergue do solo um imenso monólito de pedra viva, atravessado por veios de energia elemental pulsante. A presença da estrutura fortalece aqueles que lutam ao seu redor, envolvendo aliados em uma aura de proteção mineral. Até o final do efeito, todos os aliados em um raio de 9 metros do monólito recebem +2 em Defesas Básicas e Resistência a dano de Terra. O monólito permanece ativo até ser destruído, até que a conjuração seja interrompida ou até o término da duração da magia."}, {"nome": "Pétalas de Chamas Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Local", "duracao": "3 Rodadas", "categoria": "Encantamento", "natureza": "Fogo", "descricao": "O conjurador cria uma aura de pétalas flamejantes que o envolve constantemente. Ataques corpo a corpo realizados pelo conjurador recebem +2 nas rolagens de ataque. O conjurador recebe resistência ao elemento Fogo, sofrendo apenas metade do dano desse elemento. Ao sofrer dano letal que reduza sua Vida a 0, ficando com 1 de vida, o conjurador deixa para trás uma cópia ilusória formada por pétalas em chamas, que se dissipa em uma explosão de fogo em um raio de 6 metros, causando 2d8 de dano de Fogo às criaturas na área. Habilidade não acumulativa."}, {"nome": "Proteção dos Relâmpagos Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Curto", "alvo": "Criatura", "duracao": "3 Rodadas", "categoria": "Defensiva", "natureza": "Trovão", "descricao": "O conjurador envolve um aliado em um campo elétrico instável que reage automaticamente contra qualquer agressor próximo. Sempre que o alvo for atingido por um ataque corpo a corpo, o atacante sofre 1d8 de dano de Trovão, sem direito a salvaguarda."}, {"nome": "Raio Solar Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Padrão", "alcance": "Médio", "alvo": "Criatura", "duracao": "Instantânea", "categoria": "Ofensiva", "natureza": "Fogo", "descricao": "O conjurador manifesta um círculos arcanos do elemento Fogo e dispara um raio solar denso e destrutivo. O conjurador realiza um ataque mágico contra o alvo. Esta magia possui Penetração Mágica. Em acerto, causa 2d8 de dano de Fogo."}, {"nome": "Teleporte Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Reação", "alcance": "Curto", "alvo": "Conjurador", "duracao": "Instantânea", "categoria": "Utilidade", "natureza": "Arcano", "descricao": "O conjurador dobra o espaço ao seu redor e desaparece em um lampejo arcano, reaparecendo instantaneamente em outro ponto visível. O conjurador pode se teleportar para um local desocupado em até 9 metros. Este movimento não provoca reações de oportunidade."}, {"nome": "Terremoto Controlado Menor", "tipo": "Magias Antigas", "custo": 4, "prereq": "", "execucao": "Completa", "alcance": "Médio", "alvo": "Área", "duracao": "2 rodadas", "categoria": "Controle", "natureza": "Terra", "descricao": "O conjurador faz o solo estremecer violentamente, abrindo rachaduras e pilares de pedra sob os pés dos inimigos. Criaturas na área devem realizar uma salvaguarda de Reflexo. Em caso de falha, a criatu

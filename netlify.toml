[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# Redireciona chamadas de API para o backend no Render
# IMPORTANTE: substitua a URL abaixo pela URL real do seu serviço no Render
[[redirects]]
  from   = "/api/*"
  to     = "https://SEU-BACKEND.onrender.com/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/img/*"
  to     = "https://SEU-BACKEND.onrender.com/img/:splat"
  status = 200
  force  = true

# React Router — redireciona todas as rotas para o index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
